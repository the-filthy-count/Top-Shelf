<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top-Shelf — Library Health</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  @font-face { font-family: 'Acidoze'; src: url('/static/TELETYPE1945-1985.ttf') format('truetype'); }
  @font-face { font-family: 'Seconds'; src: url('/static/xero4.ttf') format('truetype'); }
  :root {
    --bg:      #0c0c0e;
    --surface: rgba(19,19,23,0.75);
    --raised:  rgba(26,26,32,0.8);
    --border:  #222228;
    --muted:   #3a3a44;
    --text:    #e8e8f0;
    --dim:     #6b6b7a;
    --accent:  #c084fc;
    --green:   #4ade80;
    --amber:   #fbbf24;
    --red:     #f87171;
    --blue:    #60a5fa;
    --mono:    'DM Mono', monospace;
    --sans:    'Syne', sans-serif;
    --acid:    'Acidoze', 'Syne', sans-serif;
    --secs:    'Seconds', 'DM Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg) url('/static/background.jpg') center center / cover fixed;
    color: var(--text); font-family: var(--mono); font-size: 13px;
    line-height: 1.6; min-height: 100vh;
  }
  body::before { content: ''; position: fixed; inset: 0; background: rgba(12,12,14,0.72); z-index: 0; }
  .app { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 24px 48px; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 28px;
  }
  .logo img { height: 36px; object-fit: contain; }
  .nav-links { display: flex; gap: 8px; align-items: center; }
  .btn-secondary { background: none; border: 1px solid var(--border); color: var(--dim); padding: 8px 12px; border-radius: 6px; font-size: 16px; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; }
  .btn-secondary:hover { border-color: var(--muted); color: var(--text); }
  .btn-primary { background: var(--accent); color: #0c0c0e; border: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-family: var(--mono); cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 8px; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .active-nav { border-color: var(--accent) !important; color: var(--accent) !important; }

  /* Stats */
  .stats-bar { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: none; border-radius: 10px; padding: 32px 20px; backdrop-filter: blur(12px); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 160px; }
  .stat-value { font-family: var(--acid); font-size: 72px; font-weight: 400; line-height: 1; display: block; text-align: center; }
  .stat-label { font-family: var(--secs); font-size: 26px; text-transform: uppercase; letter-spacing: -0.02em; color: var(--dim); display: block; margin-top: 10px; text-align: center; }
  .stat-nfo    .stat-value { color: var(--amber); }
  .stat-video  .stat-value { color: var(--red); }
  .stat-thumb  .stat-value { color: var(--blue); }
  .stat-empty  .stat-value { color: var(--muted); }

  /* Panels */
  .panel { background: var(--surface); border: none; border-radius: 10px; overflow: hidden; backdrop-filter: blur(12px); margin-bottom: 16px; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; }
  .panel-title { font-family: var(--acid); font-size: 32px; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; color: #ffffff; }
  .panel-sub { font-size: 11px; color: var(--dim); margin-top: 2px; }

  /* Issue list */
  .issue-list { max-height: 320px; overflow-y: auto; padding: 0 18px 14px; }
  .issue-list::-webkit-scrollbar { width: 4px; }
  .issue-list::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }
  .issue-item { font-family: var(--mono); font-size: 11px; color: var(--dim); padding: 5px 0; border-bottom: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .issue-item:hover { color: var(--text); }
  .empty { padding: 20px 18px; text-align: center; color: var(--muted); font-size: 12px; }

  /* Header row */
  .scan-header { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
  .scan-time { font-size: 11px; color: var(--dim); }
  .scanning { color: var(--accent); font-size: 11px; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div style="display:flex;flex-direction:column;gap:3px"><div class="logo"><img src="/static/logo.png" alt="Top-Shelf"></div><span style="font-family:'DM Mono',monospace;font-size:10px;color:#6b6b7a;letter-spacing:0.06em;text-align:center">v1.0.8</span></div>
    <div class="nav-links">
      <a href="/" style="text-decoration:none"><button class="btn-secondary" title="TV Series"><i class="fa-solid fa-tv"></i></button></a>
      <a href="/movies" style="text-decoration:none"><button class="btn-secondary" title="Movies"><i class="fa-solid fa-film"></i></button></a>
      <a href="/library" style="text-decoration:none"><button class="btn-secondary active-nav" title="Library Health"><i class="fa-solid fa-house-medical"></i></button></a>
      <a href="/history" style="text-decoration:none"><button class="btn-secondary" title="History"><i class="fa-solid fa-clock-rotate-left"></i></button></a>
      <button class="btn-secondary" title="Settings" onclick="window.location='/'"><i class="fa-solid fa-gear"></i></button>
    </div>
  </header>

  <div class="scan-header">
    <button class="btn-primary" id="btnScan" onclick="startScan()"><i class="fa-solid fa-magnifying-glass"></i> Scan Library</button>
    <span class="scan-time" id="scanTime"></span>
    <span class="scanning" id="scanningMsg" style="display:none"><i class="fa-solid fa-spinner fa-spin"></i> Scanning...</span>
  </div>

  <div class="stats-bar">
    <div class="stat-card stat-nfo">
      <span class="stat-value" id="statNfo">-</span>
      <span class="stat-label">NFO No Video</span>
    </div>
    <div class="stat-card stat-video">
      <span class="stat-value" id="statVideo">-</span>
      <span class="stat-label">No NFO</span>
    </div>
    <div class="stat-card stat-thumb">
      <span class="stat-value" id="statThumb">-</span>
      <span class="stat-label">No Thumb</span>
    </div>
    <div class="stat-card stat-empty">
      <span class="stat-value" id="statEmpty">-</span>
      <span class="stat-label">Empty</span>
    </div>
  </div>

  <div class="panel" id="panelNfo" style="display:none">
    <div class="panel-header">
      <div>
        <div class="panel-title">NFO Without Video</div>
        <div class="panel-sub">NFO files with no matching video file alongside them</div>
      </div>
    </div>
    <div class="issue-list" id="listNfo"></div>
  </div>

  <div class="panel" id="panelVideo" style="display:none">
    <div class="panel-header">
      <div>
        <div class="panel-title">Video Without NFO</div>
        <div class="panel-sub">Video files missing their companion NFO</div>
      </div>
    </div>
    <div class="issue-list" id="listVideo"></div>
  </div>

  <div class="panel" id="panelThumb" style="display:none">
    <div class="panel-header">
      <div>
        <div class="panel-title">Missing Thumbnail</div>
        <div class="panel-sub">Videos without a -thumb.jpg file</div>
      </div>
    </div>
    <div class="issue-list" id="listThumb"></div>
  </div>

  <div class="panel" id="panelEmpty" style="display:none">
    <div class="panel-header">
      <div>
        <div class="panel-title">Empty Folders</div>
        <div class="panel-sub">Directories with no video or NFO files</div>
      </div>
    </div>
    <div class="issue-list" id="listEmpty"></div>
  </div>

</div>
<script>
  let scanning = false;

  async function startScan() {
    if (scanning) return;
    scanning = true;
    document.getElementById('btnScan').disabled = true;
    document.getElementById('scanningMsg').style.display = 'inline';
    document.getElementById('scanTime').textContent = '';
    ['Nfo','Video','Thumb','Empty'].forEach(k => {
      document.getElementById(`stat${k}`).textContent = '-';
      document.getElementById(`panel${k}`).style.display = 'none';
    });
    await fetch('/api/library/scan');
    pollResults();
  }

  function pollResults() {
    const t = setInterval(async () => {
      const r = await fetch('/api/library/results');
      const d = await r.json();
      if (d.results) {
        clearInterval(t);
        scanning = false;
        document.getElementById('btnScan').disabled = false;
        document.getElementById('scanningMsg').style.display = 'none';
        renderResults(d.results, d.scan_time);
      }
    }, 2000);
  }

  function renderResults(results, scanTime) {
    if (scanTime) document.getElementById('scanTime').textContent = `Last scan: ${scanTime}`;

    const map = [
      { key: 'nfo_no_video',  stat: 'statNfo',   panel: 'panelNfo',   list: 'listNfo' },
      { key: 'video_no_nfo',  stat: 'statVideo',  panel: 'panelVideo', list: 'listVideo' },
      { key: 'missing_thumb', stat: 'statThumb',  panel: 'panelThumb', list: 'listThumb' },
      { key: 'empty_folder',  stat: 'statEmpty',  panel: 'panelEmpty', list: 'listEmpty' },
    ];

    map.forEach(({ key, stat, panel, list }) => {
      const items = results[key] || [];
      document.getElementById(stat).textContent = items.length;
      const panelEl = document.getElementById(panel);
      const listEl  = document.getElementById(list);
      if (items.length) {
        panelEl.style.display = 'block';
        listEl.innerHTML = items.map(p => `<div class="issue-item" title="${esc(p)}">${esc(p)}</div>`).join('');
      } else {
        panelEl.style.display = 'none';
      }
    });
  }

  function esc(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Load last results on page open
  (async () => {
    const r = await fetch('/api/library/results');
    const d = await r.json();
    if (d.results) renderResults(d.results, d.scan_time);
  })();
</script>
</body>
</html>
