<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/static/img/favicon.ico" type="image/x-icon">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top-Shelf — Activity log</title>

<link rel="stylesheet" href="/static/fonts/dm-mono/dm-mono.css">
<link rel="stylesheet" href="/static/fonts/font-awesome/css/all.min.css?v=20260530">
<script src="/static/theme-init.js?v=20260614c"></script>
<link rel="stylesheet" href="/static/app-shell.css?v=29">
<script src="/static/ts-utils.js?v=20260614a"></script>
<style>
  :root {
    /* Colour palette lives in /static/app-shell.css (themeable via html[data-theme=...]) */
    --glass-panel-bg: linear-gradient(160deg, rgba(var(--panel-hi-rgb),0.48) 0%, rgba(var(--panel-lo-rgb),0.36) 100%);
    --glass-border: rgba(255,255,255,0.12); --glass-blur: 20px;
    --glass-inset: inset 0 1px 0 rgba(255,255,255,0.12);
    --glass-shadow: 0 10px 40px rgba(0,0,0,0.28);
    --glass-header-bg: linear-gradient(160deg, rgba(var(--panel-hi-rgb),0.52) 0%, rgba(var(--panel-lo-rgb),0.4) 100%);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: transparent;
    color: var(--text); font-family: var(--mono); font-size: 13px; line-height: 1.6;
    min-height: 100vh; min-height: 100dvh; margin: 0;
  }
  body::before { content: ''; position: fixed; inset: 0; background: rgba(var(--bg-rgb),0.72); z-index: 0; }
  .app { position: relative; z-index: 1; max-width: 1600px; margin: 0 auto; padding: 0 24px 24px;
    display: flex; flex-direction: column; height: 100dvh; max-height: 100dvh; min-height: 0; overflow: hidden; }
  header {
    flex-shrink: 0; padding: 14px 16px; border: 1px solid var(--glass-border); border-radius: 10px;
    background: var(--glass-header-bg); backdrop-filter: blur(var(--glass-blur));
    margin-bottom: 16px;
  }
  header:not(.ts-app-header) {
    display: flex; align-items: center; justify-content: space-between;
  }
  header.ts-app-header {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(200px, 2fr) minmax(0, 1fr);
    align-items: center;
    gap: 12px 16px;
  }
  header.ts-app-header .ts-header-left { justify-self: start; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; min-width: 0; }
  header.ts-app-header .nav-links { justify-self: end; }
  .nav-links { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .panel-log-page {
    flex: 1 1 0; min-height: 0; display: flex; flex-direction: column;
    background: var(--glass-panel-bg); border: 1px solid var(--glass-border); border-radius: 10px;
    overflow: hidden; backdrop-filter: blur(var(--glass-blur));
    box-shadow: var(--glass-inset), var(--glass-shadow);
  }
  .panel-log-page .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.09); flex-shrink: 0; gap: 10px; flex-wrap: wrap; }
  .panel-title { font-family: var(--acid); font-size: clamp(22px, 2vw, 30px); font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text); }
  .log-filter-bar {
    flex-shrink: 0;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    background: rgba(var(--brand-purple-rgb), 0.04);
  }
  .log-filter-bar-inner {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    flex: 1 1 auto;
    min-width: 0;
  }
  .log-filter-chip {
    font-family: var(--secs, system-ui);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(24, 20, 36, 0.45);
    color: var(--dim);
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    margin: 0;
    line-height: 1.2;
    transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
  }
  .log-filter-chip:hover {
    border-color: rgba(192, 132, 252, 0.35);
    color: var(--text);
  }
  .log-filter-chip.is-active {
    border-color: rgba(192, 132, 252, 0.5);
    background: rgba(192, 132, 252, 0.12);
    color: rgba(var(--brand-accent-rgb), 0.95);
  }
  .log-filter-chip--error.is-active { border-color: rgba(239, 68, 68, 0.55); background: rgba(239, 68, 68, 0.12); color: #fca5a5; }
  .log-filter-chip--warning.is-active { border-color: rgba(251, 191, 36, 0.55); background: rgba(251, 191, 36, 0.12); color: #fcd34d; }
  .log-filter-chip--done.is-active { border-color: rgba(34, 197, 94, 0.5); background: rgba(34, 197, 94, 0.12); color: #86efac; }
  .log-filter-actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .log-body { flex: 1 1 0; overflow-y: auto; padding: 14px 18px; font-size: 12px; line-height: 1.8; }
  .log-line { display: block; }
  .log-line.log-line--hidden { display: none; }
  .log-line.file { color: var(--accent); font-weight: 500; margin-top: 6px; }
  .log-line.done { color: var(--green); }
  .log-line.warning { color: var(--amber); }
  .log-line.error { color: var(--red); }
  .log-line.pipeline { color: var(--dim); }
  .log-line.sep { opacity: 0.35; }
  @media (max-width: 900px) {
    header.ts-app-header { grid-template-columns: 1fr; }
  }

  /* ── /log mobile optimisation (≤640px) ──
     Log lines stay monospace and can run long. Tighten horizontal
     padding so content doesn't disappear off-screen, and let the body
     wrap instead of growing a horizontal scrollbar. Prune / Clear
     labels collapse via .btn-label. */
  @media (max-width: 640px) {
    .app { padding: 0 10px 12px; }
    header { padding: 10px 12px; margin-bottom: 10px; }
    .log-filter-bar { padding: 8px 10px; gap: 6px; }
    .log-filter-bar-inner { width: 100%; }
    .log-filter-actions { width: 100%; justify-content: flex-end; }
    .log-body {
      padding: 10px 12px !important;
      font-size: 11px !important;
      line-height: 1.6 !important;
      word-break: break-word;
    }
    .log-body .log-line { white-space: pre-wrap; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="ts-app-header">
    <div class="ts-header-left">
      <a href="/queue" class="logo" style="text-decoration:none" title="Go to Queue"><img src="/static/img/logo.webp" alt="Top-Shelf" style="height:36px; object-fit:contain;"></a>
      <span class="version" id="appVersion"></span>
    </div>
    <div id="tsActivityBanner" class="ts-header-activity" aria-live="polite"></div>
    <div class="nav-links">
      <a href="/downloads" style="text-decoration:none"><button class="btn-secondary" title="Downloads"><i class="ts-nav-icon ts-nav-icon--downloads"></i></button></a>
      <a href="/scenes" style="text-decoration:none"><button class="btn-secondary" title="Browse — feed grid"><i class="ts-nav-icon ts-nav-icon--scenes"></i></button></a>
      <a href="/library" style="text-decoration:none"><button class="btn-secondary" title="Library"><i class="ts-nav-icon ts-nav-icon--library"></i></button></a><a href="/news" style="text-decoration:none"><button class="btn-secondary" title="News"><i class="ts-nav-icon ts-nav-icon--news"></i></button></a>
      <a href="/health" style="text-decoration:none"><button class="btn-secondary" title="Health"><i class="ts-nav-icon ts-nav-icon--health"></i></button></a>
      <a href="/settings" style="text-decoration:none"><button class="btn-secondary" title="Settings"><i class="ts-nav-icon ts-nav-icon--settings"></i></button></a>
      <button class="btn-secondary" onclick="fetch('/api/auth/logout',{method:'POST'}).then(()=>location.href='/login')" title="Logout"><i class="ts-nav-icon ts-nav-icon--logout"></i></button>
    </div>
  </header>

  <div class="panel-log-page">
    <div class="ts-page-head log-page-head">
      <div class="ts-page-head__row">
        <div class="ts-page-head__left">
          <span class="panel-title ts-page-title">
            <i class="ts-page-title__icon ts-nav-icon ts-nav-icon--list" aria-hidden="true"></i>
            <span class="ts-page-title__text">Log</span>
          </span>
          <span id="logMeta" style="font-size:11px;color:var(--dim)"></span>
        </div>
        <div class="ts-page-head__center" aria-hidden="true"></div>
        <div class="ts-page-head__right log-page-actions" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <button type="button" class="btn-secondary" onclick="reloadHistory()" title="Reload from server"><i class="fa-solid fa-arrows-rotate"></i></button>
        <button type="button" class="btn-secondary" id="downloadLogBtn" onclick="downloadLog()" title="Download the full log as a .txt file"><i class="fa-solid fa-download"></i> <span class="btn-label">Download</span></button>
        <button type="button" class="btn-secondary" id="pruneLogBtn" onclick="pruneLog()" title="Delete lines older than the retention setting"><i class="fa-solid fa-scissors"></i> <span class="btn-label">Prune</span></button>
        <button type="button" class="btn-secondary" onclick="clearServerLog()" title="Clear stored log"><i class="fa-solid fa-trash"></i> <span class="btn-label">Clear</span></button>
        </div>
      </div>
    </div>
    <div class="log-filter-bar" id="logFilterBar" role="toolbar" aria-label="Filter log by level">
      <div class="log-filter-bar-inner" id="logFilterChips"></div>
      <div class="log-filter-actions">
        <button type="button" class="btn-secondary" id="logCopyBtn" onclick="copyLogToClipboard()" title="Copy visible log lines"><i class="fa-solid fa-copy"></i> <span class="btn-label">Copy</span></button>
      </div>
    </div>
    <div class="log-body" id="logBody"><div class="empty" style="color:var(--dim)">Loading…</div></div>
  </div>
</div>
<script>
  const LOG_LEVEL_FILTERS = [
    { id: 'all', label: 'All' },
    { id: 'file', label: 'Files' },
    { id: 'done', label: 'Done' },
    { id: 'pipeline', label: 'Pipeline' },
    { id: 'warning', label: 'Warn' },
    { id: 'error', label: 'Error' },
    { id: 'sep', label: 'Breaks' },
  ];
  let _logLines = [];
  let _logFilterLevel = 'all';

  function classifyLine(line) {
    if (line.startsWith('FILE ')) return 'file';
    if (line.includes('DONE')) return 'done';
    if (line.includes('PIPELINE')) return 'pipeline';
    if (line.startsWith('---')) return 'sep';
    if (line.includes('WARNING')) return 'warning';
    if (line.includes('ERROR') || line.includes('FAILED')) return 'error';
    return 'default';
  }

  function _logLineMatchesFilter(level) {
    if (_logFilterLevel === 'all') return true;
    return level === _logFilterLevel;
  }

  function _updateLogMeta() {
    const meta = document.getElementById('logMeta');
    if (!meta) return;
    const total = _logLines.length;
    if (!total) {
      meta.textContent = 'Empty';
      return;
    }
    if (_logFilterLevel === 'all') {
      meta.textContent = total + ' line' + (total === 1 ? '' : 's');
      return;
    }
    const visible = _logLines.filter((l) => classifyLine(l) === _logFilterLevel).length;
    meta.textContent = visible + ' of ' + total + ' lines';
  }

  function _renderLogFilterChips() {
    const host = document.getElementById('logFilterChips');
    if (!host || host.dataset.wired) return;
    host.dataset.wired = '1';
    host.innerHTML = LOG_LEVEL_FILTERS.map(function (f) {
      const extra = f.id === 'error' ? ' log-filter-chip--error'
        : f.id === 'warning' ? ' log-filter-chip--warning'
        : f.id === 'done' ? ' log-filter-chip--done' : '';
      return '<button type="button" class="log-filter-chip' + extra + '" data-log-filter="' + f.id + '">' + f.label + '</button>';
    }).join('');
    host.addEventListener('click', function (ev) {
      const chip = ev.target.closest('[data-log-filter]');
      if (!chip) return;
      setLogFilter(chip.getAttribute('data-log-filter'));
    });
    _syncLogFilterChipUi();
  }

  function _syncLogFilterChipUi() {
    document.querySelectorAll('[data-log-filter]').forEach(function (btn) {
      btn.classList.toggle('is-active', btn.getAttribute('data-log-filter') === _logFilterLevel);
    });
  }

  function setLogFilter(level) {
    const id = level || 'all';
    if (!LOG_LEVEL_FILTERS.some(function (f) { return f.id === id; })) return;
    _logFilterLevel = id;
    _syncLogFilterChipUi();
    _renderLogBody();
    _updateLogMeta();
  }

  function _createLogLineEl(text) {
    const level = classifyLine(text);
    const span = document.createElement('span');
    span.className = 'log-line ' + level;
    if (!_logLineMatchesFilter(level)) span.classList.add('log-line--hidden');
    span.textContent = text;
    span.dataset.logLevel = level;
    return span;
  }

  function _renderLogBody() {
    const body = document.getElementById('logBody');
    if (!body) return;
    if (!_logLines.length) {
      body.innerHTML = '<div class="empty" style="color:var(--dim)">No log lines yet. Run the pipeline or library index.</div>';
      return;
    }
    const frag = document.createDocumentFragment();
    _logLines.forEach(function (text) {
      frag.appendChild(_createLogLineEl(text));
      frag.appendChild(document.createTextNode('\n'));
    });
    body.innerHTML = '';
    body.appendChild(frag);
    const anyVisible = body.querySelector('.log-line:not(.log-line--hidden)');
    if (!anyVisible) {
      body.innerHTML = '<div class="empty" style="color:var(--dim)">No lines match this filter.</div>';
    }
  }

  function appendLine(text) {
    const raw = String(text ?? '');
    if (!raw) return;
    // Backend prefixes every line with an ISO UTC stamp so we can
    // reformat to the browser's local clock here. Stored locally in
    // the formatted shape so search / filter / copy all match what the
    // user sees on screen.
    const line = (typeof tsLogFormatLine === 'function') ? tsLogFormatLine(raw) : raw;
    _logLines.push(line);
    const body = document.getElementById('logBody');
    if (!body) return;
    const empty = body.querySelector('.empty');
    if (empty) empty.remove();
    const level = classifyLine(line);
    if (!_logLineMatchesFilter(level)) {
      _updateLogMeta();
      return;
    }
    body.appendChild(_createLogLineEl(line));
    body.appendChild(document.createTextNode('\n'));
    body.scrollTop = body.scrollHeight;
    _updateLogMeta();
  }

  function _visibleLogLines() {
    if (_logFilterLevel === 'all') return _logLines.slice();
    return _logLines.filter(function (l) { return classifyLine(l) === _logFilterLevel; });
  }

  async function copyLogToClipboard() {
    const lines = _visibleLogLines();
    if (!lines.length) {
      if (typeof window.toast === 'function') window.toast('Nothing to copy for this filter', { kind: 'error' });
      return;
    }
    const text = lines.join('\n');
    try {
      await navigator.clipboard.writeText(text);
      if (typeof window.toast === 'function') {
        window.toast('Copied ' + lines.length + ' line' + (lines.length === 1 ? '' : 's'));
      }
    } catch (e) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        if (typeof window.toast === 'function') {
          window.toast('Copied ' + lines.length + ' line' + (lines.length === 1 ? '' : 's'));
        }
      } catch (e2) {
        if (typeof window.toast === 'function') window.toast('Copy failed', { kind: 'error' });
      }
      ta.remove();
    }
  }

  let eventSource = null;
  function startSSE() {
    if (eventSource) eventSource.close();
    eventSource = new EventSource('/api/log/stream');
    eventSource.onmessage = function(e) {
      try {
        const d = JSON.parse(e.data);
        if (d.ping) return;
        appendLine(typeof d === 'string' ? d : (d.line || d.text || ''));
      } catch (err) {}
    };
  }
  async function reloadHistory() {
    const body = document.getElementById('logBody');
    const meta = document.getElementById('logMeta');
    try {
      const r = await fetch('/api/log/history?limit=12000');
      const d = await r.json();
      const rows = d.lines || [];
      // Same reformat as appendLine — keeps live stream and history
      // rendering identical so the user's local clock applies to both.
      const fmt = (typeof tsLogFormatLine === 'function') ? tsLogFormatLine : (s) => s;
      _logLines = rows.map(function (row) { return fmt(row.line); });
      _renderLogBody();
      _updateLogMeta();
      if (meta && !_logLines.length) meta.textContent = 'Empty';
    } catch (e) {
      _logLines = [];
      if (body) body.innerHTML = '<div class="empty" style="color:var(--red)">Failed to load log</div>';
      if (meta) meta.textContent = '';
    }
  }
  async function downloadLog() {
    //: Browser navigates directly to the streaming endpoint so the
    //: server can deliver an arbitrarily long log without the page
    //: buffering it in memory first.
    const btn = document.getElementById('downloadLogBtn');
    const _orig = btn ? btn.innerHTML : '';
    if (btn) { btn.disabled = true; btn.innerHTML = '<span class="loader loader--btn" role="status" aria-label="Preparing"></span> <span class="btn-label">Preparing…</span>'; }
    try {
      const a = document.createElement('a');
      a.href = '/api/log/download';
      a.rel = 'noopener';
      //: Defensive fallback — server already sets Content-Disposition
      //: attachment, but `download` ensures the browser still saves
      //: rather than navigating to the stream if that header ever
      //: drops (dev proxy, debug mode).
      a.download = 'top-shelf-log.txt';
      document.body.appendChild(a);
      a.click();
      a.remove();
    } catch (e) {
      window.toast && window.toast('Download failed: ' + (e && e.message || e));
    } finally {
      //: Give the browser a beat to actually trigger the download before
      //: restoring the button — otherwise a click-then-disable race on
      //: slow networks can cancel the download.
      setTimeout(() => { if (btn) { btn.disabled = false; btn.innerHTML = _orig; } }, 800);
    }
  }
  async function pruneLog() {
    const btn = document.getElementById('pruneLogBtn');
    btn.disabled = true;
    try {
      const r = await fetch('/api/log/prune', { method: 'POST' });
      const d = await r.json();
      if (d.removed > 0) {
        await reloadHistory();
        document.getElementById('logMeta').textContent = `Pruned ${d.removed} lines older than ${d.retention_days}d`;
      } else {
        document.getElementById('logMeta').textContent = `Nothing to prune (retention: ${d.retention_days}d)`;
      }
    } catch (e) {
      window.toast(e.message);
    } finally {
      btn.disabled = false;
    }
  }
  async function clearServerLog() {
    if (!confirm('Clear all stored log lines?')) return;
    try {
      await fetch('/api/log/clear', { method: 'POST' });
      _logLines = [];
      document.getElementById('logBody').innerHTML = '<div class="empty" style="color:var(--dim)">Cleared.</div>';
      _updateLogMeta();
    } catch (e) {}
  }
  _renderLogFilterChips();
  reloadHistory();
  startSSE();
</script>
<script defer src="/static/activity-banner.js?v=20260630"></script>
<script defer src="/static/app-shell.js?v=20260529"></script>
<script>
fetch('/api/status').then(r => r.json()).then(d => {
  const el = document.getElementById('appVersion');
  if (el && d.version) el.textContent = 'v' + d.version;
});
</script>
</body>
</html>
