  :root {

    background: var(--glass-header-bg);

  .right-col { display: flex; flex-direction: column; gap: 20px; }
  .panel-scroll { overflow-y: auto; max-height: 420px; }
  .search-panel-inner { overflow-y: auto; max-height: 340px; }

  /* Panel chrome (background, border, radius, blur, shadow) is owned

  /* Search */
  .search-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; margin-bottom: 12px; }
  .field-input { background: var(--raised); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-family: var(--mono); font-size: 12px; width: 100%; outline: none; transition: border-color 0.15s; }
  .field-input:focus { border-color: var(--accent); }

  /* Results */
  /* ── Spotlight performer row ── */
  .spotlight-row {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    padding: 0 0 8px;
  }
.spotlight-tile {
  flex: 1;
  min-width: 0;
  position: relative;
  height: 120px;
  border-radius: 7px;
  overflow: hidden;
  cursor: pointer;
  /* Border + hover state read off `--brand-accent-rgb` so the Accent
   * Override picker actually tints spotlight tiles in line with the
   * other pages. Was `--brand-purple-rgb` (primary), which the
   * override token doesn't touch. */
  border: 1px solid rgba(var(--brand-accent-rgb), 0.18);
  transition: border-color 0.2s, outline-color 0.2s, background-color 0.3s ease;
  outline: 1px solid transparent;
  outline-offset: 0;
  /* Duotone: orange multiply + purple lighten */
  background: transparent;
  isolation: isolate;
}

.spotlight-tile:hover {
  border-color: rgba(var(--brand-accent-rgb), 0.55);
  outline-color: rgba(var(--brand-accent-rgb), 0.30);
}

/* Airbrush + tritone art surface. The .spotlight-tile-art wrapper
 * renders the performer photo as a CSS background-image, then layers a
 * lightly blurred + saturated clone via ::after with mix-blend-mode:
 * multiply for a soft painterly composite. The SVG tritone filter is
 * applied to the wrapper itself so it tones the airbrushed result —
 * text labels live outside this wrapper and stay untoned.
 *
 * The demo's `saturate(100) contrast(5) blur(5px)` values are tuned for
 * abstracting a photo into shapes; on small portrait tiles they reduce
 * faces to blobs. Values here are dialled WAY back so the performer
 * stays recognisable while still picking up the airbrush wash. */
/* Three-layer composite mirrors the /settings preview "Airbrush +
 * Tritone" cell exactly:
 *   1. Base bg-image on .spotlight-tile-art (autolevel only)
 *   2. ::after  — airbrush (blurred/saturated/contrast-jacked clone,
 *                 mix-blend-mode: multiply)
 *   3. ::before — tritone (url(#spotlight-bloom) url(#duotone-vhs),
 *                 stacked above the airbrush via z-index)
 * The tritone's per-tone alpha (shadow 90% / mid 85% / hi 65%) is
 * baked into the SVG filter, so no outer opacity is needed here. */
.spotlight-tile-art {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: var(--tile-bg);
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  isolation: isolate;
  overflow: hidden;
  transform: scale(1.25);
  transform-origin: center top;
  filter: brightness(var(--auto-b, 1.06))
          contrast(var(--auto-c, 1.12))
          hue-rotate(var(--auto-h, 0deg));
  transition: filter 0.3s ease, transform 0.3s ease;
  will-change: transform;
}

.spotlight-tile:hover .spotlight-tile-art {
  transform: scale(1);
}

/* Tritone overlay — sits above the airbrush ::after */
.spotlight-tile-art::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: inherit;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  filter: url(#spotlight-bloom) var(--spotlight-duotone-filter, url(#duotone-vhs));
  z-index: 2;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

@supports (filter: blur(5px) contrast(2)) and (mix-blend-mode: multiply) {
  .spotlight-tile-art::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: inherit;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    filter: brightness(1.5) saturate(50) blur(5px) contrast(2);
    mix-blend-mode: multiply;
    opacity: 0.25;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
}

.spotlight-tile-art img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
  opacity: 0;
  z-index: 3;
  transition: opacity 0.3s ease, filter 0.3s ease;
}

/* Hover: drop both the airbrush AND tritone overlays, reveal the
 * clean photo with the auto-leveled white-balance correction so the
 * natural colours read warm and saturated. */
.spotlight-tile:hover .spotlight-tile-art::after,
.spotlight-tile:hover .spotlight-tile-art::before {
  opacity: 0;
}
.spotlight-tile:hover .spotlight-tile-art img {
  opacity: 1;
  filter: brightness(var(--auto-b-hover, 1.04))
          contrast(var(--auto-c-hover, 1.1))
          hue-rotate(var(--auto-h, 0deg))
          saturate(1.22);
}

  .spotlight-tile:hover::before,
  .spotlight-tile:hover::after {
    opacity: 0;
  }
  .spotlight-score-badge {
    position: absolute; top: 5px; right: 5px;
    background: rgba(18,12,28,0.82); border: 1px solid rgba(var(--brand-purple-rgb),0.3);
    color: var(--accent); font-size: 10px; font-family: var(--mono);

  .spotlight-exclude-btn {

    width: 22px; height: 22px; border-radius: 50%;
    /* Red palette (destructive — never-show-again) so it reads as a

    background: rgba(220, 38, 38, 0.65); border: 1px solid rgba(220, 38, 38, 0.75);
    color: #fff; font-size: 13px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; opacity: 0; transition: opacity 0.2s, background 0.15s, border-color 0.15s;

  }
  .spotlight-exclude-btn:hover {
    background: rgba(220, 38, 38, 0.85);
    border-color: rgba(220, 38, 38, 0.95);
  }
.spotlight-tile-name {
    /* Pinned to the bottom-left of the tile, but inset by 4% so the
     * 3.5° CW rotation (applied via app-shell.css with default centre
     * origin) doesn't push the BOTTOM of the rotated visual to
     * negative x — that area is inside the previous tile's
     * overlapping bounding box, and its content paints over long
     * names there (e.g. "MEADOW MORRIGAN" cut off by the prior
     * tile). 4% × tile-width compensates for the ~6px lateral bleed. */
    position: absolute; bottom: 0; left: 4%;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    /* Literal `Shatter` (not via var(--acid)) so the value is locked
     * regardless of any in-page :root override of the --acid token.
     * `!important` beats the universal `body *` VCRMono rule in
     * app-shell.css which otherwise out-cascades plain font-family. */
    font-family: 'Shatter', 'VCRMono', monospace !important;
    font-size: 18px;
    text-transform: uppercase;
    /* Light-tone fill against a saturated multi-direction stroke in
     * the duotone shadow tone — reads as letters carved out of the
     * darker half of the image's palette. The 4-direction shadow stack
     * (1px each cardinal) gives a clean outline; the larger blurred
     * pair underneath drops a halo so the text still pops over a
     * busy mid-tone region of the photo. Falls back to the panel
     * accent / black combo when no duotone is configured. */
    color: var(--duotone-lighten, var(--text));
    text-shadow:
      -1px  0   0   var(--duotone-multiply, rgba(0,0,0,0.95)),
       1px  0   0   var(--duotone-multiply, rgba(0,0,0,0.95)),
       0   -1px 0   var(--duotone-multiply, rgba(0,0,0,0.95)),
       0    1px 0   var(--duotone-multiply, rgba(0,0,0,0.95)),
       0    2px 4px var(--duotone-multiply, rgba(0,0,0,0.85)),
       0    4px 14px color-mix(in srgb, var(--duotone-multiply, rgba(0,0,0,0.85)) 90%, transparent);
    letter-spacing: 0.02em;
    pointer-events: none;
    z-index: 1;
    max-height: 100%;
    overflow: hidden;
    line-height: 1.1;
    /* 85% opacity of the duotone "shadow" tone so the name pill reads
     * as part of the same colour family as the tile image. Falls back
     * to the panel dark tone when no duotone is configured. Only the
     * outer corners get rounded so the pill visually "tabs" out of
     * the tile's bottom-left corner. */
    padding: 10px 6px;
    border-radius: 0 4px 4px 0;
    background: color-mix(in srgb, var(--duotone-lighten, rgba(var(--panel-lo-rgb), 1)) 85%, transparent);
    transition: background 0.15s;
  }
  /* On hover, drop the pill so the full tile image is unobscured —
   * the text-shadow on the name carries enough legibility on its own. */
  .spotlight-tile:hover .spotlight-tile-name { background: transparent; }

  /* Source-of-record logo CSS lives in app-shell.css — both /scenes
   * and /discover render the spotlight, and each page used to have
   * its own copy of the spotlight CSS. Centralising in app-shell
   * guarantees both pages get the same rules. */

  /* Spotlight tiles inside the detail panel — full height, no radius */
  #spotlightGrid { display: flex; }
  #spotlightGrid .spotlight-tile {

  /* Tighter padding than the base tiles — the rotated name starts

  #spotlightGrid .spotlight-tile-name { font-size: 22px; padding: 6px 4px; }

  @media (max-width: 768px) {
    #spotlightGrid { overflow-x: auto; }
    #spotlightGrid .spotlight-tile { min-width: 180px; flex: 0 0 180px; }
  }

    .result-item { display: flex; align-items: center; gap: 12px; padding: 10px; min-height: 76px; border-radius: 5px; border: 1px solid rgba(var(--brand-purple-rgb),0.1); cursor: pointer; transition: background 0.15s, border-color 0.15s; margin-bottom: 4px; }

  .detail-link:hover { background: rgba(var(--brand-purple-rgb),0.4); border-color: var(--accent); color: var(--text); }
  .detail-bg-image { position: absolute; top: 0; right: 0; width: 55%; height: 100%; object-fit: cover; object-position: top center; opacity: 0.22; mask-image: linear-gradient(to left, rgba(0,0,0,0.7) 0%, transparent 100%); -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,0.7) 0%, transparent 100%); pointer-events: none; z-index: 0; }
  #detailBgImage::after { content: ''; position: absolute; inset: 0; background: linear-gradient(160deg, rgba(var(--panel-lo-rgb),0.82) 0%, rgba(12,10,20,0.55) 100%); pointer-events: none; z-index: 1; }

  /* Dest picker */
  .dest-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
  .dest-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--dim); margin-bottom: 8px; }
  .dest-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-bottom: 12px; }
  .dest-btn { padding: 8px 12px; background: var(--raised); border: 1px solid var(--border); border-radius: 6px; color: var(--dim); font-family: var(--secs); font-size: calc(13px + 2pt); letter-spacing: -0.02em; cursor: pointer; transition: all 0.15s; text-align: left; }
  .dest-btn:hover { border-color: var(--muted); color: var(--text); }
  .dest-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(var(--brand-purple-rgb),0.1); }
  .dest-custom { display: grid; grid-template-columns: 1fr auto; gap: 8px; margin-top: 8px; }
  .quick-add-select {
    min-width: 240px;
    background: linear-gradient(160deg, rgba(var(--panel-hi-rgb),0.94) 0%, rgba(var(--panel-lo-rgb),0.9) 100%);
    color: var(--text);
    border: 1px solid rgba(var(--brand-purple-rgb),0.15);
    border-radius: 6px;
    padding: 8px 34px 8px 10px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.2;
    outline: none;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    background-image:
      linear-gradient(45deg, transparent 50%, var(--accent) 50%),
      linear-gradient(135deg, var(--accent) 50%, transparent 50%),
      linear-gradient(160deg, rgba(var(--panel-hi-rgb),0.94) 0%, rgba(var(--panel-lo-rgb),0.9) 100%);
    background-position:
      calc(100% - 18px) calc(50% - 2px),
      calc(100% - 13px) calc(50% - 2px),
      0 0;
    background-size: 6px 6px, 6px 6px, 100% 100%;
    background-repeat: no-repeat;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .quick-add-select:hover { border-color: rgba(var(--brand-purple-rgb),0.65); }
  .quick-add-select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(var(--brand-purple-rgb),0.4);
  }
  /* `.quick-add-select option` chrome inherits from the global
   * `select option` rule in app-shell.css (theme-aware
   * `rgb(var(--panel-hi-rgb))` + `var(--text)`). The earlier
   * hardcoded `#171720` worked on dark themes but rendered
   * dark-on-dark in light themes. */
  .quick-add {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    flex-wrap: nowrap;
  }
  .quick-add-custom {
    width: 220px;
  }
  .quick-add-btn {
    white-space: nowrap;
    padding-inline: 12px;
  }
  @media (max-width: 1120px) {
    .detail-title-row .quick-add {
      width: 100%;
      flex-wrap: wrap;
    }
    .quick-add-select,
    .quick-add-custom {
      flex: 1;
      min-width: 180px;
    }
  }

  /* ── /scenes mobile optimisation (≤640px) ──
     Stack the two-column Search/Detail row, shrink fixed panel heights
     (desktop hard-codes 460px), collapse the feed-mode toggle to
     icons-only via the shared .btn-label utility. */
  @media (max-width: 640px) {
    .layout {
      grid-template-columns: 1fr !important;
      gap: 12px !important;
    }
    .layout > .panel {
      height: auto !important;
      max-height: 60vh;
    }
    /* Hide the 10-performer spotlight strip on mobile — the user wants
     * the search panel and its results to be the focus there. The
     * spotlight detail column still renders the clicked performer's
     * scene feed; we just drop the row of tiles above it.
     * NOTE: .scenes-toolbar-feed (the 6-button Movies/JAV/Performers/
     * Studios/Vices/Search category toggle below) MUST stay visible —
     * without it the feed gets stuck on whatever mode loaded last. */
    #spotlightRow,
    .spotlight-row {
      display: none !important;
    }
    /* Also hide the entire detail panel + the spotlight grid that sits
     * absolutely positioned inside it. On desktop the detail panel
     * doubles as the spotlight surface, but on mobile any sliver of
     * it (collapsed height, leftover background image) shows through
     * as visual noise above the search results. */
    .layout > .panel:nth-child(2),
    #spotlightGrid,
    #spotlightBackBtn,
    #detailBgImage {
      display: none !important;
    }
    /* Detail panel internal layout: poster + text stack vertically so
       each has a readable width on a phone. Keep the poster bounded
       so it doesn't push the text off-screen. */
    #detailLayout {
      flex-direction: column !important;
      gap: 12px !important;
    }
    #detailPoster {
      max-height: 220px;
      align-self: center !important;
    }
    #detailPoster img {
      max-height: 220px;
      width: auto;
    }
    /* Scenes toolbar: title, feed toggle, source pills stack vertically.
     * Desktop puts .scenes-toolbar-feed at position:absolute centered
     * over the toolbar — that overlaps the title once the toolbar
     * collapses to a column on mobile. Reset to static so the toggle
     * sits in the normal flow under the title. */
    .scenes-toolbar {
      flex-direction: column !important;
      align-items: stretch !important;
      gap: 10px !important;
    }
    .scenes-toolbar-side,
    .scenes-toolbar-feed {
      width: 100% !important;
      justify-content: center !important;
      flex-wrap: wrap !important;
    }
    /* Source toggle (FansDB / StashDB / TPDB) and the palette /
     * vice-filter buttons share the toolbar's end side. Without
     * flex-wrap the source toggle's min(480px, 92vw) plus the two
     * 40px buttons overflowed; with wrap it drops cleanly to the
     * next line. Also clamp the source toggle to the viewport. */
    #sceneTabs.source-toggle {
      width: 100% !important;
      max-width: 100% !important;
      min-width: 0 !important;
    }
    .scenes-toolbar-feed {
      position: static !important;
      left: auto !important;
      transform: none !important;
      pointer-events: auto !important;
    }
    /* Feed mode toggle: full viewport width with each of the 5 buttons
       getting an even 1/5 share. .ts-seg--5 is a grid with
       repeat(5, minmax(0, 1fr)), so width:100% on the parent + the
       toggle itself is enough. Override align-self:center from the
       base .ts-seg rule and the desktop max-width clamp on
       .feed-mode-toggle so we actually fill the row. */
    .ts-seg--5,
    .ts-seg--6,
    .feed-mode-toggle {
      min-width: 0 !important;
      width: 100% !important;
      max-width: none !important;
      align-self: stretch !important;
    }
    .ts-seg--5 > button,
    .ts-seg--6 > button,
    .ts-seg--3 > button {
      padding: 8px 6px !important;
      font-size: 13px;
    }
    #scenesSection {
      padding: 0 10px 14px !important;
    }
    .scene-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      gap: 10px !important;
      padding: 10px !important;
    }
    /* On mobile, show full scene/movie posters rather than cropping —
     * desktop uses object-fit:cover for a uniform tile grid, but on
     * a phone the user is primarily browsing and wants to see the
     * whole image. Drop the fixed aspect ratio so each thumb keeps
     * its natural proportions, and use contain so nothing is clipped. */
    .scene-thumb,
    .movie-poster {
      aspect-ratio: auto !important;
      height: auto !important;
      width: 100% !important;
      object-fit: contain !important;
      background: var(--raised);
    }
    /* Tighten the shadowy detail toolbar + spotlight tiles. */
    .detail-toolbar { padding: 8px 10px !important; }
    #spotlightGrid .spotlight-tile { min-width: 140px; flex: 0 0 140px; }

    /* Movies grid (search → Movies tab) defaults to 5 per row in
     * portrait via the rule at line ~1370 (max-width: 1400px). On
     * actual phones that's ~75px per tile — unreadable. Force 2 per
     * row at ≤640px. */
    .movie-grid .movie-card {
      flex: 0 0 calc((100% - 10px) / 2) !important;
      width: calc((100% - 10px) / 2) !important;
      max-width: calc((100% - 10px) / 2) !important;
    }

    /* Mobile: show clean posters only — strip every overlay (studio
     * logo, source pill, performer pile, headshot avatars, wanted
     * action button, top-right hover button strip). The user wants
     * the grids to read as a poster wall, not a stat-laden tile
     * dashboard. Title labels under the poster stay so each tile is
     * still identifiable. */
    .scene-card .scene-source-logo,
    .scene-card .scene-studio-logo,
    .movie-card .scene-studio-logo,
    .scene-card .scene-performer-label,
    .scene-card .scene-headshots-hover,
    .movie-card .scene-headshots-hover,
    .scene-card .scene-wanted-btn,
    .movie-card .scene-wanted-btn,
    .scene-card .scene-source-pill,
    .scene-card .scene-fav-heart,
    .movie-card .scene-fav-heart,
    .scene-card .scene-card-actions,
    .movie-card .scene-card-actions {
      display: none !important;
    }
  }

  /* Image overlay */
  .img-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 1000; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
  .img-overlay img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 5px; box-shadow: 0 32px 80px rgba(0,0,0,0.6); }

  /* Scenes panel */
  .scene-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; padding: 16px 18px; }
  @media (max-width: 1500px) { .scene-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
  @media (max-width: 1180px) { .scene-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
  @media (max-width: 860px) { .scene-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  /* Empty-state messages (e.g. the search-tab prompt) need to span all
   * grid columns; otherwise they land in column 1 and `text-align:
   * center` only centres them inside that narrow cell. */
  .scene-grid > .empty,
  .movie-grid > .empty { grid-column: 1 / -1; }
  /* Bevel test (scenes only) — combines the existing soft drop-shadow with
   * the shared --ts-bevel token (inset highlight on top, inset shadow on
   * bottom, outer drop) so the whole card reads as a slightly raised tile
   * including the scene-info name plate. Hover swaps to --ts-bevel-hover
   * for a stronger lift. The `.scene-info` sits inside the card and
   * inherits the bottom inset shadow — no extra rule needed because the
   * card's `overflow: hidden` already clips the name plate to the rounded
   * corners so the bevel wraps cleanly around the whole tile. */
  .scene-card {
    cursor: pointer;
    border-radius: 8px;
    background: linear-gradient(165deg, rgba(var(--panel-hi-rgb),0.52) 0%, rgba(var(--panel-lo-rgb),0.40) 100%);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    outline: 1px solid transparent; outline-offset: 0;
    transition: border-color 0.2s, box-shadow 0.2s, outline-color 0.2s;
    border: 1px solid rgba(var(--brand-purple-rgb),0.55);
    box-shadow: var(--ts-bevel), 0 4px 16px rgba(0,0,0,0.22);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .scene-card:hover {
    border-color: rgba(var(--brand-purple-rgb),0.65);
    box-shadow: var(--ts-bevel-hover), 0 8px 28px rgba(0,0,0,0.45);
    outline: 1px solid rgba(var(--brand-purple-rgb),0.3); outline-offset: 0;
  }
  .detail-links { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; position: relative; z-index: 1; }
  .detail-link { display: inline-flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.02em; color: var(--dim); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 3px; padding: 2px 7px; text-decoration: none; transition: all 0.15s; }
  .detail-link:hover { background: rgba(var(--brand-purple-rgb),0.35); border-color: rgba(var(--brand-purple-rgb),0.4); color: var(--text); }
  .detail-link img { width: 14px; height: 14px; border-radius: 2px; }
  .detail-link.db-link { color: var(--text); border-color: rgba(var(--brand-purple-rgb),0.35); background: rgba(var(--brand-purple-rgb),0.35); font-weight: 500; }
  .scene-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: var(--raised); border-radius: 4px 4px 0 0; overflow: hidden; }
  .scene-thumb-placeholder { width: 100%; aspect-ratio: 16/9; background: var(--raised); display: flex; align-items: center; justify-content: center; color: var(--muted); border-radius: 4px 4px 0 0; overflow: hidden; }
  /* Studio + vice in-panel scene grid (rendered by
   * `loadDiscoverInfoPanel` in scenes-common.js). The grid CSS lives
   * in discover.html for that page; mirroring the same rules here so
   * /scenes constrains the cards to a 4–6 column grid instead of
   * letting them stack at full container width — which was making
   * each thumbnail render at ~2× its intended size. */
  .discover-info-scenes {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    grid-auto-rows: auto;
    gap: 12px;
    padding: 0;
    width: 100%;
    height: auto;
    margin: 0;
    align-content: start;
  }
  .discover-info-scenes--studio {
    grid-template-columns: repeat(4, minmax(0, 1fr));
    grid-auto-rows: auto;
    aspect-ratio: auto;
    width: 100%;
    height: auto;
    margin: 0;
    align-content: start;
  }
  @media (min-width: 1700px) {
    .discover-info-scenes--studio {
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }
  }
  @media (min-width: 2100px) {
    .discover-info-scenes--studio {
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }
  }
  .discover-info-scenes .scene-card { min-width: 0; }
  /* Source thumbs for these scenes are often wide multi-panel
   * collages (e.g. BackroomCastingCouch 5-up tile). The default
   * `aspect-ratio: 16/9 + object-fit: cover` crop chops them down
   * to ~30% of the source. Drop the aspect-ratio + use contain so
   * the full collage renders, scaled to the column width. */
  .discover-info-scenes .scene-card .img-load,
  .discover-info-scenes .scene-card .scene-thumb {
    aspect-ratio: auto !important;
    height: auto !important;
  }
  .discover-info-scenes .scene-card .scene-thumb {
    width: 100%;
    object-fit: contain !important;
  }
  .discover-info-scenes .scene-card .scene-title {
    font-size: 12px;
    line-height: 1.15;
  }
  .discover-info-scenes .scene-card .scene-date {
    font-size: 9px;
    margin-top: 3px;
  }
  .discover-info-scenes .scene-card .scene-info { padding: 6px 8px; }
  /* Image load placeholders (loader in app-shell.css) */
  .img-load { position: relative; overflow: hidden; background: var(--raised); isolation: isolate; transition: background-color 0.3s ease; }
  /* Duotone hover — natural image at rest, tinted grayscale on card hover */
  /* OLD: background-color: #0b0414; background: #BB4DFA; */
  /* Duotone hover — SVG filter does a real luminance-mapped duotone
   * between the theme's shadow and highlight colours. Defined in
   * theme-init.js; each theme points --duotone-filter at its own
   * url(#duotone-<name>). Legacy blend layers disabled below. */
  .img-load .duo-tint { display: none; }
  .img-load::after { content: none; }
  .scene-card:hover .img-load img,
  .movie-card:hover .img-load img { filter: var(--duotone-filter, none); }
  /* Studio logo overlay — sits above the duotone tints so it's never tinted.
   * Top-right corner, capped size, transparent background, dark drop-shadow
   * for legibility against any underlying art. .scene-studio-logo:hover img
   * is handled implicitly because the rule that grayscales the scene img
   * targets `.img-load img` not `.scene-studio-logo` (we exclude it via the
   * specific class selector below). */
  /* Source-DB badge (TPDB / StashDB / FansDB) pinned to the TOP-LEFT
   * corner, visible at rest. Fades out on hover so the top-left
   * headshot cluster (which fades IN on hover) has the corner to
   * itself. Only rendered in Search mode — see scene-card template. */
  .scene-card .scene-source-logo {
    position: absolute;
    top: 6px; left: 6px;
    z-index: 4;
    height: 20px;
    width: auto;
    max-width: 80px;
    object-fit: contain;
    pointer-events: none;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.85));
    transition: opacity 0.2s ease;
  }
  .scene-card:hover .scene-source-logo {
    opacity: 0;
  }
  /* Scene card studio logo → top-right, with room reserved on the
   * right edge for the wanted-eye button to sit beside it. */
  .scene-card .scene-studio-logo {
    position: absolute !important;
    top: 6px !important;
    right: 46px !important;
    left: auto !important;
    bottom: auto !important;
    z-index: 5;
    max-height: 45px;
    max-width: 135px;
    width: auto;
    height: auto;
    object-fit: contain;
    pointer-events: none;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7)) drop-shadow(0 0 3px rgba(0,0,0,0.45));
    background: transparent !important;
    border: none !important;
    padding: 0 !important;
    box-shadow: none !important;
  }
  /* Studios + Performers + Vices feeds render with a CRT/TV-frame
   * thumbnail. The default `top: 6px` puts the studio logo overlapping
   * the top bezel — push it down so it sits inside the visible "screen"
   * area of the TV frame, AND drop its z-index below the TV frame
   * (`.scene-card .img-load::before` at z=4 in app-shell.css:2274)
   * so the bezel paints OVER any portion of the logo that still
   * pokes into it. The visible part of the logo is whatever lands
   * inside the screen cut-out; the rest is naturally clipped by
   * the bezel. Search / movies modes keep the bezel-overlap
   * position with the logo on top. */
  #scenesGrid[data-feed-mode="studios"]    .scene-card .scene-studio-logo,
  #scenesGrid[data-feed-mode="performers"] .scene-card .scene-studio-logo,
  #scenesGrid[data-feed-mode="tags"]       .scene-card .scene-studio-logo {
    top: 22px !important;
    z-index: 3 !important;
  }
  /* Movie card studio logo → bottom-centre, always visible (not just on
   * hover), so the user can see which studio the release is from at a
   * glance without needing to mouseover. */
  .movie-card .scene-studio-logo {
    position: absolute !important;
    bottom: 8px !important;
    left: 50% !important;
    top: auto !important;
    right: auto !important;
    transform: translateX(-50%);
    z-index: 5;
    max-height: 44px;
    max-width: 72%;
    width: auto;
    height: auto;
    object-fit: contain;
    pointer-events: none;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7)) drop-shadow(0 0 3px rgba(0,0,0,0.45));
    background: transparent !important;
    border: none !important;
    padding: 0 !important;
    box-shadow: none !important;
  }
  /* Make sure the duotone grayscale doesn't apply to the studio-logo overlay. */
  .scene-card:hover .img-load .scene-studio-logo,
  html[data-duotone-inverted="1"] .scene-card .img-load .scene-studio-logo,
  html[data-duotone-inverted="1"] .scene-card:hover .img-load .scene-studio-logo,
  html[data-duotone-inverted="1"] .movie-card .img-load .scene-studio-logo {
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.85)) drop-shadow(0 0 6px rgba(0,0,0,0.55));
  }
  /* Movie cards on hover: big soft white halo behind the studio
   * logo so it lifts off the duotone'd poster instead of fading
   * into it. Two stacked drop-shadows — a tight black contour
   * for legibility, then a wide blurry white bloom that reads as
   * a backlight glow. */
  .movie-card:hover .img-load .scene-studio-logo,
  html[data-duotone-inverted="1"] .movie-card:hover .img-load .scene-studio-logo {
    filter:
      drop-shadow(0 1px 2px rgba(0, 0, 0, 0.85))
      drop-shadow(0 0 24px rgba(255, 255, 255, 0.85))
      drop-shadow(0 0 48px rgba(255, 255, 255, 0.55));
  }
  /* ── Inverted duotone mode (palette toggle in the "Your Feed" toolbar) ──
   * Default: clean at rest, duotone on hover.
   * Inverted: duotone at rest, clean on hover.
   * Scoped to .scene-card / .movie-card so the .spotlight-tile row stays
   * locked to its own rest-duotone / hover-clean behaviour regardless of
   * the toggle. */
  html[data-duotone-inverted="1"] .scene-card .img-load img,
  html[data-duotone-inverted="1"] .movie-card .img-load img { filter: var(--duotone-filter, none); }
  html[data-duotone-inverted="1"] .scene-card:hover .img-load img,
  html[data-duotone-inverted="1"] .movie-card:hover .img-load img { filter: none; }
  /* Palette toggle button — themed chrome for the Your Feed toolbar. */
  .scenes-palette-btn {
    width: 40px; height: 40px;
    padding: 0;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(var(--panel-hi-rgb), 0.55);
    border: 1px solid rgba(var(--brand-purple-rgb), 0.35);
    border-radius: 8px;
    color: var(--dim);
    font-size: 15px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  /* Tag-filter variant: needs to fit an icon + count badge, so swap the
   * fixed square for a pill with horizontal padding. */
  #tagFilterBtn.scenes-palette-btn {
    width: auto;
    min-width: 56px;
    padding: 0 12px;
    gap: 6px;
  }
  /* Feed-source logos — sit just left of the refresh button and reflect
   * the database(s) backing the active feed mode (Movies → TPDB, JAV →
   * JAVStash, Performers → StashDB | FansDB | JAVStash, etc.). Multi-
   * source rows use grip-lines-vertical dividers; tooltip names sources. */
  .feed-source-logos {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 0 2px;
  }
  .source-logo-sep {
    font-size: 12px;
    line-height: 1;
    color: rgba(var(--brand-purple-rgb), 0.55);
    opacity: 0.8;
    flex-shrink: 0;
    pointer-events: none;
    user-select: none;
  }
  .feed-source-logos .source-logo-sep {
    font-size: 11px;
    margin: 0 1px;
  }
  .feed-source-logos:empty { display: none; }
  .feed-source-logo {
    height: 20px;
    width: auto;
    object-fit: contain;
    opacity: 0.9;
    transition: opacity 0.15s;
  }
  .feed-source-logo:hover { opacity: 1; }
  .feed-source-logo--jav {
    display: inline-block;
    width: 18px; height: 18px;
  }
  .scenes-srch-label {
    display: block;
    font-size: 13px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 6px;
    font-family: var(--secs);
  }
  .scenes-srch-input {
    width: 100%;
    background: rgba(14,10,22,0.7);
    border: 1px solid rgba(var(--brand-purple-rgb),0.25);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-family: var(--mono);
    outline: none;
    transition: border-color 0.15s;
  }
  .scenes-srch-input:focus { border-color: rgba(var(--brand-purple-rgb),0.7); }
  /* Native date input calendar icon — recolour to brand purple. The
   * ::-webkit-calendar-picker-indicator comes from the UA stylesheet
   * as a dark glyph; an invert + hue-rotate chain shifts it to match
   * the rest of the search panel without needing a custom SVG. */
  .scenes-srch-input[type="date"]::-webkit-calendar-picker-indicator {
    cursor: pointer;
    opacity: 0.85;
    filter: invert(62%) sepia(63%) saturate(2000%) hue-rotate(235deg) brightness(100%) contrast(95%);
    transition: opacity 0.15s, filter 0.15s;
  }
  .scenes-srch-input[type="date"]::-webkit-calendar-picker-indicator:hover {
    opacity: 1;
  }
  /* Search panel layout — outer column wrap + inputs grid + source/action bar. */
  .scenes-srch-wrap {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  /* Title / keywords — compact field left of the DB toggle on the
   * actions bar; height matches the source toggle (40px). */
  .scenes-srch-input--title {
    flex: 0 1 220px;
    width: 220px;
    max-width: min(260px, 36vw);
    min-width: 120px;
    height: 40px;
    font-size: 13px;
    padding: 0 12px;
    margin: 0;
    box-sizing: border-box;
  }
  .scenes-srch-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px 14px;
  }
  /* Bottom row: title + DB toggle left; Search / Clear right. */
  .scenes-srch-bar {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    flex-wrap: wrap;
  }
  .scenes-srch-bar__primary {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    flex: 1 1 auto;
    min-width: 0;
  }
  .scenes-srch-sources-block {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
    /* Size to content (was `flex: 1 1 auto`). Stretching to fill the
     * row left an empty tinted strip between the toggle and the action
     * buttons that read as a non-clickable text input. Content-sized
     * pins the toggle to the left edge, with a clean gap before the
     * actions cluster on the right. */
    flex: 0 0 auto;
  }
  .scenes-srch-sources-head {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .scenes-srch-sources-head .scenes-srch-label {
    margin-bottom: 0;
  }
  .scenes-srch-srcs-toggle {
    background: rgba(14,10,22,0.55);
    border: 1px solid rgba(var(--brand-purple-rgb),0.25);
    color: var(--dim);
    font-family: var(--secs);
    font-size: 11px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    padding: 2px 9px;
    border-radius: 4px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .scenes-srch-srcs-toggle:hover {
    border-color: rgba(var(--brand-accent-rgb),0.6);
    color: var(--text);
    background: rgba(var(--brand-accent-rgb),0.12);
  }
  .scenes-srch-bar__actions {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    margin-left: auto;
  }
  /* Search-panel source toggle keeps the global `.ts-seg-multi` chrome
   * (purple gradient face, pink-accent edge, accent gradient on check)
   * so it reads as part of the same toggle family as the feed-mode
   * tabs at the top of the page. Only the face sizing / logo crop are
   * tightened here. */
  .scenes-srch-sources .ts-seg-multi__face {
    min-height: 40px;
    min-width: 0;
    padding: 0 18px;
  }
  .scenes-srch-sources .ts-seg-multi__face img {
    height: 20px;
    max-width: 84px;
  }
  /* Status line: pin to the right under the search button so it reads
   * as a hint next to where the action lives, not a centered banner. */
  .scenes-srch-status {
    font-size: 11px;
    color: var(--dim);
    text-align: right;
    font-family: var(--secs);
    letter-spacing: 0.02em;
    min-height: 14px;
  }
  .scenes-srch-status.is-error {
    color: var(--accent);
  }
  /* Search action button — pill with icon + label so the primary CTA
   * is unmissable. Disabled state for when sources or fields are
   * empty signals "you can't search yet" without a popup. */
  .scenes-palette-btn--search {
    background: rgba(var(--brand-purple-rgb), 0.22) !important;
    border-color: rgba(var(--brand-purple-rgb), 0.6) !important;
    min-width: 0;
    padding: 0 16px !important;
    width: auto;
    color: var(--text);
    gap: 8px;
  }
  .scenes-srch-go-label {
    font-family: var(--secs);
    font-size: 13px;
    letter-spacing: 0.04em;
    color: inherit;
  }
  .scenes-palette-btn--search:hover {
    border-color: rgba(var(--brand-accent-rgb), 0.75) !important;
    background: rgba(var(--brand-accent-rgb), 0.18) !important;
  }
  .scenes-palette-btn--search:disabled,
  .scenes-palette-btn--search[aria-disabled="true"] {
    opacity: 0.45;
    cursor: not-allowed;
    background: rgba(14,10,22,0.55) !important;
    border-color: rgba(var(--brand-purple-rgb),0.25) !important;
  }
  /* Widen the feed-mode toggle so six equal grid columns fit
   * “Performers” + the left-pinned FA / flag without cramping. */
  #feedModeToggle {
    min-width: 1080px;
  }
  #feedModeToggle .feed-mode-btn {
    padding-left: 20px;
    padding-right: 20px;
  }
  .scenes-palette-btn:hover {
    border-color: rgba(var(--brand-purple-rgb), 0.65);
    color: var(--text);
    background: rgba(var(--panel-hi-rgb), 0.78);
  }
  .scenes-palette-btn.is-active {
    color: var(--accent);
    border-color: rgba(var(--brand-accent-rgb), 0.7);
    background: rgba(var(--brand-accent-rgb), 0.1);
  }
  /* Palette toggle button active state (shared generic rule) */
  [data-duotone-toggle].is-active { outline: 1px solid rgba(var(--brand-accent-rgb),0.65); outline-offset: 1px; color: var(--accent); }
  .img-load img { position: relative; z-index: 2; opacity: 0; transition: opacity 0.15s ease, filter 0.3s ease; }
  .img-load.ready img { opacity: 1; }
  .skeleton-box, .skeleton-line {
    position: relative;
    overflow: hidden;
    background: rgba(255,255,255,0.06);
  }
  .skeleton-box::after, .skeleton-line::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 0;
    transform: translateX(-100%);
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
    animation: shimmer 1.25s infinite;
  }
  .skeleton-line { height: 12px; border-radius: 999px; margin-bottom: 8px; }
  .skeleton-chip {
    display: inline-block;
    width: 52px;
    height: 22px;
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    position: relative;
    overflow: hidden;
  }
  .skeleton-chip::after {
    content: '';
    position: absolute;
    inset: 0;
    transform: translateX(-100%);
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
    animation: shimmer 1.25s infinite;
  }
  @keyframes shimmer { 100% { transform: translateX(100%); } }
  /* Performer-name overlay, bottom-centre of the image.
   * Highlighter-style background at 50% opacity of the theme dark bg,
   * drawn only behind the text glyphs. Single line, ellipsis on overflow.
   * No bevel — flat pill. */
  .scene-performer-label {
    position: absolute;
    /* Anchor flush to the bottom edge of the image. Flex layout with
     * `align-items: flex-end` pins the pill's bottom to the label's
     * bottom — default `inline-block` + baseline-aligned text leaves
     * a descender gap that makes the tab float a few pixels above
     * the image edge. */
    bottom: 0; left: 0; right: 0;
    z-index: 5;
    padding: 0 10px;
    background: transparent;
    font-family: var(--secs);
    font-size: 12px;
    color: var(--text);
    letter-spacing: -0.01em;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    pointer-events: none;
    line-height: 1.2;
    transition: font-size 0.2s ease, top 0.2s ease, bottom 0.2s ease, transform 0.2s ease;
  }
  /* On hover: hide the performer pill so the tag chips own the
   * lower half of the tile unobstructed. The name was already
   * visible at rest, and the title strip below the image still
   * carries the scene/performer context. */
  .scene-card:hover .scene-performer-label {
    opacity: 0;
    pointer-events: none;
  }
  .scene-performer-label > .perf-hl {
    display: inline-block;
    max-width: 90%;
    /* Tab shape: rounded top corners, pointy bottom so the pill reads
     * as a tab whose bottom edge sits flush with the image. Extra
     * bottom padding keeps text from hugging the image edge. */
    padding: 4px 10px 5px;
    border-radius: 4px 4px 0 0;
    /* 85% opacity of the active theme's duotone "shadow" tone so the
     * pill takes on the same colour family as the studio/performer
     * tile duotone overlay. Falls back to the panel dark tone if no
     * duotone is configured, matching the original neutral look. */
    background: color-mix(in srgb, var(--duotone-lighten, rgba(var(--panel-lo-rgb), 1)) 85%, transparent);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-shadow: 0 1px 3px rgba(0,0,0,0.85);
  }
  /* Scene info block below the image — compact two-line layout:
   * line 1: title (1 line, ellipsis on overflow)
   * line 2: date · studio (1 line, ellipsis on overflow) */
  .scene-info {
    padding: 8px 10px;
    flex: 1;
    text-align: center;
    min-width: 0;
  }
  .scene-title {
    font-family: var(--secs); font-size: 14px; color: var(--text);
    line-height: 1.2;
    letter-spacing: -0.01em;
    text-align: center;
    /* Shrink-to-fit instead of ellipsis-truncate. Allow up to two
     * lines via line-clamp; the cqi-driven clamp() in app-shell.css
     * scales font-size with the card width so long titles drop in
     * size before wrapping is needed, and `word-break` lets the
     * remainder break cleanly if the second line is still tight. */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
    overflow-wrap: anywhere;
    max-width: 100%;
  }
  .scene-date {
    font-size: 11px;
    color: var(--dim);
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  /* When the studio logo overlay loaded, hide the text fallback in the meta
   * line. When it 404s (img removed on error), the class is never added and
   * the text name stays visible. */
  .scene-card.has-studio-logo .meta-studio-fallback,
  .movie-card.has-studio-logo .meta-studio-fallback { display: none; }
  /* Hover-only headshot row: circular avatars of library performers matching
   * the scene's performer names. Fetched lazily on first hover via
   * /api/performers/headshots-by-name — cached on the card so repeat hovers
   * don't refetch. Positioned top-left, inset enough to clear the CRT
   * bezel painted by `tv.png` (~5% on top, ~3% on the sides). Mirrors
   * the `top: 20%` shift the studio logo uses for the same reason.
   *
   * z-index 3 deliberately sits BELOW `tv.png` (z-4) so the bezel paints
   * over any portion of the avatar row that strays onto it — the
   * headshot reads as content sitting inside the TV screen, framed by
   * the chunky black bezel. The wanted-eye button keeps its higher
   * z-7 because it has to stay clickable. */
  .scene-headshots-hover {
    position: absolute;
    top: 7%; left: 4%;
    display: flex; flex-direction: row; gap: 4px;
    z-index: 3;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, top 0.2s ease, left 0.2s ease;
  }
  /* Wanted eye button — right side of every scene/movie card on hover.
   * Scene cards: sits just below the top-right studio logo.
   * Movie cards: top-right corner (no studio logo there to collide with).
   * Filled pink when already marked wanted, dim outline when not. */
  .scene-wanted-btn {
    position: absolute;
    top: 6px; right: 6px;
    z-index: 7;
    width: 32px; height: 32px;
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(20, 14, 30, 0.72);
    border: 1px solid rgba(var(--brand-accent-rgb), 0.45);
    border-radius: 50%;
    color: rgba(var(--brand-accent-rgb), 0.85);
    font-size: 14px;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transform: scale(0.85);
    transition: opacity 0.2s ease, transform 0.2s ease, background 0.15s, border-color 0.15s, color 0.15s;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
  }
  .scene-card:hover .scene-wanted-btn,
  .movie-card:hover .scene-wanted-btn {
    opacity: 1;
    pointer-events: auto;
    transform: scale(1);
  }
  .scene-wanted-btn:hover {
    border-color: rgba(var(--brand-accent-rgb), 0.9);
    background: rgba(var(--brand-accent-rgb), 0.18);
    color: var(--accent);
  }
  .scene-wanted-btn.is-wanted {
    background: rgba(var(--brand-accent-rgb), 0.92);
    border-color: rgba(var(--brand-accent-rgb), 1);
    color: rgba(20, 14, 30, 0.95);
    opacity: 1;
    pointer-events: auto;
    transform: scale(1);
  }
  .scene-wanted-btn.is-wanted:hover {
    background: rgba(var(--brand-accent-rgb), 1);
  }
  /* Scene-card wanted-eye sits TO THE RIGHT of the top-right studio
   * logo, on the same horizontal band. The logo rule above reserves a
   * 46px gutter on the right edge for this button. Movie cards keep
   * the 6px default — their studio logo is at the bottom-centre, so
   * the top-right eye has no collision. */
  .scene-card .scene-wanted-btn {
    top: 6px;
    right: 6px;
  }
  /* Tag chips anchored to the bottom of the scene thumbnail on hover —
   * only applied to the landscape .scene-card (not .movie-card). The
   * container grows upward from the bottom with ``align-content: flex-end``
   * so excess rows clip off the top rather than spilling over the
   * enlarged performer name. The 10-tag cap + "+N more" chip in the
   * renderer means overflow is rare, so no soft-fade mask is needed. */
  .scene-card-tags-hover {
    position: absolute;
    left: 6%; right: 6%;
    /* Tags sit above the lower CRT bezel painted by `tv.png` — the
     * bezel takes the bottom ~10% of the card, so anchor the chips
     * above that band. Mirrors the studio-logo inset so the popup
     * reads as content "inside the TV screen". */
    bottom: 12%;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-content: flex-end;
    gap: 5px;
    max-height: 46%;
    overflow: hidden;
    /* z-3 sits BELOW the TV bezel (tv.png at z-4) — same trick the
     * headshots use, so chip rows that drift onto the bezel are clipped
     * by it and the whole layout reads as content "inside the TV
     * screen". Bezel masks; chips never poke into the chunky frame. */
    z-index: 3;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, bottom 0.2s ease;
  }
  .scene-card:hover .scene-card-tags-hover { opacity: 1; }
  .scene-card-tag-chip {
    position: relative;
    display: inline-flex;
    align-items: center;
    padding: 3px 10px 3px 16px;
    background: rgba(var(--brand-accent-rgb), 0.92);
    color: rgba(20, 14, 30, 0.95);
    font-size: 11px;
    font-family: var(--secs);
    letter-spacing: 0.04em;
    white-space: nowrap;
    line-height: 1.45;
    /* Pentagon with a notched point on the left — classic luggage-tag
     * silhouette. The point is 8px deep; right edge stays rectangular. */
    clip-path: polygon(8px 0, 100% 0, 100% 100%, 8px 100%, 0 50%);
    /* Layered drop-shadow reads like a proper cast shadow beneath the
     * tag — 1px inner edge for definition, 6px soft body for lift. */
    filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.55))
            drop-shadow(0 4px 8px rgba(0, 0, 0, 0.45));
  }
  /* The "string hole" — a small dark circle inside the notched tip.
   * Positioned to sit on the tag's left edge just inside the point. */
  .scene-card-tag-chip::before {
    content: '';
    position: absolute;
    left: 5px;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(20, 14, 30, 0.85);
    pointer-events: none;
  }
  .scene-card:hover .scene-headshots-hover,
  .movie-card:hover .scene-headshots-hover { opacity: 1; }
  .scene-headshot-avatar {
    width: 63px; height: 63px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(var(--bg-rgb), 0.85);
    /* Themed brand-purple ring around the avatar — 50% opacity so it
     * reads softly against any backdrop on hover. The headshots only
     * appear on card hover, so this is effectively the hover-state
     * border too. */
    box-shadow: 0 2px 6px rgba(0,0,0,0.55), 0 0 0 1px rgba(var(--brand-purple-rgb), 0.5);
    background: var(--raised);
  }
  /* Override the hover grayscale that applies to .img-load img so the
   * hover headshots stay full-colour even though they live inside .img-load. */
  .scene-card .img-load .scene-headshot-avatar,
  .movie-card .img-load .scene-headshot-avatar,
  .scene-card:hover .img-load .scene-headshot-avatar,
  .movie-card:hover .img-load .scene-headshot-avatar,
  html[data-duotone-inverted="1"] .scene-card .img-load .scene-headshot-avatar,
  html[data-duotone-inverted="1"] .movie-card .img-load .scene-headshot-avatar {
    filter: none !important;
  }

  /* ── Movie-card overrides ─────────────────────────────────────────
   * Movies are portrait posters; performers/logo share the frame
   * differently than a landscape scene still:
   *   - Studio logo: hover-only (clean at rest), centered across the
   *     top so any poster typography has a recognisable banner when
   *     the user is hunting for a specific studio's release.
   *   - Headshots: centred in the middle of the poster, bigger than
   *     the scene cards (90px), wrapping into rows with a subtle
   *     horizontal overlap so a 15-performer blockbuster still reads
   *     as a pile instead of spilling into the logo band.
   */
  /* Movie-card studio-logo positioning is handled by the base rule
   * above (bottom-centre, always visible). This block used to swap the
   * logo to top-centre on hover — no longer needed. */
  .movie-card .scene-headshots-hover {
    /* Stretched to fill the full available band (top→bottom of the
     * poster, minus a strip reserved for the studio logo when one
     * is present). 2-column CSS Grid with `grid-auto-rows: 1fr`
     * splits the band into equal-height row tracks; cells fill
     * each track and clip to a square (see avatar rule below).
     * Last row's lone odd cell spans both columns so it centres
     * instead of hugging the left edge. */
    top: 8px;
    bottom: 8px;
    left: 4%;
    right: 4%;
    transform: none;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    grid-auto-rows: minmax(0, 1fr);
    place-content: center;
    place-items: center;
    gap: 4%;
    width: auto;
    max-width: none;
    max-height: none;
  }
  /* Reserve bottom strip for the studio logo (max-height 44px + 16px
   * breathing room) when one is present, so the headshots never spill
   * onto the logo. When absent, the headshots get the full poster. */
  .movie-card.has-studio-logo .scene-headshots-hover {
    bottom: 60px;
  }
  /* If the cell count is odd, the lone cell on the last row spans
   * both columns and centres itself — no wasted half-row. */
  .movie-card .scene-headshots-hover > :nth-child(odd):last-child {
    grid-column: 1 / -1;
  }
  .movie-card .scene-headshots-hover .scene-headshot-avatar {
    /* `width:100%` + `aspect-ratio:1` makes the avatar square at
     * the track width; `max-height:100%` then caps to the track
     * height, which forces aspect-ratio to recompute and shrink
     * the width to match — net effect is `min(track_w, track_h)`,
     * so cells stay square AND fit inside their grid track. */
    width: 100%;
    height: auto;
    max-width: 100%;
    max-height: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.75), 0 0 0 2px rgba(var(--brand-purple-rgb), 0.55);
    border: 2px solid rgba(var(--bg-rgb), 0.95);
    position: relative;
    transition: transform 140ms ease;
  }
  /* Hover-lift for the individual face the user is inspecting — tiny
   * affordance that surfaces the name via the browser tooltip. */
  .movie-card .scene-headshots-hover .scene-headshot-avatar:hover {
    transform: scale(1.08);
    z-index: 10;
  }
  /* "+N" overflow chip — rendered by ensureCardHeadshots when a movie
   * has more performers than the layout can show cleanly. Same size
   * as the avatars, brand-accent tint so it reads as a UI chip rather
   * than a face. */
  .movie-card .scene-headshots-hover .scene-headshot-more {
    /* Same fill-the-track sizing as the avatars above. */
    width: 100%;
    height: auto;
    max-width: 100%;
    max-height: 100%;
    aspect-ratio: 1;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(var(--brand-purple-rgb), 0.35);
    color: var(--text);
    font-family: var(--secs, "Impact Label Reversed", sans-serif);
    font-size: clamp(11px, 6cqi, 22px);
    letter-spacing: -0.01em;
    border: 2px solid rgba(var(--bg-rgb), 0.95);
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.75), 0 0 0 2px rgba(var(--brand-purple-rgb), 0.65);
    user-select: none;
  }

  /* Search results */
  .search-result { display: grid; grid-template-columns: 1fr auto auto auto; gap: 12px; align-items: center; padding: 10px 18px; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .search-result:last-child { border-bottom: none; }
  .sr-title { font-size: 12px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sr-meta  { font-size: 11px; color: var(--dim); margin-top: 2px; }

  .sr-size    { font-size: 11px; color: var(--dim); white-space: nowrap; }
  .scene-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.84);
    z-index: 1100;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);

  .scene-overlay.open { display: flex; }
  .scene-overlay-card {
    width: min(1280px, 96vw);
    max-height: 90vh;
    overflow-y: auto;
    border-radius: 8px;
    background: linear-gradient(160deg, rgba(var(--panel-hi-rgb),0.98) 0%, rgba(var(--panel-lo-rgb),0.95) 100%);
    border: 1px solid var(--border);
    box-shadow: 0 32px 80px rgba(0,0,0,0.5);
  }
  .scene-overlay-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);

  /* Performers / Studios / Vices popup — studio mark between title and search */
  .scene-overlay-studio-logo-row {
    display: none;
    align-items: center;
    justify-content: flex-start;
    padding: 0 14px 10px;
    min-height: 0;
  }

    display: flex;
  }

    display: block;
    max-width: 220px;
    max-height: 44px;

    height: auto;

  /* Feed popup: bare thumb — no logo / headshots / tag chips on the image */
  .scene-overlay.scene-overlay--feed-clean .scene-card--popup .scene-studio-logo,
  .scene-overlay.scene-overlay--feed-clean .scene-card--popup .scene-headshots-hover,
  .scene-overlay.scene-overlay--feed-clean .scene-card--popup .scene-card-tags-hover,
  .scene-overlay.scene-overlay--feed-clean .scene-card--popup .scene-performer-label {
    display: none !important;

    pointer-events: none !important;

  .add-success-title {
    font-family: var(--acid);
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: var(--text);
    text-transform: none;

  .add-success-prowl-wrap {
    max-height: min(50vh, 420px);
    overflow-y: auto;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    background: rgba(0,0,0,0.15);
  }
  /* `stretch` makes the right-side text column equal the image
   * column's height so the tag list can fill all the way down to
   * the image bottom. */
  .scene-overlay-grid { display: grid; grid-template-columns: 520px 1fr; gap: 14px; align-items: stretch; }
  /* Right column becomes a flex stack so the tag block can claim the
   * leftover vertical space under the performer info — bounded by
   * the column's actual height (== image height). */
  .scene-overlay-grid > :nth-child(2) {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  /* Tags fill all remaining height in the right column. Hover lifts
   * the implicit cap (column height) by switching to a tall absolute
   * max-height and revealing any chips that were clipped. */
  .scene-overlay-tags-capped {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 12px;
    flex: 1 1 0;
    min-height: 0;
    overflow: hidden;
    align-content: flex-start;
    position: relative;
    transition: max-height 0.25s ease;
  }
  .scene-overlay-tags-capped::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 32px;
    background: linear-gradient(to bottom, rgba(0,0,0,0), rgba(8,4,16,0.85));
    pointer-events: none;
    opacity: 1;
    transition: opacity 0.25s ease;
  }
  .scene-overlay-tags-capped:hover {
    flex: 0 0 auto;
    max-height: 1200px;
    overflow: visible;
  }
  .scene-overlay-tags-capped:hover::after { opacity: 0; }
  /* "+N more" pill that signals there are tags hidden below the cap.
   * Anchored bottom-center over the fade so users discover the hover-
   * to-expand affordance instead of guessing. JS toggles `.is-shown`
   * after measuring how many chips overflow. */
  .scene-overlay-tags-more-pill {
    position: absolute;
    left: 50%;
    bottom: 4px;
    transform: translateX(-50%);
    padding: 3px 10px;
    font-family: var(--secs);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text);
    background: rgba(var(--brand-purple-rgb), 0.22);
    border: 1px solid rgba(var(--brand-purple-rgb), 0.55);
    border-radius: 999px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
    z-index: 2;
    white-space: nowrap;
  }
  .scene-overlay-tags-more-pill.is-shown { opacity: 1; }
  .scene-overlay-tags-capped:hover .scene-overlay-tags-more-pill { opacity: 0; }
  /* Compact DB-link buttons in the search-row right stack — TPDB,
   * StashDB, FansDB get the same square chip treatment so they read
   * as a related cluster next to the Prowlarr search button. */
  .scene-overlay-db-link {
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;

    transition: border-color 0.15s, background 0.15s;

  .scene-overlay-db-link img {

  /* Plot strip below the grid — full width of the popup. */
  .scene-overlay-plot-below {

  .scene-overlay-thumb-card .img-load {
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 6px;

  /* Popup-card modifier — applied to the .scene-card inside the scene
   * detail overlay. Flips every hover-gated chrome element (wanted-eye,
   * headshots row, tag chips, performer label) to always-visible, since
   * the popup has no hover state (the user has already clicked) and we
   * want the popup image to mirror the on-card hover layout. The
   * underlying rules in this file gate these on `.scene-card:hover` and
   * `.scene-card-tags-hover` opacity — the !important overrides win

  .scene-card--popup .scene-wanted-btn,
  .scene-card--popup .scene-headshots-hover,
  .scene-card--popup .scene-card-tags-hover {
    opacity: 1 !important;
    pointer-events: auto !important;

  .movie-grid {

  .movie-card:hover .img-load::after { opacity: var(--duotone-opacity, 1); }
  .movie-poster { width: 100%; aspect-ratio: 27/40; object-fit: cover; display: block; background: var(--raised); border-radius: 8px 8px 0 0; overflow: hidden; }
  /* JAV feed: distinct front + back URLs — half-width columns (back left / front right), same crop rules as `tsApplyMovieCoverSplit`. */
  .movie-card .img-load.img-load--jav-duo {
    display: flex;
    flex-direction: row;
    align-items: stretch;
    aspect-ratio: 27 / 40;
  }
  .movie-card .img-load.img-load--jav-duo .jav-duo-slot {
    flex: 1 1 50%;
    min-width: 0;
    position: relative;
    overflow: hidden;
    background: var(--raised);
  }
  .movie-card .img-load.img-load--jav-duo .jav-duo-slot--back { border-radius: 8px 0 0 0; }
  .movie-card .img-load.img-load--jav-duo .jav-duo-slot--front { border-radius: 0 8px 0 0; }
  .movie-card .img-load.img-load--jav-duo .jav-duo-slot .movie-poster {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    aspect-ratio: unset;
    border-radius: inherit;
    object-fit: cover;
  }
  .movie-poster-placeholder { width: 100%; aspect-ratio: 27/40; background: var(--raised); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 28px; border-radius: 8px 8px 0 0; overflow: hidden; }
  /* Match .scene-info — flat, transparent, no dark strip. */
  .movie-info { padding: 8px 10px; flex: 1; min-width: 0; text-align: center; }
  .movie-title {
    font-family: var(--secs); font-size: 14px; color: var(--text);
    line-height: 1.2; letter-spacing: -0.01em; text-align: center;
    /* Allow up to 2 lines, then ellipsis. The cqi-driven clamp()
     * in app-shell.css scales font-size with card width so long
     * titles drop in size before wrapping is needed. */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
    overflow-wrap: anywhere;
    max-width: 100%;
  }
  .movie-meta {
    font-size: 11px; color: var(--dim); margin-top: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
  }

  /* Movie search results in search panel */
  .movie-search-results { overflow-y: auto; flex: 1; min-height: 0; }
  .movie-search-result { display: flex; gap: 10px; padding: 8px 6px; border-radius: 6px; cursor: pointer; transition: background 0.15s; align-items: flex-start; }
  .movie-search-result:hover { background: rgba(255,255,255,0.04); }
  .movie-search-poster { width: 50px; aspect-ratio: 27/40; border-radius: 4px; object-fit: cover; flex-shrink: 0; background: var(--raised); }
  .movie-search-poster-ph { width: 50px; aspect-ratio: 27/40; border-radius: 4px; background: var(--raised); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 16px; flex-shrink: 0; }

  /* Movie detail overlay */
  .movie-detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1100; align-items: center; justify-content: center; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
  .movie-detail-overlay.open { display: flex; }
  .movie-detail-card {
    background: linear-gradient(160deg, rgba(var(--panel-hi-rgb),0.98) 0%, rgba(var(--panel-lo-rgb),0.95) 100%);
    border-radius: 6px; max-width: 1380px; width: 92vw; max-height: 88vh; overflow-y: auto;
    position: relative; box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  }
  .movie-detail-bg { position: absolute; top: 0; left: 0; width: 100%; height: 300px; object-fit: cover; opacity: 0.15;
    mask-image: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
    pointer-events: none; }
  .movie-detail-inner { position: relative; z-index: 1; padding: 28px; display: flex; gap: 28px; align-items: flex-start; }
  /* Side-by-side VHS frame. Poster on the LEFT, VHS sticking out to
   * the RIGHT with 75% of it visible past the poster's right edge
   * (25% overlapping behind the poster). VHS is a few pixels shorter
   * than the poster (top/bottom 4px gap) per spec.
   *   z=0 .movie-detail-vhs-bg          — vhs.png, right-aligned, random hue
   *   z=1 .movie-detail-studio-logo-rotated — studio logo, -90° CCW, centered on visible vhs
   *   z=2 .movie-detail-poster-card     — the actual poster, full wrap height, on the left
   *
   * Math: poster 65% wide → 35% remains; that's 75% of the vhs, so
   * vhs ≈ 46.67% wide. Right-anchored, the vhs spans 53.33%–100%, with
   * the slice 53.33%–65% sitting behind the poster. */
  .movie-detail-poster-wrap {
    position: relative;
    /* Wrap aspect chosen so poster and vhs natural aspects both fit:
     *   poster aspect 27:40 → width = 0.675 × H
     *   vhs natural aspect 1000:1813 → width = 0.552 × H
     *   With 25% of vhs hidden behind the poster:
     *     wrap_w = poster_w + 0.75 × vhs_w
     *            = 0.675H + 0.75 × 0.552H = 1.089 × H
     *   ⇒ wrap aspect 1.089/1 (≈ 580/533). */
    width: 580px; min-width: 580px; max-width: 580px;
    aspect-ratio: 580 / 533;
    flex-shrink: 0;
    /* `align-self: flex-start` prevents the flex row's `align-
     * items: stretch` from overriding the wrap's aspect-ratio
     * height when the text column has lots of content. Without
     * it, a tall text column makes the row stretch, which
     * stretches the wrap, which scales the absolutely-positioned
     * poster + VHS imagery (top:0;bottom:0) out of proportion. */
    align-self: flex-start;
    background: transparent; box-shadow: none; border-radius: 0;
    overflow: visible;
  }
  .movie-detail-vhs-bg {
    position: absolute;
    /* Sized BY HEIGHT only (top/bottom: 0) and the natural vhs aspect.
     * No explicit width means the browser computes width = height ×
     * 1000/1813, so the rendered image is at 100%-stretch with NO
     * distortion. Right-anchored so it sticks out past the poster. */
    top: 0; bottom: 0;
    right: 0;
    aspect-ratio: 1000 / 1813;
    z-index: 0;
    background: url('/static/img/vhs.png') center / 100% 100% no-repeat;
    filter: hue-rotate(var(--vhs-hue, 0deg));
    pointer-events: none;
  }
  .movie-detail-studio-logo-rotated {
    position: absolute;
    /* Visible vhs spans roughly 60%–100% → logo centred around 82%,
     * title around 70%. */
    top: 50%; left: 82%;
    transform: translate(-50%, -50%) rotate(-90deg);
    z-index: 1;
    /* Hard-capped: some studio logos are tall/wide enough that the
     * old 30%/24% caps spilled outside the cassette label area into
     * the spool wells. Tightened to 20%/16%. */
    max-width: 20%;
    max-height: 16%;
    object-fit: contain;
    pointer-events: none;
    opacity: 0.92;
  }
  .movie-detail-vhs-title-rotated {
    position: absolute;
    /* Sits to the LEFT of the studio logo (logo at 82%, title at 70%). */
    top: 50%; left: 70%;
    transform: translate(-50%, -50%) rotate(-90deg);
    z-index: 1;
    /* Pre-rotation `width` becomes the post-rotation visible HEIGHT
     * (≈ middle 40% of vhs height). Allowing the text to wrap into
     * multiple lines stacks them as parallel columns post-rotation. */
    width: 30%;
    white-space: normal;
    line-height: 1.1;
    word-break: break-word;
    text-align: center;
    font-family: var(--secs);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #000;
    pointer-events: none;
  }
  .movie-detail-poster-card {
    position: absolute;
    /* Full wrap height on the left, with the natural poster aspect. */
    top: 0; bottom: 0;
    left: 0;
    aspect-ratio: 27 / 40;
    z-index: 2;
    border-radius: 4px;
    overflow: hidden;
    background: var(--raised);
    box-shadow:
      0 10px 28px rgba(0, 0, 0, 0.65),
      0 4px 12px rgba(0, 0, 0, 0.45),
      0 1px 0 rgba(255, 255, 255, 0.04) inset;
  }
  .movie-detail-poster-card .img-load { position: absolute; inset: 0; }
  .movie-detail-poster-card .img-load img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .movie-detail-poster-card .img-load > .movie-poster-placeholder { position: absolute; inset: 0; width: 100%; height: 100%; aspect-ratio: unset; font-size: 40px; }
  .movie-detail-text { flex: 1; min-width: 0; }
  .movie-detail-title { font-family: var(--acid); font-size: 28px; color: var(--text); margin-bottom: 8px; }

  .movie-detail-performers { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
  .movie-perf-tag { font-family: var(--mono); font-size: 10px; color: var(--text); background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 3px; padding: 2px 8px; text-decoration: none; display: inline-block; }
  a.movie-perf-tag:hover { border-color: var(--accent); color: var(--accent); }
  .movie-detail-actions { display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
  .movie-btn-action { padding: 8px 16px; border-radius: 4px; font-family: var(--mono); font-size: 12px; cursor: pointer; border: none; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
  .movie-btn-prowlarr { background: var(--accent); color: #0c0c0e; }
  .movie-btn-prowlarr:hover { filter: brightness(1.1); }
  .movie-btn-link { background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid var(--border); }
  .movie-btn-link:hover { border-color: var(--muted); }
  .movie-detail-close { position: absolute; top: 14px; right: 14px; z-index: 2; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: var(--dim); font-size: 13px; cursor: pointer; transition: background 0.15s, border-color 0.15s, color 0.15s; }
  .movie-detail-close:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.2); color: var(--text); }
  .movie-detail-scenes { padding: 16px 28px 24px; border-top: 1px solid var(--border); }
  .movie-detail-scenes-title { font-family: var(--acid); font-size: 18px; color: var(--text); margin-bottom: 10px; }
  .movie-detail-scene-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
  .movie-detail-scene-card { border-radius: 4px; overflow: hidden; background: var(--raised); min-height: 154px; min-width: 0; }
  .movie-detail-scene-card .img-load { width: 100%; aspect-ratio: 16/9; }
  .movie-detail-scene-card .img-load img.movie-detail-scene-thumb { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
  .movie-detail-scene-thumb-ph { width: 100%; aspect-ratio: 16/9; background: var(--raised); }
  .movie-detail-scene-info { padding: 6px 8px; font-size: 10px; color: var(--dim); }
  .lib-perfs-row {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-start; margin-bottom: 14px;
  }

  /* Movie prowlarr overlay */

<body>
<!-- Static tritone SVG filter referenced by `.spotlight-tile:hover img`
     in app-shell.css (VHS theme only). Pipeline:
       1. Rec.709 luminance reduction → grayscale.
       2. Linear contrast pre-map (slope 1.45, intercept -0.225).
       3. 5-entry tritone table at L=[0, 0.25, 0.5, 0.75, 1] mapping
          to shadow → mix(shadow,mid,30%) → mid → mix(mid,highlight,65%)
          → highlight, where:
            shadow    #480DF5  (rgb 0.282, 0.051, 0.961)
            midtone   #C92FAE  (rgb 0.788, 0.184, 0.682)
            highlight #FF7621  (rgb 1.000, 0.463, 0.129)
       Table values precomputed offline so the runtime cost is just
       the SVG filter pass. -->
<svg id="spotlight-bloom-svg" width="0" height="0" style="position:absolute;width:0;height:0;pointer-events:none" aria-hidden="true">
  <defs>
    <!-- Bloom pre-pass only — the duotone itself comes from the
         user's Appearance settings via the runtime-built filter
         that `--duotone-filter` points at. The CSS rule for
         `.spotlight-tile img` chains the two:
            filter: url(#spotlight-bloom) var(--duotone-filter, none)
         so the bloomed pixels feed into whatever palette /
         midpoint / contrast / balance values the user has
         configured (or the manual `--spotlight-duotone-override`
         set on the tile / page if present). -->
    <filter id="spotlight-bloom" color-interpolation-filters="sRGB">
      <!-- 1. Extract highlights via a steep linear ramp. -->
      <feComponentTransfer in="SourceGraphic" result="ts-bright">
        <feFuncR type="linear" slope="2.6" intercept="-1.3"/>
        <feFuncG type="linear" slope="2.6" intercept="-1.3"/>
        <feFuncB type="linear" slope="2.6" intercept="-1.3"/>
      </feComponentTransfer>
      <!-- 2. Blur the highlight pass into a soft halo. -->
      <feGaussianBlur in="ts-bright" stdDeviation="9" result="ts-bloom-full"/>
      <!-- 3. Halve the halo strength so the glow is moderate. -->
      <feComponentTransfer in="ts-bloom-full" result="ts-bloom">
        <feFuncR type="linear" slope="0.5"/>
        <feFuncG type="linear" slope="0.5"/>
        <feFuncB type="linear" slope="0.5"/>
      </feComponentTransfer>
      <!-- 4. Screen-blend onto SourceGraphic. The final feBlend
              has no `result`, so its output is the filter's
              output and feeds into the next chained SVG filter. -->
      <feBlend in="SourceGraphic" in2="ts-bloom" mode="screen"/>
    </filter>
  </defs>
</svg>
