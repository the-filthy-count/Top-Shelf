  /* Search */

  .field-input { background: var(--raised); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-family: var(--mono); font-size: 12px; width: 100%; outline: none; transition: border-color 0.15s; }

  /* Results */
  /* ── Spotlight performer row ── */
  .spotlight-row {
    display: flex;

.spotlight-tile {
  flex: 1;
  min-width: 0;
  position: relative;
  height: 120px;
  border-radius: 7px;
  overflow: hidden;
  cursor: pointer;
  border: 1px solid rgba(var(--brand-purple-rgb), 0.14);
  transition: border-color 0.2s, outline-color 0.2s, background-color 0.3s ease;
  outline: 1px solid transparent;
  outline-offset: 0;
  /* Duotone: orange multiply + purple lighten */
  background: transparent;
  isolation: isolate;
}

.spotlight-tile:hover {
  border-color: rgba(var(--brand-purple-rgb), 0.55);
  outline-color: rgba(var(--brand-purple-rgb), 0.3);
}

.spotlight-tile img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  /* Per-image brightness/contrast/hue are computed in JS (autoLevelSpotlightImage)
   * from a pixel histogram, then written to these custom properties. The
   * trailing SVG duotone filter (from theme-init.js) does the luminance-
   * mapped interpolation between shadow and highlight colours. */
  filter: brightness(var(--auto-b, 1.06))
          contrast(var(--auto-c, 1.12))
          hue-rotate(var(--auto-h, 0deg))
          var(--duotone-filter, none);
  transition: filter 0.3s ease;
}

.spotlight-tile:hover img {
  /* Hover reveals the clean image with the same auto-levels / white-balance
   * correction applied so the natural colours read warm and saturated. */
  filter: brightness(var(--auto-b-hover, 1.04))
          contrast(var(--auto-c-hover, 1.1))
          hue-rotate(var(--auto-h, 0deg))
          saturate(1.22);
}

/* Legacy blend-mode duotone layers disabled — SVG filter on the img
 * above does the duotone directly. */
.spotlight-tile::before,
.spotlight-tile::after {
  content: none;
}
  .spotlight-tile:hover::before,
  .spotlight-tile:hover::after {
    opacity: 0;
  }
  .spotlight-score-badge {
    position: absolute; top: 5px; right: 5px;
    background: rgba(18,12,28,0.82); border: 1px solid rgba(var(--brand-purple-rgb),0.3);
    color: var(--accent); font-size: 10px; font-family: var(--mono);
    padding: 2px 5px; border-radius: 4px; letter-spacing: 0.04em;
    opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 2;
  }
  .spotlight-tile:hover .spotlight-score-badge { opacity: 1; }
  .spotlight-exclude-btn {
    position: absolute; top: 5px; left: 5px; z-index: 10;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(var(--brand-purple-rgb),0.6); border: 1px solid rgba(var(--brand-purple-rgb),0.55);
    color: #fff; font-size: 13px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; opacity: 0; transition: opacity 0.2s, background 0.15s;

    opacity: 1; pointer-events: auto;
  }
  .spotlight-exclude-btn:hover { background: rgba(var(--brand-purple-rgb),0.7); }
.spotlight-tile-name {
    /* Pinned to the bottom-left corner so the duotone pill runs from
     * the very bottom of the tile upward — no gap below the rotated
     * text. */
    position: absolute; bottom: 0; left: 0;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-family: var(--secs);
    font-size: 18px;
    color: var(--text);
    text-shadow: 0 1px 4px rgba(0,0,0,1), 0 2px 12px rgba(0,0,0,0.8);
    letter-spacing: 0.02em;
    pointer-events: none;
    z-index: 1;
    max-height: 100%;
    overflow: hidden;
    line-height: 1.1;
    /* 85% opacity of the duotone "shadow" tone so the name pill reads
     * as part of the same colour family as the tile image. Falls back
     * to the panel dark tone when no duotone is configured. Only the
     * outer corners get rounded so the pill visually "tabs" out of
     * the tile's bottom-left corner. */
    padding: 10px 6px;
    border-radius: 0 4px 4px 0;
    background: color-mix(in srgb, var(--duotone-lighten, rgba(var(--panel-lo-rgb), 1)) 85%, transparent);
    transition: background 0.15s;
  }
  /* On hover, drop the pill so the full tile image is unobscured —
   * the text-shadow on the name carries enough legibility on its own. */
  .spotlight-tile:hover .spotlight-tile-name { background: transparent; }
  /* Spotlight tiles inside the detail panel — full height, no radius */
  #spotlightGrid { display: flex; }
  #spotlightGrid .spotlight-tile {
    height: 100%;
    border-radius: 0;
    border: none;
    outline: none;
    border-right: 1px solid rgba(0,0,0,0.35);
  }
  #spotlightGrid .spotlight-tile:last-child { border-right: none; }
  /* Tighter padding than the base tiles — the rotated name starts
   * flush at the bottom-left corner rather than floating mid-tile. */
  #spotlightGrid .spotlight-tile-name { font-size: 22px; padding: 6px 4px; }

  @media (max-width: 768px) {
    #spotlightGrid { overflow-x: auto; }
    #spotlightGrid .spotlight-tile { min-width: 180px; flex: 0 0 180px; }
  }

    .result-item { display: flex; align-items: center; gap: 12px; padding: 10px; min-height: 76px; border-radius: 5px; border: 1px solid rgba(var(--brand-purple-rgb),0.1); cursor: pointer; transition: background 0.15s, border-color 0.15s; margin-bottom: 4px; }

  /* Detail panel */

  .detail-bio { font-size: 12px; color: var(--dim); margin-top: 12px; line-height: 1.8; overflow-y: auto; position: relative; z-index: 1; }
  .detail-links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; position: relative; z-index: 1; }

  #detailBgImage::after { content: ''; position: absolute; inset: 0; background: linear-gradient(160deg, rgba(var(--panel-lo-rgb),0.82) 0%, rgba(12,10,20,0.55) 100%); pointer-events: none; z-index: 1; }

  /* Dest picker */

  /* ── /scenes mobile optimisation (≤640px) ──
     Stack the two-column Search/Detail row, shrink fixed panel heights
     (desktop hard-codes 460px), collapse the feed-mode toggle to
     icons-only via the shared .btn-label utility. */
  @media (max-width: 640px) {
    .layout {
      grid-template-columns: 1fr !important;
      gap: 12px !important;
    }
    .layout > .panel {
      height: auto !important;
      max-height: 60vh;
    }
    /* Hide the 10-performer spotlight strip on mobile — the user wants
     * the search panel and its results to be the focus there. The
     * spotlight detail column still renders the clicked performer's
     * scene feed; we just drop the row of tiles above it.
     * NOTE: .scenes-toolbar-feed (the 5-button Movies/Performers/
     * Studios/Vices/Search category toggle below) MUST stay visible —
     * without it the feed gets stuck on whatever mode loaded last. */
    #spotlightRow,
    .spotlight-row {
      display: none !important;
    }
    /* Also hide the entire detail panel + the spotlight grid that sits
     * absolutely positioned inside it. On desktop the detail panel
     * doubles as the spotlight surface, but on mobile any sliver of
     * it (collapsed height, leftover background image) shows through
     * as visual noise above the search results. */
    .layout > .panel:nth-child(2),
    #spotlightGrid,
    #spotlightBackBtn,
    #detailBgImage {
      display: none !important;
    }
    /* Detail panel internal layout: poster + text stack vertically so
       each has a readable width on a phone. Keep the poster bounded
       so it doesn't push the text off-screen. */
    #detailLayout {
      flex-direction: column !important;
      gap: 12px !important;
    }
    #detailPoster {
      max-height: 220px;
      align-self: center !important;
    }
    #detailPoster img {
      max-height: 220px;
      width: auto;
    }
    /* Scenes toolbar: title, feed toggle, source pills stack vertically.
     * Desktop puts .scenes-toolbar-feed at position:absolute centered
     * over the toolbar — that overlaps the title once the toolbar
     * collapses to a column on mobile. Reset to static so the toggle
     * sits in the normal flow under the title. */
    .scenes-toolbar {
      flex-direction: column !important;
      align-items: stretch !important;
      gap: 10px !important;
    }
    .scenes-toolbar-side,
    .scenes-toolbar-feed {
      width: 100% !important;
      justify-content: center !important;
      flex-wrap: wrap !important;
    }
    /* Source toggle (FansDB / StashDB / TPDB) and the palette /
     * vice-filter buttons share the toolbar's end side. Without
     * flex-wrap the source toggle's min(480px, 92vw) plus the two
     * 40px buttons overflowed; with wrap it drops cleanly to the
     * next line. Also clamp the source toggle to the viewport. */
    #sceneTabs.source-toggle {
      width: 100% !important;
      max-width: 100% !important;
      min-width: 0 !important;
    }
    .scenes-toolbar-feed {
      position: static !important;
      left: auto !important;
      transform: none !important;
      pointer-events: auto !important;
    }
    /* Feed mode toggle: full viewport width with each of the 5 buttons
       getting an even 1/5 share. .ts-seg--5 is a grid with
       repeat(5, minmax(0, 1fr)), so width:100% on the parent + the
       toggle itself is enough. Override align-self:center from the
       base .ts-seg rule and the desktop max-width clamp on
       .feed-mode-toggle so we actually fill the row. */
    .ts-seg--5,
    .feed-mode-toggle {
      min-width: 0 !important;
      width: 100% !important;
      max-width: none !important;
      align-self: stretch !important;
    }
    .ts-seg--5 > button,
    .ts-seg--3 > button {
      padding: 8px 6px !important;
      font-size: 13px;
    }
    #scenesSection {
      padding: 0 10px 14px !important;
    }
    .scene-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      gap: 10px !important;
      padding: 10px !important;
    }
    /* On mobile, show full scene/movie posters rather than cropping —
     * desktop uses object-fit:cover for a uniform tile grid, but on
     * a phone the user is primarily browsing and wants to see the
     * whole image. Drop the fixed aspect ratio so each thumb keeps
     * its natural proportions, and use contain so nothing is clipped. */
    .scene-thumb,
    .movie-poster {
      aspect-ratio: auto !important;
      height: auto !important;
      width: 100% !important;
      object-fit: contain !important;
      background: var(--raised);
    }
    /* Tighten the shadowy detail toolbar + spotlight tiles. */
    .detail-toolbar { padding: 8px 10px !important; }
    #spotlightGrid .spotlight-tile { min-width: 140px; flex: 0 0 140px; }

    /* Movies grid (search → Movies tab) defaults to 5 per row in
     * portrait via the rule at line ~1370 (max-width: 1400px). On
     * actual phones that's ~75px per tile — unreadable. Force 2 per
     * row at ≤640px. */
    .movie-grid .movie-card {
      flex: 0 0 calc((100% - 10px) / 2) !important;
      width: calc((100% - 10px) / 2) !important;
      max-width: calc((100% - 10px) / 2) !important;
    }

    /* Mobile: show clean posters only — strip every overlay (studio
     * logo, source pill, performer pile, headshot avatars, wanted
     * action button, top-right hover button strip). The user wants
     * the grids to read as a poster wall, not a stat-laden tile
     * dashboard. Title labels under the poster stay so each tile is
     * still identifiable. */
    .scene-card .scene-source-logo,
    .scene-card .scene-studio-logo,
    .movie-card .scene-studio-logo,
    .scene-card .scene-performer-label,
    .scene-card .scene-headshots-hover,
    .movie-card .scene-headshots-hover,
    .scene-card .scene-wanted-btn,
    .movie-card .scene-wanted-btn,
    .scene-card .scene-source-pill,
    .scene-card .scene-fav-heart,
    .movie-card .scene-fav-heart,
    .scene-card .scene-card-actions,
    .movie-card .scene-card-actions {
      display: none !important;
    }
  }

  /* Image overlay */
  .img-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 1000; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
  .img-overlay img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 5px; box-shadow: 0 32px 80px rgba(0,0,0,0.6); }

  .scene-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; padding: 16px 18px; }
  @media (max-width: 1500px) { .scene-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
  @media (max-width: 1180px) { .scene-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
  @media (max-width: 860px) { .scene-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  /* Bevel test (scenes only) — combines the existing soft drop-shadow with
   * the shared --ts-bevel token (inset highlight on top, inset shadow on
   * bottom, outer drop) so the whole card reads as a slightly raised tile
   * including the scene-info name plate. Hover swaps to --ts-bevel-hover
   * for a stronger lift. The `.scene-info` sits inside the card and
   * inherits the bottom inset shadow — no extra rule needed because the
   * card's `overflow: hidden` already clips the name plate to the rounded
   * corners so the bevel wraps cleanly around the whole tile. */
  .scene-card {
    cursor: pointer;
    border-radius: 8px;

    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);

  }
  .detail-links { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; position: relative; z-index: 1; }
  .detail-link { display: inline-flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.02em; color: var(--dim); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 3px; padding: 2px 7px; text-decoration: none; transition: all 0.15s; }
  .detail-link:hover { background: rgba(var(--brand-purple-rgb),0.35); border-color: rgba(var(--brand-purple-rgb),0.4); color: var(--accent); }
  .detail-link img { width: 14px; height: 14px; border-radius: 2px; }
  .detail-link.db-link { color: var(--accent); border-color: rgba(var(--brand-purple-rgb),0.35); background: rgba(var(--brand-purple-rgb),0.35); font-weight: 500; }
  .scene-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: var(--raised); border-radius: 4px 4px 0 0; overflow: hidden; }
  .scene-thumb-placeholder { width: 100%; aspect-ratio: 16/9; background: var(--raised); display: flex; align-items: center; justify-content: center; color: var(--muted); border-radius: 4px 4px 0 0; overflow: hidden; }
  /* Loading spinners for scene thumbs / skeleton tiles */
  .img-load { position: relative; overflow: hidden; background: var(--raised); isolation: isolate; transition: background-color 0.3s ease; }
  /* Duotone hover — natural image at rest, tinted grayscale on card hover */
  /* OLD: background-color: #0b0414; background: #BB4DFA; */
  /* Duotone hover — SVG filter does a real luminance-mapped duotone
   * between the theme's shadow and highlight colours. Defined in
   * theme-init.js; each theme points --duotone-filter at its own
   * url(#duotone-<name>). Legacy blend layers disabled below. */
  .img-load .duo-tint { display: none; }
  .img-load::after { content: none; }
  .scene-card:hover .img-load img,
  .movie-card:hover .img-load img { filter: var(--duotone-filter, none); }
  /* Studio logo overlay — sits above the duotone tints so it's never tinted.
   * Top-right corner, capped size, transparent background, dark drop-shadow
   * for legibility against any underlying art. .scene-studio-logo:hover img
   * is handled implicitly because the rule that grayscales the scene img
   * targets `.img-load img` not `.scene-studio-logo` (we exclude it via the
   * specific class selector below). */
  /* Source-DB badge (TPDB / StashDB / FansDB) pinned to the TOP-LEFT
   * corner, visible at rest. Fades out on hover so the top-left

   * itself. Only rendered in Search mode — see scene-card template. */
  .scene-card .scene-source-logo {
    position: absolute;
    top: 6px; left: 6px;
    z-index: 4;
    height: 20px;
    width: auto;
    max-width: 80px;
    object-fit: contain;
    pointer-events: none;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.85));
    transition: opacity 0.2s ease;
  }
  .scene-card:hover .scene-source-logo {
    opacity: 0;
  }
  /* Scene card studio logo → top-right, with room reserved on the
   * right edge for the wanted-eye button to sit beside it. */
  .scene-card .scene-studio-logo {
    position: absolute !important;
    top: 6px !important;
    right: 46px !important;
    left: auto !important;
    bottom: auto !important;
    z-index: 5;
    max-height: 45px;
    max-width: 135px;
    width: auto;
    height: auto;
    object-fit: contain;
    pointer-events: none;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7)) drop-shadow(0 0 3px rgba(0,0,0,0.45));
    background: transparent !important;
    border: none !important;
    padding: 0 !important;
    box-shadow: none !important;
  }
  /* Movie card studio logo → bottom-centre, always visible (not just on
   * hover), so the user can see which studio the release is from at a
   * glance without needing to mouseover. */
  .movie-card .scene-studio-logo {
    position: absolute !important;
    bottom: 8px !important;
    left: 50% !important;
    top: auto !important;
    right: auto !important;
    transform: translateX(-50%);
    z-index: 5;
    max-height: 44px;
    max-width: 72%;
    width: auto;
    height: auto;
    object-fit: contain;
    pointer-events: none;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7)) drop-shadow(0 0 3px rgba(0,0,0,0.45));
    background: transparent !important;
    border: none !important;
    padding: 0 !important;
    box-shadow: none !important;
  }
  /* Make sure the duotone grayscale doesn't apply to the studio-logo overlay. */
  .scene-card:hover .img-load .scene-studio-logo,
  .movie-card:hover .img-load .scene-studio-logo,
  html[data-duotone-inverted="1"] .scene-card .img-load .scene-studio-logo,
  html[data-duotone-inverted="1"] .scene-card:hover .img-load .scene-studio-logo,
  html[data-duotone-inverted="1"] .movie-card .img-load .scene-studio-logo,
  html[data-duotone-inverted="1"] .movie-card:hover .img-load .scene-studio-logo {
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.85)) drop-shadow(0 0 6px rgba(0,0,0,0.55));
  }
  /* ── Inverted duotone mode (palette toggle in the "Your Feed" toolbar) ──
   * Default: clean at rest, duotone on hover.
   * Inverted: duotone at rest, clean on hover.
   * Scoped to .scene-card / .movie-card so the .spotlight-tile row stays
   * locked to its own rest-duotone / hover-clean behaviour regardless of
   * the toggle. */
  html[data-duotone-inverted="1"] .scene-card .img-load img,
  html[data-duotone-inverted="1"] .movie-card .img-load img { filter: var(--duotone-filter, none); }
  html[data-duotone-inverted="1"] .scene-card:hover .img-load img,
  html[data-duotone-inverted="1"] .movie-card:hover .img-load img { filter: none; }
  /* Palette toggle button — themed chrome for the Your Feed toolbar. */
  .scenes-palette-btn {

    color: var(--dim);
    font-size: 15px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  /* Tag-filter variant: needs to fit an icon + count badge, so swap the

  #tagFilterBtn.scenes-palette-btn {

    min-width: 56px;

  .scenes-srch-label {

  .scenes-srch-input {
    width: 100%;
    background: rgba(14,10,22,0.7);
    border: 1px solid rgba(var(--brand-purple-rgb),0.25);
    color: var(--text);
    padding: 9px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-family: var(--mono);
    outline: none;
    transition: border-color 0.15s;
  }
  .scenes-srch-input:focus { border-color: rgba(var(--brand-purple-rgb),0.7); }
  /* Native date input calendar icon — recolour to brand purple. The
   * ::-webkit-calendar-picker-indicator comes from the UA stylesheet
   * as a dark glyph; an invert + hue-rotate chain shifts it to match
   * the rest of the search panel without needing a custom SVG. */
  .scenes-srch-input[type="date"]::-webkit-calendar-picker-indicator {
    cursor: pointer;
    opacity: 0.85;
    filter: invert(62%) sepia(63%) saturate(2000%) hue-rotate(235deg) brightness(100%) contrast(95%);
    transition: opacity 0.15s, filter 0.15s;
  }
  .scenes-srch-input[type="date"]::-webkit-calendar-picker-indicator:hover {

    border-radius: 10px;

    border: 1px solid rgba(var(--brand-purple-rgb),0.30);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, opacity 0.15s, filter 0.15s;
  }

  .scenes-srch-srclogo:has(input:checked) {

  /* Widen the whole feed-mode toggle so each of the 5 equal-sized
   * grid tiles has enough room for its label + icon without cramping.
   * The grid enforces equal column widths (`repeat(5, minmax(0,1fr))`),
   * so bumping the container is the only way to widen every tile
   * uniformly. ``PERFORMERS`` is the longest label — target ~150px
   * per tile to keep it comfortably unbroken. */
  #feedModeToggle {

  }
  #feedModeToggle .feed-mode-btn {
    padding-left: 18px;

  }
  .scenes-palette-btn:hover {
    border-color: rgba(var(--brand-purple-rgb), 0.65);
    color: var(--text);
    background: rgba(var(--panel-hi-rgb), 0.78);
  }
  .scenes-palette-btn.is-active {

  }
  /* Palette toggle button active state (shared generic rule) */
  [data-duotone-toggle].is-active { outline: 1px solid rgba(var(--brand-accent-rgb),0.65); outline-offset: 1px; color: var(--accent); }
  .img-load .img-spin,
  .skeleton-box > .img-spin {
    position: absolute;
    inset: 50% auto auto 50%;
    width: 22px;
    height: 22px;
    margin: -11px 0 0 -11px;
    border-radius: 50%;
    border: 2px solid rgba(var(--brand-purple-rgb),0.35);
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
    z-index: 2;
    pointer-events: none;
  }
  .img-load img { position: relative; z-index: 2; opacity: 0; transition: opacity 0.15s ease, filter 0.3s ease; }
  .img-load.ready img { opacity: 1; }
  .img-load.ready .img-spin { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .skeleton-box, .skeleton-line {
    position: relative;
    overflow: hidden;
    background: rgba(255,255,255,0.06);
  }
  .skeleton-box::after, .skeleton-line::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 0;
    transform: translateX(-100%);
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
    animation: shimmer 1.25s infinite;
  }
  .skeleton-line { height: 12px; border-radius: 999px; margin-bottom: 8px; }
  .skeleton-chip {
    display: inline-block;
    width: 52px;
    height: 22px;
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    position: relative;
    overflow: hidden;
  }
  .skeleton-chip::after {
    content: '';
    position: absolute;
    inset: 0;
    transform: translateX(-100%);
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
    animation: shimmer 1.25s infinite;
  }
  @keyframes shimmer { 100% { transform: translateX(100%); } }
  /* Performer-name overlay, bottom-centre of the image.
   * Highlighter-style background at 50% opacity of the theme dark bg,
   * drawn only behind the text glyphs. Single line, ellipsis on overflow.
   * No bevel — flat pill. */
  .scene-performer-label {
    position: absolute;
    /* Anchor flush to the bottom edge of the image. Flex layout with
     * `align-items: flex-end` pins the pill's bottom to the label's
     * bottom — default `inline-block` + baseline-aligned text leaves
     * a descender gap that makes the tab float a few pixels above
     * the image edge. */
    bottom: 0; left: 0; right: 0;
    z-index: 5;
    padding: 0 10px;
    background: transparent;
    font-family: var(--secs);
    font-size: 15px;
    color: var(--text);
    letter-spacing: -0.01em;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    pointer-events: none;
    line-height: 1.2;
    transition: font-size 0.2s ease, top 0.2s ease, bottom 0.2s ease, transform 0.2s ease;
  }
  /* On hover: hide the performer pill so the tag chips own the
   * lower half of the tile unobstructed. The name was already
   * visible at rest, and the title strip below the image still
   * carries the scene/performer context. */
  .scene-card:hover .scene-performer-label {
    opacity: 0;
    pointer-events: none;
  }
  .scene-performer-label > .perf-hl {
    display: inline-block;
    max-width: 90%;
    /* Tab shape: rounded top corners, pointy bottom so the pill reads
     * as a tab whose bottom edge sits flush with the image. Extra
     * bottom padding keeps text from hugging the image edge. */
    padding: 4px 10px 5px;
    border-radius: 4px 4px 0 0;
    /* 85% opacity of the active theme's duotone "shadow" tone so the
     * pill takes on the same colour family as the studio/performer
     * tile duotone overlay. Falls back to the panel dark tone if no
     * duotone is configured, matching the original neutral look. */
    background: color-mix(in srgb, var(--duotone-lighten, rgba(var(--panel-lo-rgb), 1)) 85%, transparent);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-shadow: 0 1px 3px rgba(0,0,0,0.85);
  }
  /* Scene info block below the image — compact two-line layout:
   * line 1: title (1 line, ellipsis on overflow)
   * line 2: date · studio (1 line, ellipsis on overflow) */
  .scene-info {
    padding: 8px 10px;
    flex: 1;
    text-align: center;
    min-width: 0;
  }
  .scene-title {
    font-family: var(--secs); font-size: 16px; color: var(--text);
    line-height: 1.2;
    letter-spacing: -0.01em;
    text-align: center;
    /* Shrink-to-fit instead of ellipsis-truncate. Allow up to two
     * lines via line-clamp; the cqi-driven clamp() in app-shell.css
     * scales font-size with the card width so long titles drop in
     * size before wrapping is needed, and `word-break` lets the
     * remainder break cleanly if the second line is still tight. */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
    overflow-wrap: anywhere;
    max-width: 100%;
  }
  .scene-date {
    font-size: 11px;
    color: var(--dim);
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  /* When the studio logo overlay loaded, hide the text fallback in the meta
   * line. When it 404s (img removed on error), the class is never added and
   * the text name stays visible. */
  .scene-card.has-studio-logo .meta-studio-fallback,
  .movie-card.has-studio-logo .meta-studio-fallback { display: none; }
  /* Hover-only headshot row: circular avatars of library performers matching
   * the scene's performer names. Fetched lazily on first hover via
   * /api/performers/headshots-by-name — cached on the card so repeat hovers
   * don't refetch. Positioned top-right so it doesn't collide with the
   * top-left studio logo overlay or the bottom-centre performer label. */
  .scene-headshots-hover {
    position: absolute;
    top: 6px; left: 6px;
    display: flex; flex-direction: row; gap: 4px;
    z-index: 6;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  /* Wanted eye button — right side of every scene/movie card on hover.
   * Scene cards: sits just below the top-right studio logo.
   * Movie cards: top-right corner (no studio logo there to collide with).
   * Filled pink when already marked wanted, dim outline when not. */
  .scene-wanted-btn {
    position: absolute;
    top: 6px; right: 6px;
    z-index: 7;
    width: 32px; height: 32px;
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(20, 14, 30, 0.72);
    border: 1px solid rgba(244, 114, 182, 0.45);
    border-radius: 50%;
    color: rgba(244, 114, 182, 0.85);
    font-size: 14px;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transform: scale(0.85);
    transition: opacity 0.2s ease, transform 0.2s ease, background 0.15s, border-color 0.15s, color 0.15s;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
  }
  .scene-card:hover .scene-wanted-btn,
  .movie-card:hover .scene-wanted-btn {
    opacity: 1;
    pointer-events: auto;
    transform: scale(1);
  }
  .scene-wanted-btn:hover {
    border-color: rgba(244, 114, 182, 0.9);
    background: rgba(244, 114, 182, 0.18);
    color: #f472b6;
  }
  .scene-wanted-btn.is-wanted {
    background: rgba(244, 114, 182, 0.92);
    border-color: rgba(244, 114, 182, 1);
    color: rgba(20, 14, 30, 0.95);
    opacity: 1;
    pointer-events: auto;
    transform: scale(1);
  }
  .scene-wanted-btn.is-wanted:hover {
    background: rgba(244, 114, 182, 1);
  }
  /* Scene-card wanted-eye sits TO THE RIGHT of the top-right studio
   * logo, on the same horizontal band. The logo rule above reserves a
   * 46px gutter on the right edge for this button. Movie cards keep
   * the 6px default — their studio logo is at the bottom-centre, so
   * the top-right eye has no collision. */
  .scene-card .scene-wanted-btn {
    top: 6px;
    right: 6px;
  }
  /* Tag chips anchored to the bottom of the scene thumbnail on hover —
   * only applied to the landscape .scene-card (not .movie-card). The
   * container grows upward from the bottom with ``align-content: flex-end``
   * so excess rows clip off the top rather than spilling over the
   * enlarged performer name. The 10-tag cap + "+N more" chip in the
   * renderer means overflow is rare, so no soft-fade mask is needed. */
  .scene-card-tags-hover {
    position: absolute;
    left: 6%; right: 6%;
    bottom: 10px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-content: flex-end;
    gap: 5px;
    max-height: 46%;
    overflow: hidden;
    z-index: 5;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .scene-card:hover .scene-card-tags-hover { opacity: 1; }
  .scene-card-tag-chip {
    position: relative;
    display: inline-flex;
    align-items: center;
    padding: 3px 10px 3px 16px;
    background: rgba(244, 114, 182, 0.92);
    color: rgba(20, 14, 30, 0.95);
    font-size: 11px;
    font-family: var(--secs);
    letter-spacing: 0.04em;
    white-space: nowrap;
    line-height: 1.45;
    /* Pentagon with a notched point on the left — classic luggage-tag
     * silhouette. The point is 8px deep; right edge stays rectangular. */
    clip-path: polygon(8px 0, 100% 0, 100% 100%, 8px 100%, 0 50%);
    /* Layered drop-shadow reads like a proper cast shadow beneath the
     * tag — 1px inner edge for definition, 6px soft body for lift. */
    filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.55))
            drop-shadow(0 4px 8px rgba(0, 0, 0, 0.45));
  }
  /* The "string hole" — a small dark circle inside the notched tip.
   * Positioned to sit on the tag's left edge just inside the point. */
  .scene-card-tag-chip::before {
    content: '';
    position: absolute;
    left: 5px;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(20, 14, 30, 0.85);
    pointer-events: none;
  }
  .scene-card:hover .scene-headshots-hover,
  .movie-card:hover .scene-headshots-hover { opacity: 1; }
  .scene-headshot-avatar {
    width: 63px; height: 63px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(var(--bg-rgb), 0.85);
    /* Themed brand-purple ring around the avatar — 50% opacity so it
     * reads softly against any backdrop on hover. The headshots only
     * appear on card hover, so this is effectively the hover-state
     * border too. */
    box-shadow: 0 2px 6px rgba(0,0,0,0.55), 0 0 0 1px rgba(var(--brand-purple-rgb), 0.5);
    background: var(--raised);
  }
  /* Override the hover grayscale that applies to .img-load img so the
   * hover headshots stay full-colour even though they live inside .img-load. */
  .scene-card .img-load .scene-headshot-avatar,
  .movie-card .img-load .scene-headshot-avatar,
  .scene-card:hover .img-load .scene-headshot-avatar,
  .movie-card:hover .img-load .scene-headshot-avatar,
  html[data-duotone-inverted="1"] .scene-card .img-load .scene-headshot-avatar,
  html[data-duotone-inverted="1"] .movie-card .img-load .scene-headshot-avatar {
    filter: none !important;
  }

  /* ── Movie-card overrides ─────────────────────────────────────────
   * Movies are portrait posters; performers/logo share the frame
   * differently than a landscape scene still:
   *   - Studio logo: hover-only (clean at rest), centered across the
   *     top so any poster typography has a recognisable banner when
   *     the user is hunting for a specific studio's release.
   *   - Headshots: centred in the middle of the poster, bigger than
   *     the scene cards (90px), wrapping into rows with a subtle
   *     horizontal overlap so a 15-performer blockbuster still reads
   *     as a pile instead of spilling into the logo band.
   */
  /* Movie-card studio-logo positioning is handled by the base rule
   * above (bottom-centre, always visible). This block used to swap the
   * logo to top-centre on hover — no longer needed. */
  .movie-card .scene-headshots-hover {
    /* Stretched to fill the full available band (top→bottom of the
     * poster, minus a strip reserved for the studio logo when one
     * is present). 2-column CSS Grid with `grid-auto-rows: 1fr`
     * splits the band into equal-height row tracks; cells fill
     * each track and clip to a square (see avatar rule below).
     * Last row's lone odd cell spans both columns so it centres
     * instead of hugging the left edge. */
    top: 8px;
    bottom: 8px;
    left: 4%;
    right: 4%;
    transform: none;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    grid-auto-rows: minmax(0, 1fr);
    place-content: center;
    place-items: center;
    gap: 4%;
    width: auto;
    max-width: none;
    max-height: none;
  }
  /* Reserve bottom strip for the studio logo (max-height 44px + 16px
   * breathing room) when one is present, so the headshots never spill
   * onto the logo. When absent, the headshots get the full poster. */
  .movie-card.has-studio-logo .scene-headshots-hover {
    bottom: 60px;
  }
  /* If the cell count is odd, the lone cell on the last row spans
   * both columns and centres itself — no wasted half-row. */
  .movie-card .scene-headshots-hover > :nth-child(odd):last-child {
    grid-column: 1 / -1;
  }
  .movie-card .scene-headshots-hover .scene-headshot-avatar {
    /* `width:100%` + `aspect-ratio:1` makes the avatar square at
     * the track width; `max-height:100%` then caps to the track
     * height, which forces aspect-ratio to recompute and shrink
     * the width to match — net effect is `min(track_w, track_h)`,
     * so cells stay square AND fit inside their grid track. */
    width: 100%;
    height: auto;
    max-width: 100%;
    max-height: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.75), 0 0 0 2px rgba(var(--brand-purple-rgb), 0.55);
    border: 2px solid rgba(var(--bg-rgb), 0.95);
    position: relative;
    transition: transform 140ms ease;
  }
  /* Hover-lift for the individual face the user is inspecting — tiny
   * affordance that surfaces the name via the browser tooltip. */
  .movie-card .scene-headshots-hover .scene-headshot-avatar:hover {
    transform: scale(1.08);
    z-index: 10;
  }
  /* "+N" overflow chip — rendered by ensureCardHeadshots when a movie
   * has more performers than the layout can show cleanly. Same size
   * as the avatars, brand-accent tint so it reads as a UI chip rather
   * than a face. */
  .movie-card .scene-headshots-hover .scene-headshot-more {
    /* Same fill-the-track sizing as the avatars above. */
    width: 100%;
    height: auto;
    max-width: 100%;
    max-height: 100%;
    aspect-ratio: 1;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(var(--brand-purple-rgb), 0.35);
    color: var(--text);
    font-family: var(--secs, "Impact Label Reversed", sans-serif);
    font-size: clamp(11px, 6cqi, 22px);
    letter-spacing: -0.01em;
    border: 2px solid rgba(var(--bg-rgb), 0.95);
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.75), 0 0 0 2px rgba(var(--brand-purple-rgb), 0.65);
    user-select: none;
  }

  /* Search results */
  .search-result { display: grid; grid-template-columns: 1fr auto auto auto; gap: 12px; align-items: center; padding: 10px 18px; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .search-result:last-child { border-bottom: none; }
  .sr-title { font-size: 12px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .sr-size    { font-size: 11px; color: var(--dim); white-space: nowrap; }
  .scene-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.84);
    z-index: 1100;
    align-items: center;

  }
  .scene-overlay.open { display: flex; }
  .scene-overlay-card {
    width: min(1280px, 96vw);
    max-height: 90vh;
    overflow-y: auto;
    border-radius: 8px;
    background: linear-gradient(160deg, rgba(var(--panel-hi-rgb),0.98) 0%, rgba(var(--panel-lo-rgb),0.95) 100%);
    border: 1px solid var(--border);
    box-shadow: 0 32px 80px rgba(0,0,0,0.5);

  .add-success-title {

  .scene-overlay-thumb { width: 100%; border-radius: 6px; object-fit: cover; background: var(--raised); aspect-ratio: 16 / 9; }
  @media (max-width: 860px) { .scene-overlay-grid { grid-template-columns: 1fr; } }
  /* Library performer headshots in scene popup */
  .lib-perfs-row {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-start;
    margin-bottom: 12px;
  }
  .lib-perf-hs {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .lib-perf-hs img, .lib-perf-ph {
    width: 52px; height: 78px; border-radius: 6px; object-fit: cover; object-position: top center;
    border: 1px solid rgba(var(--brand-purple-rgb),0.35); background: rgba(255,255,255,0.04);
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.2); font-size: 18px; overflow: hidden;

  .lib-perf-hs-name {

  /* Result message */
  .result-msg { margin-top: 16px; padding: 12px 16px; border-radius: 5px; font-size: 12px; display: none; }
  .result-msg.success { background: rgba(74,222,128,0.1); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
  .result-msg.error   { background: rgba(248,113,113,0.1); color: var(--red);   border: 1px solid rgba(248,113,113,0.2); }

  /* ── Movie grid (feed + search) ── */
  .movie-grid {
    display: flex; flex-wrap: wrap; justify-content: flex-start; align-content: flex-start;
    gap: 10px; width: 100%; box-sizing: border-box; padding: 14px 18px 12px; min-width: 0;
  }
  .movie-grid .movie-card {
    flex: 0 0 calc((100% - 90px) / 10); width: calc((100% - 90px) / 10);
    max-width: calc((100% - 90px) / 10); min-width: 0; box-sizing: border-box;
  }
  .movie-grid .movie-grid-empty { flex: 1 1 100%; width: 100%; max-width: 100%; }
  .movie-card {
    cursor: pointer; border-radius: 8px;
    background: linear-gradient(165deg, rgba(var(--panel-hi-rgb),0.45) 0%, rgba(var(--panel-lo-rgb),0.32) 100%);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    transition: border-color 0.2s, box-shadow 0.2s, outline-color 0.2s;
    border: 1px solid rgba(var(--brand-purple-rgb),0.55);
    outline: 1px solid transparent; outline-offset: 0;
    box-shadow: var(--ts-bevel), 0 4px 16px rgba(0,0,0,0.2);
    min-width: 0; display: flex; flex-direction: column; overflow: hidden;
  }
  .movie-card.loading { pointer-events: none; }
  .movie-card:hover { border-color: rgba(var(--brand-purple-rgb),0.65); box-shadow: var(--ts-bevel-hover), 0 6px 24px rgba(0,0,0,0.45); outline: 1px solid rgba(var(--brand-purple-rgb),0.3); outline-offset: 0; }
  /* OLD: background-color: #0b0414; */
  .movie-card:hover .img-load .duo-tint,
  .movie-card:hover .img-load::after { opacity: var(--duotone-opacity, 1); }
  .movie-poster { width: 100%; aspect-ratio: 27/40; object-fit: cover; display: block; background: var(--raised); border-radius: 8px 8px 0 0; overflow: hidden; }
  .movie-poster-placeholder { width: 100%; aspect-ratio: 27/40; background: var(--raised); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 28px; border-radius: 8px 8px 0 0; overflow: hidden; }
  /* Match .scene-info — flat, transparent, no dark strip. */
  .movie-info { padding: 8px 10px; flex: 1; min-width: 0; text-align: center; }
  .movie-title {
    font-family: var(--secs); font-size: 16px; color: var(--text);
    line-height: 1.2; letter-spacing: -0.01em; text-align: center;
    /* Allow up to 2 lines, then ellipsis. The cqi-driven clamp()
     * in app-shell.css scales font-size with card width so long
     * titles drop in size before wrapping is needed. */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
    overflow-wrap: anywhere;
    max-width: 100%;
  }
  .movie-meta {
    font-size: 11px; color: var(--dim); margin-top: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
  }

  /* Movie search results in search panel */

  .movie-search-result { display: flex; gap: 10px; padding: 8px 6px; border-radius: 6px; cursor: pointer; transition: background 0.15s; align-items: flex-start; }
  .movie-search-result:hover { background: rgba(255,255,255,0.04); }
  .movie-search-poster { width: 50px; aspect-ratio: 27/40; border-radius: 4px; object-fit: cover; flex-shrink: 0; background: var(--raised); }
  .movie-search-poster-ph { width: 50px; aspect-ratio: 27/40; border-radius: 4px; background: var(--raised); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 16px; flex-shrink: 0; }

  /* Movie detail overlay */
  .movie-detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1100; align-items: center; justify-content: center; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }

    position: relative; box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  }
  .movie-detail-bg { position: absolute; top: 0; left: 0; width: 100%; height: 300px; object-fit: cover; opacity: 0.15;
    mask-image: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);

    pointer-events: none; }
  .movie-detail-inner { position: relative; z-index: 1; padding: 28px; display: flex; gap: 28px; }

    position: relative; width: 300px; min-width: 300px; max-width: 300px; flex-shrink: 0; border-radius: 8px; overflow: hidden;
    aspect-ratio: 27/40; background: var(--raised); box-shadow: 0 12px 48px rgba(0,0,0,0.55);
  }

  .movie-detail-text { flex: 1; min-width: 0; }
  .movie-detail-title { font-family: var(--acid); font-size: 28px; color: var(--text); margin-bottom: 8px; }

  .movie-detail-performers { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
  .movie-perf-tag { font-family: var(--mono); font-size: 10px; color: var(--text); background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 3px; padding: 2px 8px; text-decoration: none; display: inline-block; }
  a.movie-perf-tag:hover { border-color: var(--accent); color: var(--accent); }
  .movie-detail-actions { display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
  .movie-btn-action { padding: 8px 16px; border-radius: 4px; font-family: var(--mono); font-size: 12px; cursor: pointer; border: none; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
  .movie-btn-prowlarr { background: var(--accent); color: #0c0c0e; }
  .movie-btn-prowlarr:hover { filter: brightness(1.1); }
  .movie-btn-link { background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid var(--border); }
  .movie-btn-link:hover { border-color: var(--muted); }
  .movie-detail-close { position: absolute; top: 14px; right: 14px; z-index: 2; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: var(--dim); font-size: 13px; cursor: pointer; transition: background 0.15s, border-color 0.15s, color 0.15s; }
  .movie-detail-close:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.2); color: var(--text); }
  .movie-detail-scenes { padding: 16px 28px 24px; border-top: 1px solid var(--border); }
  .movie-detail-scenes-title { font-family: var(--acid); font-size: 18px; color: var(--text); margin-bottom: 10px; }
  .movie-detail-scene-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
  .movie-detail-scene-card { border-radius: 4px; overflow: hidden; background: var(--raised); min-height: 154px; min-width: 0; }
  .movie-detail-scene-card .img-load { width: 100%; aspect-ratio: 16/9; }
  .movie-detail-scene-card .img-load img.movie-detail-scene-thumb { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
  .movie-detail-scene-thumb-ph { width: 100%; aspect-ratio: 16/9; background: var(--raised); }
  .movie-detail-scene-info { padding: 6px 8px; font-size: 10px; color: var(--dim); }
  .lib-perfs-row {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-start; margin-bottom: 14px;
  }

  /* Movie prowlarr overlay */
  .movie-prowlarr-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1200; align-items: center; justify-content: center; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
  .movie-prowlarr-overlay.open { display: flex; }
  .movie-prowlarr-card { background: linear-gradient(160deg, rgba(var(--panel-hi-rgb),0.98) 0%, rgba(var(--panel-lo-rgb),0.95) 100%); border-radius: 6px; max-width: 700px; width: 90vw; max-height: 80vh; overflow-y: auto; padding: 24px; position: relative; }
  .movie-prowlarr-close { position: absolute; top: 12px; right: 12px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: var(--dim); font-size: 13px; cursor: pointer; transition: background 0.15s, border-color 0.15s, color 0.15s; }

<body>
<!-- Static tritone SVG filter referenced by `.spotlight-tile:hover img`
     in app-shell.css (VHS theme only). Pipeline:
       1. Rec.709 luminance reduction → grayscale.
       2. Linear contrast pre-map (slope 1.45, intercept -0.225).
       3. 5-entry tritone table at L=[0, 0.25, 0.5, 0.75, 1] mapping
          to shadow → mix(shadow,mid,30%) → mid → mix(mid,highlight,65%)
          → highlight, where:
            shadow    #480DF5  (rgb 0.282, 0.051, 0.961)
            midtone   #C92FAE  (rgb 0.788, 0.184, 0.682)
            highlight #FF7621  (rgb 1.000, 0.463, 0.129)
       Table values precomputed offline so the runtime cost is just
       the SVG filter pass. -->
<svg id="spotlight-bloom-svg" width="0" height="0" style="position:absolute;width:0;height:0;pointer-events:none" aria-hidden="true">
  <defs>
    <!-- Bloom pre-pass only — the duotone itself comes from the
         user's Appearance settings via the runtime-built filter
         that `--duotone-filter` points at. The CSS rule for
         `.spotlight-tile img` chains the two:
            filter: url(#spotlight-bloom) var(--duotone-filter, none)
         so the bloomed pixels feed into whatever palette /
         midpoint / contrast / balance values the user has
         configured (or the manual `--spotlight-duotone-override`
         set on the tile / page if present). -->
    <filter id="spotlight-bloom" color-interpolation-filters="sRGB">
      <!-- 1. Extract highlights via a steep linear ramp. -->
      <feComponentTransfer in="SourceGraphic" result="ts-bright">
        <feFuncR type="linear" slope="2.6" intercept="-1.3"/>
        <feFuncG type="linear" slope="2.6" intercept="-1.3"/>
        <feFuncB type="linear" slope="2.6" intercept="-1.3"/>
      </feComponentTransfer>
      <!-- 2. Blur the highlight pass into a soft halo. -->
      <feGaussianBlur in="ts-bright" stdDeviation="9" result="ts-bloom-full"/>
      <!-- 3. Halve the halo strength so the glow is moderate. -->
      <feComponentTransfer in="ts-bloom-full" result="ts-bloom">
        <feFuncR type="linear" slope="0.5"/>
        <feFuncG type="linear" slope="0.5"/>
        <feFuncB type="linear" slope="0.5"/>
      </feComponentTransfer>
      <!-- 4. Screen-blend onto SourceGraphic. The final feBlend
              has no `result`, so its output is the filter's
              output and feeds into the next chained SVG filter. -->
      <feBlend in="SourceGraphic" in2="ts-bloom" mode="screen"/>
    </filter>
  </defs>
</svg>

<script>
  let currentType     = 'performer';
  let selectedResult  = null;
  let selectedDest    = null;
  /** Scene objects for the current grid (index matches data-scene-i on .scene-card) */
  let _sceneGridItems = [];
  /** Title-case for performer/studio labels (APIs often return all-lowercase). */
  function capDisplayName(s) {
    if (s == null || s === '') return '';
    return String(s).trim().split(/\s+/).map(function (word) {
      if (!word) return word;
      return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
    }).join(' ');
  }
  // ── Wanted-list state ─────────────────────────────────────────────
  // Set of "${kind}:${source}:${external_id}" keys currently in the
  // user's Wanted list. Populated once on page load, updated in place
  // when the user toggles the eye icon.
  const _wantedKeys = new Set();
  function _wkey(kind, source, externalId) {
    return `${(kind || 'scene').toLowerCase()}:${(source || '').toLowerCase()}:${externalId || ''}`;
  }
  async function _loadWantedKeys() {
    try {
      const r = await fetch('/api/wanted/keys');
      const d = await r.json();
      (d.keys || []).forEach(k => _wantedKeys.add(_wkey(k.kind, k.source, k.external_id)));
    } catch (_) {}
  }
  function _wantedGuessSource(card) {
    // Scene cards pulled from TPDB via the performers/studios/tags/feed
    // paths; movie cards use the same convention. All of these are TPDB
    // in practice. If we ever surface StashDB cards directly we can
    // thread a real ``source`` through the card data.
    return (card.dataset.wantedSource || 'tpdb').toLowerCase();
  }
  function _cardWantedButtonHtml(kind, sourceGuess, externalId) {
    const key = _wkey(kind, sourceGuess, externalId);
    const on = _wantedKeys.has(key);
    const title = on ? 'In your Wanted list — click to remove' : 'Add to Wanted';
    return `<button class="scene-wanted-btn${on ? ' is-wanted' : ''}" data-wanted-kind="${esc(kind)}" data-wanted-source="${esc(sourceGuess)}" data-wanted-id="${esc(externalId)}" title="${esc(title)}" aria-pressed="${on}"><i class="fa-solid fa-eye"></i></button>`;
  }
  document.addEventListener('click', function(e) {
    const btn = e.target && e.target.closest && e.target.closest('.scene-wanted-btn');
    if (!btn) return;
    e.preventDefault();
    e.stopPropagation();
    const kind = btn.getAttribute('data-wanted-kind') || 'scene';
    const source = btn.getAttribute('data-wanted-source') || 'tpdb';
    const externalId = btn.getAttribute('data-wanted-id') || '';
    if (!externalId) return;
    // Pull enriching fields from the card so the backend can save a
    // full record without a follow-up fetch.
    const card = btn.closest('.scene-card, .movie-card');
    const scene = (() => {
      if (!card) return {};
      const idx = parseInt(card.getAttribute('data-scene-i') || '-1', 10);
      if (!isNaN(idx) && idx >= 0 && window._sceneGridItems && window._sceneGridItems[idx]) {
        return window._sceneGridItems[idx];
      }
      return null;
    })();
    const payload = {
      kind, source, external_id: externalId,
      title:    (scene && scene.title)    || card?.querySelector('.scene-title')?.textContent
               || card?.querySelector('.movie-title')?.textContent || '',
      studio:   (scene && scene.studio)   || '',
      date:     (scene && scene.date)     || '',
      performers: (scene && scene.performer) || '',
      thumb:    (scene && scene.thumb)    || card?.querySelector('.scene-thumb')?.src
               || card?.querySelector('.movie-poster')?.src || '',
      description: (scene && scene.description) || '',
      tags:     (scene && Array.isArray(scene.tags)) ? scene.tags : [],
      duration: (scene && scene.duration)  || 0,
    };
    btn.disabled = true;
    fetch('/api/wanted/toggle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    }).then(r => r.json()).then(d => {
      const key = _wkey(kind, source, externalId);
      if (d && d.wanted) {
        _wantedKeys.add(key);
        document.querySelectorAll(`.scene-wanted-btn[data-wanted-id="${CSS.escape(externalId)}"]`).forEach(b => {
          b.classList.add('is-wanted');
          b.setAttribute('aria-pressed', 'true');
          b.setAttribute('title', 'In your Wanted list — click to remove');
        });
      } else {
        _wantedKeys.delete(key);
        document.querySelectorAll(`.scene-wanted-btn[data-wanted-id="${CSS.escape(externalId)}"]`).forEach(b => {
          b.classList.remove('is-wanted');
          b.setAttribute('aria-pressed', 'false');
          b.setAttribute('title', 'Add to Wanted');
        });
      }
    }).catch(() => {}).finally(() => { btn.disabled = false; });
  });

  const _FEED_MODES = ['movies', 'performers', 'studios', 'tags', 'search'];
  let _scenesFeedMode = (function() {
    try {
      let v = localStorage.getItem('topShelfScenesFeedMode');
      if (v == null || v === '' || v === 'library' || v === 'random' || v === 'favourites') v = 'studios';
      if (v === 'recent') v = 'performers';
      if (!_FEED_MODES.includes(v)) v = 'studios';
      return v;
    } catch (_) { return 'studios'; }
  })();

  let _monitoredTagsCache = [];
  // null = never saved (first-ever entry to Tags mode); [] = user explicitly
  // deselected everything; [...] = persisted selection. The null sentinel
  // lets us auto-select every monitored tag on first entry while still
  // honouring an intentionally empty selection afterwards.
  let _selectedTagIds = (function() {
    try {
      const raw = localStorage.getItem('topShelfScenesSelectedTags');
      if (raw === null) return null;
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed.map(String) : [];
    } catch(_) { return []; }
  })();

  function _applyFeedModeToggleUI() {
    document.querySelectorAll('#feedModeToggle .feed-mode-btn').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-mode') === _scenesFeedMode);
    });
    const tagWrap = document.getElementById('tagFilterWrap');
    if (tagWrap) tagWrap.style.display = (_scenesFeedMode === 'tags') ? 'block' : 'none';
  }

  async function _ensureMonitoredTagsLoaded() {
    if (_monitoredTagsCache.length) return _monitoredTagsCache;
    try {
      const r = await fetch('/api/settings');
      const d = await r.json();
      const raw = (d && d.settings && d.settings.monitored_tags) || '[]';
      const parsed = JSON.parse(raw);
      _monitoredTagsCache = Array.isArray(parsed) ? parsed.filter(t => t && t.id && t.name) : [];
    } catch(_) { _monitoredTagsCache = []; }
    // First-ever entry to Tags mode: auto-select every monitored tag so
    // the feed has something to show. User's subsequent deselect/select
    // choices persist to localStorage and override this default.
    if (_selectedTagIds === null) {
      _selectedTagIds = _monitoredTagsCache.map(t => String(t.id));
      try { localStorage.setItem('topShelfScenesSelectedTags', JSON.stringify(_selectedTagIds)); } catch(_) {}
      _updateTagFilterBadge();
    }
    return _monitoredTagsCache;
  }

  function _renderTagFilterList() {
    const list = document.getElementById('tagFilterList');
    if (!list) return;
    if (!_monitoredTagsCache.length) {
      list.innerHTML = '<div style="padding:14px;color:var(--dim);font-size:12px;line-height:1.5">No vices configured. Add some under Settings → Content Filters → Vices.</div>';
      return;
    }
    const header = `
      <div style="display:flex;gap:6px;padding:4px 6px 8px;border-bottom:1px solid rgba(var(--brand-purple-rgb),0.18);margin-bottom:4px">

  function _updateTagFilterBadge() {
    const badge = document.getElementById('tagFilterBadge');
    if (!badge) return;
    // `_selectedTagIds` is intentionally `null` until the user (or
    // `_ensureMonitoredTagsLoaded`) seeds it — a fresh browser with no
    // localStorage key hits this path on the initial paint, before the
    // monitored-tags fetch resolves.
    const n = Array.isArray(_selectedTagIds) ? _selectedTagIds.length : 0;
    if (n > 0) {
      badge.textContent = String(n);
      badge.style.display = 'inline-block';

  function _positionTagFilterDropdown() {
    const btn = document.getElementById('tagFilterBtn');
    const dd = document.getElementById('tagFilterDropdown');
    if (!btn || !dd || dd.style.display !== 'block') return;
    const r = btn.getBoundingClientRect();
    const ddW = dd.offsetWidth || 280;
    const vw = window.innerWidth;
    // Align the dropdown's right edge to the button's right edge;
    // clamp to viewport so nothing gets clipped off-screen.
    let left = r.right - ddW;
    if (left < 8) left = 8;
    if (left + ddW > vw - 8) left = vw - ddW - 8;
    dd.style.top = (r.bottom + 6) + 'px';
    dd.style.left = left + 'px';
  }

  function toggleTagFilterDropdown() {
    const dd = document.getElementById('tagFilterDropdown');
    if (!dd) return;
    if (dd.style.display === 'block') {
      dd.style.display = 'none';

    }
    _ensureMonitoredTagsLoaded().then(() => {
      _renderTagFilterList();
      dd.style.display = 'block';
      _positionTagFilterDropdown();

  async function runScenesSearch() {
    // Scene search keys off performer / studio / tag / date — title
    // is intentionally not a scene-search field (movies use their own
    // title-based search panel below). Backend treats absent `title`
    // as no filter, so we just don't send one.
    const payload = {
      performer: document.getElementById('scenesSrchPerformer')?.value.trim() || '',
      studio:    document.getElementById('scenesSrchStudio')?.value.trim() || '',
      tag:       document.getElementById('scenesSrchTag')?.value.trim() || '',
      date_from: document.getElementById('scenesSrchDateFrom')?.value.trim() || '',
      date_to:   document.getElementById('scenesSrchDateTo')?.value.trim() || '',
      sources: [],
      per_page: 30,
    };
    if (document.getElementById('scenesSrchSrcTpdb')?.checked) payload.sources.push('tpdb');
    if (document.getElementById('scenesSrchSrcStashdb')?.checked) payload.sources.push('stashdb');
    if (document.getElementById('scenesSrchSrcFansdb')?.checked) payload.sources.push('fansdb');
    if (!payload.sources.length) {
      const status = document.getElementById('scenesSearchStatus');
      if (status) status.textContent = 'Select at least one source.';
      return;
    }
    if (!payload.performer && !payload.studio && !payload.tag && !payload.date_from && !payload.date_to) {
      const status = document.getElementById('scenesSearchStatus');
      if (status) status.textContent = 'Fill in at least one field.';
      return;
    }
    const grid = document.getElementById('scenesGrid');
    const status = document.getElementById('scenesSearchStatus');
    if (status) status.textContent = 'Searching ' + payload.sources.map(s => s.toUpperCase()).join(', ') + '…';
    grid.innerHTML = sceneGridSkeleton();
    try {
      const r = await fetch('/api/scenes/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const d = await r.json();
      if (d && d.error) {
        grid.innerHTML = `<div class="empty">${esc(d.error)}</div>`;
        if (status) status.textContent = '';
        return;
      }
      const scenes = d.scenes || [];
      if (status) status.textContent = scenes.length
        ? `${scenes.length} result${scenes.length === 1 ? '' : 's'} from ${(d.sources_queried || payload.sources).join(', ').toUpperCase()}`
        : 'No scenes matched.';
      if (!scenes.length) {
        grid.innerHTML = '<div class="empty">No scenes matched. Try broader search terms.</div>';
        grid.dataset.searchPopulated = '1';
        return;
      }
      renderSceneGrid(scenes, true);
      grid.dataset.searchPopulated = '1';
    } catch (e) {
      grid.innerHTML = `<div class="empty">Search failed: ${esc(e.message || e)}</div>`;
      if (status) status.textContent = '';
    }
  }

  async function runSearch() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return;
    const el = document.getElementById('searchResults');
    el.innerHTML = Array.from({length:6}, (_,i)=>`<div class="result-item"><div class="result-thumb-placeholder skeleton-box"></div><div style="flex:1;min-width:0"><div class="skeleton-line" style="width:${70 - (i%3)*10}%"></div><div class="skeleton-line" style="width:32%;margin-bottom:0"></div></div><div style="width:110px" class="skeleton-line"></div></div>`).join('');
    try {
      const r = await fetch(`/api/metadata/search?q=${encodeURIComponent(q)}&type=${currentType}&strict=0`);
      const d = await r.json();
      if (!d.results?.length) { el.innerHTML = '<div class="empty">No results found</div>'; return; }
      window._searchResults = d.results;
      const isStudio = currentType === 'studio';
      el.innerHTML = d.results.map((item, i) => {
        if (isStudio && item.image) {
          // Studio with image: show image only, stretched full width
          return `<div class="result-item-studio" id="ri-${i}" onclick="selectResult(${i})">
            <img class="result-studio-img" src="${esc(item.image)}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">

            <div id="lib-${i}" style="display:none"></div>
          </div>`;
        }
        if (isStudio) {
          // Studio without image: show text
          return `<div class="result-item" id="ri-${i}" onclick="selectResult(${i})">
            <div class="result-thumb-placeholder"><i class="fa-solid fa-clapperboard"></i></div>
            <div style="flex:1;min-width:0">
              <div class="result-name">${esc(capDisplayName(item.name))}</div>
              <div class="result-source">${item.source}</div>
            </div>
            <div id="lib-${i}" style="flex-shrink:0;font-size:11px;color:var(--dim)">...</div>
          </div>`;
        }
        // Performer: standard layout
        return `<div class="result-item" id="ri-${i}" onclick="selectResult(${i})">
          ${item.image
            ? `<div class="result-thumb-wrap"><img class="result-thumb" src="${esc(item.image)}" onerror="this.closest('.result-thumb-wrap').outerHTML='<div class=result-thumb-placeholder><i class=fa-solid fa-person></i></div>'"></div>`
            : `<div class="result-thumb-placeholder"><i class="fa-solid fa-person"></i></div>`}
          <div style="flex:1;min-width:0">
            <div class="result-name">${esc(capDisplayName(item.name))}</div>
            <div class="result-source">${item.source}</div>
          </div>
          <div id="lib-${i}" style="flex-shrink:0;font-size:11px;color:var(--dim)">...</div>
        </div>`;
      }).join('');
      // Check library status for each result
      d.results.forEach((item, i) => {
        fetch(`/api/library/check?name=${encodeURIComponent(item.name)}`)
          .then(r => r.json())
          .then(lib => {
            const el = document.getElementById(`lib-${i}`);
            if (!el) return;
            if (lib.found) {
              el.innerHTML = '<span class="lib-tag lib-tag--in">IN-LIBRARY</span>';
              window._searchResults[i]._inLibrary = true;
              window._searchResults[i]._libraryPath = lib.path;
            } else {
              el.innerHTML = '';
              window._searchResults[i]._inLibrary = false;
            }
          }).catch(() => { const el = document.getElementById(`lib-${i}`); if (el) el.innerHTML = ''; });
      });
    } catch(e) {
      el.innerHTML = `<div class="empty">Search failed: ${esc(e.message)}</div>`;
    }
  }

  async function loadScenes(item) {
    const section = document.getElementById('scenesSection');
    const grid    = document.getElementById('scenesGrid');
    const title   = document.getElementById('scenesTitle');
    const tabs    = document.getElementById('sceneTabs');
    title.textContent = item.name ? ('Recent Scenes — ' + capDisplayName(item.name)) : 'Recent Scenes';
    tabs.style.display = 'none';
    _sceneSources = {};
    section.style.display = 'block';
    grid.className = 'scene-grid';
    grid.innerHTML = sceneGridSkeleton();
    try {
      const params = new URLSearchParams({
        type: currentType,
        source: item.source,
        id: item.id,
        slug: item.slug || '',
        name: item.name || '',
      });
      const r = await fetch(`/api/scenes/recent?${params}`);
      const d = await r.json();

      // Always show source tabs for performer/studio lookup.
      // Normalize older response shape that returns only d.scenes.
      _sceneSources = d.sources || { tpdb: [], stashdb: [], fansdb: [] };
      if (!d.sources && Array.isArray(d.scenes)) {
        const sourceKey = (String(item.source || '').toLowerCase() === 'stashdb')
          ? 'stashdb'
          : (String(item.source || '').toLowerCase() === 'fansdb' ? 'fansdb' : 'tpdb');
        _sceneSources[sourceKey] = d.scenes;
      }

      tabs.style.display = 'grid';
      const available = Object.entries(_sceneSources).filter(([k, v]) => v && v.length > 0);
      document.querySelectorAll('.source-btn').forEach(btn => {
        const src = btn.dataset.src;
        const scenes = _sceneSources[src] || [];
        const label = src === 'tpdb' ? 'TPDB' : src === 'stashdb' ? 'StashDB' : 'FansDB';
        btn.innerHTML = `<img src="/static/logos/${src}.png" alt="${label}" style="height:16px;width:auto;vertical-align:middle;opacity:0.9">`;
        if (scenes.length > 0) {
          btn.classList.remove('disabled');
        } else {
          btn.classList.add('disabled');
        }
      });

      if (available.length > 0) {
        switchSceneSource(available[0][0]);
      } else {
        grid.innerHTML = '<div class="empty">No recent scenes found</div>';
      }
      return;
    } catch(e) {
      grid.innerHTML = `<div class="empty">Failed to load scenes</div>`;
    }
  }

  async function runSceneOverlaySearch() {
    const q = document.getElementById('sceneOverlayQuery').value.trim();
    if (!q) return;
    const el = document.getElementById('sceneOverlayResults');
    el.innerHTML = Array.from({length:6}, (_,i)=>`<div class="result-item"><div class="result-thumb-placeholder skeleton-box"></div><div style="flex:1;min-width:0"><div class="skeleton-line" style="width:${70 - (i%3)*10}%"></div><div class="skeleton-line" style="width:32%;margin-bottom:0"></div></div><div style="width:110px" class="skeleton-line"></div></div>`).join('');
    try {
      const r = await fetch(`/api/prowlarr/search?q=${encodeURIComponent(q)}`);
      const d = await r.json();
      if (d.error) { el.innerHTML = `<div class="empty">${esc(d.error)}</div>`; return; }
      if (!d.results?.length) { el.innerHTML = '<div class="empty">No results found</div>'; return; }
      window._sceneProwlarrResults = d.results;
      el.innerHTML = d.results.map((r, i) => `
        <div class="search-result" style="grid-template-columns:auto 1fr auto auto">
          <button type="button" class="btn-prowlarr-grab ${r.type === 'nzb' ? 'nzb' : ''}" title="Send to download client" onclick="grabResult(event, ${i})"><i class="fa-solid fa-download" aria-hidden="true"></i></button>
          <div style="min-width:0">
            <div class="sr-title" title="${esc(r.title)}">${truncateFilename(r.title, 60)}</div>
            <div class="sr-meta">${r.age ? Math.round(r.age/24) + 'd ago' : ''} ${r.seeders != null && r.seeders !== undefined ? '· ' + r.seeders + ' seeders' : ''}</div>
          </div>
          <span class="sr-indexer">${esc(_shortIndexer(r.indexer).replace(/ /g, '-'))}</span>
          <span class="sr-size">${r.size_mb > 1024 ? (r.size_mb/1024).toFixed(1) + ' GB' : r.size_mb + ' MB'}</span>
        </div>`).join('');
    } catch(e) {
      el.innerHTML = `<div class="empty">Search failed: ${esc(e.message)}</div>`;
    }
  }

  function truncateFilename(name, maxLen) {
    if (!name || name.length <= maxLen) return esc(name || '');
    return esc(name.slice(0, maxLen - 3)) + '...';
  }

  function closeAddSuccessOverlay() {
    const ov = document.getElementById('addSuccessOverlay');
    if (ov) ov.classList.remove('open');
    window._addSuccessProwlarrResults = null;
  }

  function openAddSuccessOverlay(name) {
    const raw = (name || '').trim();
    const label = capDisplayName(raw) || raw;
    const titleEl = document.getElementById('addSuccessTitle');
    if (titleEl) titleEl.textContent = 'Successfully Added ' + label;
    document.getElementById('addSuccessOverlay')?.classList.add('open');
    runAddSuccessProwlarrSearch(raw);

  async function runAddSuccessProwlarrSearch(q) {
    const el = document.getElementById('addSuccessProwlResults');
    if (!el) return;
    const query = (q || '').trim();
    if (!query) {
      el.innerHTML = '<div class="empty">No name to search</div>';
      return;
    }
    el.innerHTML = '<div class="empty" style="padding:16px">Searching Prowlarr…</div>';
    try {
      const r = await fetch(`/api/prowlarr/search?q=${encodeURIComponent(query)}`);
      const d = await r.json();
      if (d.error) { el.innerHTML = `<div class="empty">${esc(d.error)}</div>`; return; }
      if (!d.results?.length) {
        el.innerHTML = '<div class="empty">No Prowlarr results — check indexers in Settings</div>';
        return;
      }
      window._addSuccessProwlarrResults = d.results;
      el.innerHTML = d.results.map((rrow, i) => `
        <div class="search-result" style="grid-template-columns:auto 1fr auto auto">
          <button type="button" class="btn-prowlarr-grab ${rrow.type === 'nzb' ? 'nzb' : ''}" title="Send to download client" onclick="grabAddSuccessResult(event, ${i})"><i class="fa-solid fa-download" aria-hidden="true"></i></button>
          <div style="min-width:0">
            <div class="sr-title" title="${esc(rrow.title)}">${truncateFilename(rrow.title, 60)}</div>
            <div class="sr-meta">${rrow.age ? Math.round(rrow.age/24) + 'd ago' : ''} ${rrow.seeders != null && rrow.seeders !== undefined ? '· ' + rrow.seeders + ' seeders' : ''}</div>
          </div>
          <span class="sr-indexer">${esc(_shortIndexer(rrow.indexer).replace(/ /g, '-'))}</span>
          <span class="sr-size">${rrow.size_mb > 1024 ? (rrow.size_mb/1024).toFixed(1) + ' GB' : rrow.size_mb + ' MB'}</span>
        </div>`).join('');
    } catch (e) {
      el.innerHTML = `<div class="empty">Search failed: ${esc(e.message)}</div>`;
    }
  }

  async function grabAddSuccessResult(ev, idx) {
    const result = window._addSuccessProwlarrResults && window._addSuccessProwlarrResults[idx];
    const btn = ev.target && ev.target.closest ? ev.target.closest('button') : null;
    if (!btn || !result) return;
    btn.disabled = true;
    btn.classList.remove('btn-prowlarr-grab--sent');
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin" aria-hidden="true"></i>';
    try {
      const r = await fetch('/api/prowlarr/grab', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          guid:         result.guid || '',
          indexer_id:   result.indexer_id != null ? result.indexer_id : null,
          type:         result.type,
          download_url: result.type === 'torrent' && result.magnet ? result.magnet : result.download_url,
        }),
      });
      const d = await r.json();
      if (d.ok) {
        btn.classList.add('btn-prowlarr-grab--sent');
        btn.innerHTML = '<i class="fa-solid fa-check" aria-hidden="true"></i>';
      } else {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-download" aria-hidden="true"></i>';
        alert(d.error || 'Could not send to download client');
      }
    } catch (e) {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-download" aria-hidden="true"></i>';
      alert(e.message || 'Could not send to download client');
    }
  }

  async function grabResult(ev, idx) {
    const result = window._sceneProwlarrResults[idx];
    const btn = ev.target && ev.target.closest ? ev.target.closest('button') : null;
    if (!btn || !result) return;
    btn.disabled = true;
    btn.classList.remove('btn-prowlarr-grab--sent');
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin" aria-hidden="true"></i>';
    // Tag the grab with the originating scene's metadata so /downloads
    // can render its poster on the tile and we can match this download
    // back to the scene in the queue later. The scene currently shown
    // in the overlay is the one being grabbed.
    const ovScene = window._sceneOverlay || {};
    const sourceScene = ovScene && ovScene.id ? {
      db:         _currentSceneSource || 'tpdb',
      id:         String(ovScene.id || ''),
      title:      ovScene.title || '',
      studio:     ovScene.studio || '',
      performers: ovScene.performer
        ? (Array.isArray(ovScene.performer) ? ovScene.performer : [ovScene.performer])
        : [],
      poster_url: ovScene.thumb || '',
      date:       ovScene.date || '',
    } : null;
    try {
      const r = await fetch('/api/prowlarr/grab', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          guid:         result.guid || '',
          indexer_id:   result.indexer_id != null ? result.indexer_id : null,
          type:         result.type,
          download_url: result.type === 'torrent' && result.magnet ? result.magnet : result.download_url,
          title:        result.title || '',
          source_scene: sourceScene,
        }),
      });
      const d = await r.json();
      if (d.ok) {
        btn.classList.add('btn-prowlarr-grab--sent');
        btn.innerHTML = '<i class="fa-solid fa-check" aria-hidden="true"></i>';
      } else {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-download" aria-hidden="true"></i>';
        alert(d.error || 'Could not send to download client');
      }
    } catch(e) {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-download" aria-hidden="true"></i>';
      alert(e.message || 'Could not send to download client');
    }
  }

  async function showDetail(item) {
    document.getElementById('detailEmpty').style.display = 'none';
    document.getElementById('detailContent').style.display = 'flex';
    document.getElementById('detailName').textContent = capDisplayName(item.name || '');
    document.getElementById('detailMeta').innerHTML = `<span style="color:var(--dim);font-size:11px">${item.source}</span>`;
    setDetailBg(item.image);
    const libEl = document.getElementById('detailLibStatus');
    const destEl = document.getElementById('quickAddBar');
    libEl.innerHTML = '';
    fetch(`/api/library/check?name=${encodeURIComponent(item.name)}`)
      .then(r => r.json())
      .then(lib => {
        if (lib.found) {
          libEl.innerHTML = `<span class="lib-tag lib-tag--in">IN-LIBRARY</span>`;
          if (destEl) destEl.style.display = 'none';
        } else {
          libEl.innerHTML = `<span class="lib-tag lib-tag--out">NOT-IN-LIBRARY</span>`;
          if (destEl) destEl.style.display = 'inline-flex';
        }
      }).catch(() => { libEl.innerHTML = ''; if (destEl) destEl.style.display = 'inline-flex'; });
    document.getElementById('detailBio').textContent = '';
    document.getElementById('resultMsg').style.display = 'none';
    document.getElementById('detailMeta').innerHTML = detailLoadingSkeleton();
    document.getElementById('detailLinks').innerHTML = '';

    // Switch layout based on type
    const layoutEl = document.getElementById('detailLayout');
    const posterEl = document.getElementById('detailPoster');
    const isStudio = currentType === 'studio';
    const icon = isStudio ? 'clapperboard' : 'person';
    const posterClass = isStudio ? 'detail-poster-studio' : 'detail-poster';

    if (isStudio) {
      // Studio: stacked — image on top, text below
      layoutEl.style.flexDirection = 'column';
      layoutEl.style.alignItems = 'stretch';
      layoutEl.style.gap = '12px';
      posterEl.style.flexShrink = '0';
      posterEl.style.display = 'block';
      posterEl.style.height = 'auto';
    } else {
      // Performer: side-by-side — image left, text right
      layoutEl.style.flexDirection = 'row';
      layoutEl.style.alignItems = 'stretch';
      layoutEl.style.gap = '20px';
      posterEl.style.flexShrink = '0';
      posterEl.style.display = 'flex';
      posterEl.style.height = '100%';
    }

    if (item.image) {
      posterEl.innerHTML = `<img class="${posterClass}" src="${esc(item.image)}" onclick="openImageOverlay('${esc(item.image)}')" onerror="this.outerHTML='<div class=detail-poster-placeholder><i class=fa-solid fa-${icon}></i></div>'">`;
    } else {
      posterEl.innerHTML = `<div class="detail-poster-placeholder"><i class="fa-solid fa-${icon}"></i></div>`;
    }

    loadDirs();
    loadScenes(item);

    // Use a lightweight preview fetch
    try {
      const r = await fetch(`/api/metadata/preview?type=${currentType}&source=${encodeURIComponent(item.source)}&id=${encodeURIComponent(item.id)}`);
      const d = await r.json();
      if (d.image) {
        posterEl.innerHTML = `<img class="${posterClass}" src="${esc(d.image)}" onclick="openImageOverlay('${esc(d.image)}')" onerror="this.outerHTML='<div class=detail-poster-placeholder><i class=fa-solid fa-${icon}></i></div>'">`;
        setDetailBg(d.image);
      }
      document.getElementById('detailBio').textContent = d.bio || '';
      if (d.meta) document.getElementById('detailMeta').innerHTML = d.meta;
      // Render links
      const linksEl = document.getElementById('detailLinks');
      if (d.links && d.links.length) {
        linksEl.innerHTML = renderLinks(d.links);
      } else {
        linksEl.innerHTML = '';
      }
      // Update slug on selected result for better scene lookups
      if (d.slug && selectedResult) {
        selectedResult.slug = d.slug;
        loadScenes(selectedResult);
      }
    } catch {
      document.getElementById('detailBio').textContent = '';
    }
