<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top-Shelf — Loading</title>
<link rel="stylesheet" href="/static/fonts/dm-mono/dm-mono.css">
<script src="/static/theme-init.js"></script>
<link rel="stylesheet" href="/static/app-shell.css">
<style>
  @font-face {
    font-family: 'Acidoze';
    src: url('/static/fonts/Tox Typewriter.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg) url('/static/background.jpg') center center / cover fixed;
    color: var(--text); font-family: 'DM Mono', monospace;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: rgba(var(--bg-rgb),0.82); z-index: 0;
  }
  .card {
    position: relative; z-index: 1;
    background: linear-gradient(160deg, rgba(var(--panel-hi-rgb),0.94) 0%, rgba(var(--panel-lo-rgb),0.9) 100%);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px; padding: 40px 32px; width: min(440px, 100%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.07), 0 24px 64px rgba(0,0,0,0.5);
    backdrop-filter: blur(20px);
    display: flex; flex-direction: column; align-items: center; gap: 22px;
  }
  .logo { height: 40px; object-fit: contain; }
  h1 {
    font-family: 'Acidoze', monospace; font-size: 18px; font-weight: 400;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent);
    margin: 0;
  }
  .spinner {
    width: 46px; height: 46px;
    border: 3px solid rgba(var(--brand-purple-rgb), 0.18);
    border-top-color: #c084fc;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .step-line {
    font-size: 13px;
    color: var(--text);
    letter-spacing: 0.02em;
    text-align: center;
    min-height: 18px;
    transition: opacity 0.25s ease;
  }
  .progress-outer {
    width: 100%;
    height: 6px;
    background: rgba(var(--brand-purple-rgb), 0.10);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-inner {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #a855f7, #ec4899);
    border-radius: 999px;
    transition: width 0.35s ease;
  }
  .step-counter {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .done-list {
    width: 100%;
    list-style: none;
    padding: 0;
    margin: 4px 0 0 0;
    max-height: 130px;
    overflow-y: auto;
    font-size: 12px;
  }
  .done-list li {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 2px;
    color: var(--dim);
  }
  .done-list li::before {
    content: '✓';
    color: #4ade80;
    font-weight: bold;
  }
</style>
</head>
<body>
<div class="card">
  <img src="/static/logo.png" alt="Top-Shelf" class="logo" onerror="this.remove()">
  <h1>Warming Up</h1>
  <div class="spinner" id="spinner"></div>
  <div class="step-line" id="stepLine">Starting up…</div>
  <div class="progress-outer"><div class="progress-inner" id="progressInner"></div></div>
  <div class="step-counter" id="stepCounter">—</div>
  <ul class="done-list" id="doneList"></ul>
</div>
<script>
  const NEXT_URL = '__NEXT__' || '/scenes';
  const stepLine = document.getElementById('stepLine');
  const stepCounter = document.getElementById('stepCounter');
  const progressInner = document.getElementById('progressInner');
  const doneList = document.getElementById('doneList');
  const spinner = document.getElementById('spinner');

  let renderedDone = 0;

  async function pollStatus() {
    try {
      const r = await fetch('/api/startup/status', { cache: 'no-store' });
      const d = await r.json();
      stepLine.textContent = d.current || 'Warming caches…';
      const total = d.steps_total || 1;
      const idx = Math.min(d.step_index || 0, total);
      stepCounter.textContent = total ? `Step ${idx} of ${total}` : '—';
      const pct = total ? Math.max(4, Math.min(100, Math.round((idx / total) * 100))) : 4;
      progressInner.style.width = pct + '%';
      if (Array.isArray(d.steps_done)) {
        for (let i = renderedDone; i < d.steps_done.length; i++) {
          const li = document.createElement('li');
          li.textContent = d.steps_done[i];
          doneList.appendChild(li);
        }
        renderedDone = d.steps_done.length;
      }
      if (d.ready) {
        progressInner.style.width = '100%';
        stepLine.textContent = 'Ready — redirecting…';
        spinner.style.opacity = '0.35';
        setTimeout(() => { window.location.href = NEXT_URL; }, 350);
        return;
      }
    } catch (_) {
      // Ignore transient errors, just keep polling.
    }
    setTimeout(pollStatus, 800);
  }
  pollStatus();
</script>
</body>
</html>
