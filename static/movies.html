<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top-Shelf — Movies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/static/app-shell.css">
<style>
  @font-face { font-family: 'Acidoze'; src: url('/static/Tox Typewriter.ttf') format('truetype'); }
  @font-face { font-family: 'Seconds'; src: url('/static/Impact%20Label%20Reversed.ttf') format('truetype'); }
  :root {
    --bg: #0c0c0e; --surface: rgba(19,19,23,0.75); --raised: rgba(26,26,32,0.8);
    --border: #222228; --muted: #3a3a44; --text: #e8e8f0; --dim: #6b6b7a;
    --accent: #c084fc; --green: #4ade80; --amber: #fbbf24; --red: #f87171; --blue: #60a5fa;
    --mono: 'DM Mono', monospace; --sans: 'Syne', sans-serif;
    --acid: 'Acidoze', 'Syne', sans-serif; --secs: 'Seconds', 'DM Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(192,132,252,0.25); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(192,132,252,0.45); }
  * { scrollbar-width: thin; scrollbar-color: rgba(192,132,252,0.25) transparent; }
  body {
    background: var(--bg) url('/static/background.jpg') center center / cover fixed;
    color: var(--text); font-family: var(--mono); font-size: 13px; line-height: 1.6; min-height: 100vh;
  }
  body::before { content: ''; position: fixed; inset: 0; background: rgba(12,12,14,0.72); z-index: 0; }
  /* Width/padding: app-shell.css owns .app; keep local stacking only */
  .app { position: relative; z-index: 1; padding-bottom: 48px; width: 100%; max-width: 100%; min-width: 0; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    background: linear-gradient(160deg, rgba(36,36,48,0.88) 0%, rgba(18,18,26,0.78) 100%);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 8px 32px rgba(0,0,0,0.22);
    margin-bottom: 20px;
  }
  .logo img { height: 36px; object-fit: contain; }
  .nav-links { display: flex; gap: 10px; align-items: center; }
  .btn-secondary {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 5px;
    color: var(--dim); font-size: 19px; width: 40px; height: 40px; cursor: pointer; transition: all 0.15s;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .btn-secondary:hover { border-color: var(--muted); color: var(--text); }
  .active-nav { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); border: none; color: #0c0c0e; border-radius: 5px; padding: 8px 16px; font-family: var(--mono); cursor: pointer; font-size: 13px; }
  .btn-primary:hover { filter: brightness(1.1); }
  .version { font-family: var(--acid); font-size: 14px; color: var(--muted); }

  .page-head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    margin: 8px 0 18px;
  }
  .page-title {
    font-family: var(--acid);
    font-size: 34px;
    line-height: 1;
    letter-spacing: 0.08em;
    color: #fff;
    text-transform: uppercase;
  }
  .page-subtitle {
    margin-top: 8px;
    color: var(--dim);
    font-size: 12px;
    letter-spacing: 0.03em;
  }

  .panel {
    background: linear-gradient(160deg, rgba(36,36,48,0.88) 0%, rgba(18,18,26,0.78) 100%);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; overflow: hidden;
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 8px 32px rgba(0,0,0,0.25);
  }
  .panel-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 14px 18px; }
  .panel-title { font-family: var(--acid); font-size: 28px; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; color: #fff; }
  .panel-body { padding: 16px 18px; }
  .empty { text-align: center; color: var(--dim); font-size: 12px; padding: 32px; }
  .field-input { background: var(--raised); border: 1px solid var(--border); border-radius: 4px; color: var(--text); padding: 8px 12px; font-family: var(--mono); font-size: 12px; width: 100%; }
  .field-input:focus { outline: none; border-color: var(--accent); }

  .search-bar { display: flex; gap: 8px; margin-bottom: 0; }
  .search-bar .field-input { flex: 1; }
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-input { background: var(--raised); border: 1px solid var(--border); border-radius: 4px; color: var(--text); padding: 6px 10px; font-family: var(--mono); font-size: 11px; width: 140px; }
  .filter-input:focus { outline: none; border-color: var(--accent); }
  .filter-input::placeholder { color: var(--dim); }

  .movie-grid-wrap {
    width: 100%;
    max-width: 100%;
    min-width: 0;
    display: block;
  }
  /*
   * Two rows of 10 on desktop: flex + explicit basis (grid repeat(10,1fr) collapsed to
   * one column in some browsers when the panel uses overflow/stacking contexts).
   * 10 cards → 9 gaps × 10px = 90px
   */
  .movie-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-start;
    align-content: flex-start;
    gap: 10px;
    width: 100%;
    box-sizing: border-box;
    padding: 14px 18px 12px;
    min-width: 0;
  }
  .movie-grid .movie-card {
    flex: 0 0 calc((100% - 90px) / 10);
    width: calc((100% - 90px) / 10);
    max-width: calc((100% - 90px) / 10);
    min-width: 0;
    box-sizing: border-box;
  }
  .movie-grid .movie-grid-empty {
    flex: 1 1 100%;
    width: 100%;
    max-width: 100%;
  }
  .panel-movie-results {
    overflow: visible;
    max-width: 100%;
    min-width: 0;
    width: 100%;
  }
  /* Allow 10 columns to shrink inside the panel (default min-width:auto overflows with posters) */
  .movie-card {
    cursor: pointer;
    border-radius: 5px;
    overflow: hidden;
    background: var(--raised);
    transition: all 0.15s;
    border: 1px solid transparent;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .movie-card.loading { pointer-events:none; }
  .skeleton-box, .skeleton-line {
    position: relative; overflow: hidden; background: rgba(255,255,255,0.05);
  }
  .skeleton-box::after, .skeleton-line::after {
    content:''; position:absolute; inset:0; z-index:0; transform:translateX(-100%);
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 50%, transparent 100%);
    animation: shimmer 1.25s infinite;
  }
  .skeleton-line { height: 12px; border-radius:999px; margin-bottom:8px; }
  @keyframes shimmer { 100% { transform: translateX(100%); } }
  .movie-card:hover { border-color: var(--muted); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .movie-poster { width: 100%; aspect-ratio: 27/40; object-fit: cover; display: block; background: var(--raised); }
  .movie-poster-placeholder { width: 100%; aspect-ratio: 27/40; background: var(--raised); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 28px; }
  .img-load { position: relative; overflow: hidden; background: var(--raised); }
  .img-load .img-spin,
  .skeleton-box > .img-spin {
    position: absolute;
    inset: 50% auto auto 50%;
    width: 22px;
    height: 22px;
    margin: -11px 0 0 -11px;
    border-radius: 50%;
    border: 2px solid rgba(192,132,252,0.25);
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
    z-index: 2;
    pointer-events: none;
  }
  .img-load img { position: relative; z-index: 2; opacity: 0; transition: opacity 0.15s ease; }
  .img-load.ready img { opacity: 1; }
  .img-load.ready .img-spin { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .movie-info { padding: 8px 10px; flex: 1; min-width: 0; text-align: center; }
  .movie-title {
    font-family: var(--secs); font-size: 15px; color: #d4cfc4; overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.3; min-height: 2.6em; letter-spacing: -0.02em;
    overflow-wrap: anywhere; word-break: break-word; text-align: center;
  }
  .movie-meta { font-size: 11px; color: var(--dim); margin-top: 4px; line-height: 1.45; overflow-wrap: anywhere; word-break: break-word; text-align: center; }

  .detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
  .detail-overlay.open { display: flex; }
  .detail-card {
    background: linear-gradient(160deg, rgba(36,36,48,0.98) 0%, rgba(18,18,26,0.95) 100%);
    border-radius: 6px; max-width: 900px; width: 90vw; max-height: 85vh; overflow-y: auto;
    position: relative; box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  }
  .detail-bg { position: absolute; top: 0; left: 0; width: 100%; height: 300px; object-fit: cover; opacity: 0.15;
    mask-image: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
    pointer-events: none; }
  .detail-inner { position: relative; z-index: 1; padding: 28px; display: flex; gap: 24px; }
  .detail-poster {
    position: relative;
    width: 220px;
    flex-shrink: 0;
    border-radius: 5px;
    overflow: hidden;
    aspect-ratio: 27/40;
    background: var(--raised);
  }
  .detail-poster > .img-load { position: absolute; inset: 0; }
  .detail-poster > .img-load img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .detail-poster > .img-load > .movie-poster-placeholder { position: absolute; inset: 0; width: 100%; height: 100%; aspect-ratio: unset; font-size: 40px; }
  .detail-text { flex: 1; min-width: 0; }
  .detail-title { font-family: var(--acid); font-size: 28px; color: #fff; margin-bottom: 8px; }
  .detail-meta-line { font-size: 12px; color: var(--dim); line-height: 2; }
  .detail-meta-line span { color: var(--text); }
  .detail-synopsis { font-size: 12px; color: var(--dim); line-height: 1.8; margin-top: 12px; max-height: 120px; overflow-y: auto; }
  .detail-performers { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
  .perf-tag { font-family: var(--mono); font-size: 10px; color: var(--text); background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 3px; padding: 2px 8px; text-decoration: none; display: inline-block; }
  a.perf-tag:hover { border-color: var(--accent); color: var(--accent); }
  .detail-actions { display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
  .btn-action { padding: 8px 16px; border-radius: 4px; font-family: var(--mono); font-size: 12px; cursor: pointer; border: none; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
  .btn-prowlarr { background: var(--accent); color: #0c0c0e; }
  .btn-prowlarr:hover { filter: brightness(1.1); }
  .btn-tpdb { background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid var(--border); }
  .btn-tpdb:hover { border-color: var(--muted); }
  .detail-close { position: absolute; top: 14px; right: 14px; z-index: 2; background: none; border: none; color: var(--dim); font-size: 18px; cursor: pointer; }
  .detail-close:hover { color: var(--text); }

  .detail-scenes { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
  .detail-scenes-title { font-family: var(--acid); font-size: 18px; color: #fff; margin-bottom: 10px; }
  .detail-scene-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
  .detail-scene-card { border-radius: 4px; overflow: hidden; background: var(--raised); min-height: 154px; min-width: 0; }
  .detail-scene-card .img-load { width: 100%; aspect-ratio: 16/9; }
  .detail-scene-card .img-load img.detail-scene-thumb { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
  .detail-scene-thumb-ph { width: 100%; aspect-ratio: 16/9; background: var(--raised); }
  .detail-scene-info { padding: 6px 8px; font-size: 10px; color: var(--dim); }

  .pagination { display: flex; justify-content: center; gap: 8px; padding: 18px 0; }
  .page-btn { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 4px; color: var(--text); padding: 6px 14px; font-family: var(--mono); font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .page-btn:hover { border-color: var(--muted); }
  .page-btn.active { background: var(--accent); color: #0c0c0e; border-color: var(--accent); }
  .page-btn:disabled { opacity: 0.3; cursor: default; }

  .prowlarr-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; }
  .prowlarr-overlay.open { display: flex; }
  .prowlarr-card { background: linear-gradient(160deg, rgba(36,36,48,0.98) 0%, rgba(18,18,26,0.95) 100%); border-radius: 6px; max-width: 700px; width: 90vw; max-height: 80vh; overflow-y: auto; padding: 24px; position: relative; }
  .prowlarr-close { position: absolute; top: 12px; right: 12px; background: none; border: none; color: var(--dim); font-size: 16px; cursor: pointer; }
  .prowlarr-result { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 12px; gap: 8px; }
  .prowlarr-result:last-child { border-bottom: none; }
  .prowlarr-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
  .prowlarr-size { color: var(--dim); white-space: nowrap; }
  .prowlarr-indexer { font-size: 10px; color: var(--accent); white-space: nowrap; }
  .btn-grab { background: var(--green); color: #0c0c0e; border: none; border-radius: 3px; padding: 4px 10px; font-family: var(--mono); font-size: 11px; cursor: pointer; flex-shrink: 0; }
  .btn-grab:hover { filter: brightness(1.1); }

  .img-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 300; display: none; align-items: center; justify-content: center; cursor: pointer; }
  .img-overlay.open { display: flex; }
  .img-overlay img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 5px; }

  @media (max-width: 900px) {
    .page-head {
      flex-direction: column;
      align-items: flex-start;
    }
    .page-title {
      font-size: 28px;
    }
    .search-bar {
      flex-wrap: wrap;
    }
    .search-bar .field-input {
      min-width: 220px;
    }
    .movie-grid .movie-card {
      flex: 0 0 calc((100% - 40px) / 5);
      width: calc((100% - 40px) / 5);
      max-width: calc((100% - 40px) / 5);
    }
  }

  @media (max-width: 640px) {
    .panel-title {
      font-size: 22px;
    }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div style="display:flex;align-items:center;gap:12px">
      <a href="/scenes" class="logo"><img src="/static/logo.png" alt="Top-Shelf" onerror="this.outerHTML='<span style=font-family:var(--acid);font-size:28px;color:#fff>TOP-SHELF</span>'"></a>
      <span class="version" id="verTag">v1.0.0</span>
    </div>
    <div class="nav-links">
      <a href="/scenes" style="text-decoration:none"><button class="btn-secondary" title="Scenes"><i class="fa-solid fa-ticket"></i></button></a>
      <a href="/movies" style="text-decoration:none"><button class="btn-secondary active-nav" title="Movies"><i class="fa-solid fa-clapperboard"></i></button></a>
      <a href="/queue" style="text-decoration:none"><button class="btn-secondary" title="Queue"><i class="fa-solid fa-list"></i></button></a>
      <a href="/downloads" style="text-decoration:none"><button class="btn-secondary" title="Downloads"><i class="fa-solid fa-download"></i></button></a>
      <a href="/favourites" style="text-decoration:none"><button class="btn-secondary" title="Favourites"><i class="fa-solid fa-heart"></i></button></a>
      <a href="/library" style="text-decoration:none"><button class="btn-secondary" title="Maintenance"><i class="fa-solid fa-folder-plus"></i></button></a>
      <a href="/history" style="text-decoration:none"><button class="btn-secondary" title="History"><i class="fa-solid fa-clock-rotate-left"></i></button></a>
      <button class="btn-secondary" onclick="fetch('/api/auth/logout',{method:'POST'}).then(()=>location.href='/login')" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></button>
      <a href="/settings" style="text-decoration:none"><button class="btn-secondary" title="Settings"><i class="fa-solid fa-gear"></i></button></a>
    </div>
  </header>

  <div class="panel" style="margin-bottom:20px">
    <div class="panel-header">
      <span class="panel-title">Movies</span>
      <span style="font-size:11px;color:var(--dim)" id="resultNote">Latest TPDB releases</span>
    </div>
    <div class="panel-body" style="padding-bottom:8px">
      <div class="search-bar">
        <input class="field-input" id="searchInput" type="text" placeholder="Search TPDB..." onkeydown="if(event.key==='Enter')searchMovies()">
        <input class="filter-input" id="filterYear" type="text" placeholder="Year" style="width:80px" onkeydown="if(event.key==='Enter')searchMovies()">
        <button class="btn-primary" onclick="searchMovies()"><i class="fa-solid fa-magnifying-glass"></i></button>
        <button class="btn-secondary" onclick="clearSearch()" title="Clear / Latest"><i class="fa-solid fa-arrows-rotate"></i></button>
      </div>
    </div>
  </div>

  <!-- Results panel -->
  <div class="panel panel-movie-results">
    <div class="panel-header">
      <span class="panel-title" id="gridTitle">Latest Releases</span>
      <span style="font-size:11px;color:var(--dim)" id="gridCount"></span>
    </div>
    <div class="movie-grid-wrap">
      <div id="movieGrid" class="movie-grid"></div>
    </div>
    <div id="pagination" class="pagination" style="display:none"></div>
  </div>

</div>

<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-card" id="detailCard">
    <button class="detail-close" onclick="closeDetail()"><i class="fa-solid fa-x"></i></button>
    <div id="detailContent"></div>
  </div>
</div>

<div class="prowlarr-overlay" id="prowlarrOverlay" onclick="if(event.target===this)closeProwlarr()">
  <div class="prowlarr-card">
    <button class="prowlarr-close" onclick="closeProwlarr()"><i class="fa-solid fa-x"></i></button>
    <div class="panel-title" style="font-size:20px;margin-bottom:16px" id="prowlarrTitle">Search Results</div>
    <div id="prowlarrResults"><div class="empty">Searching...</div></div>
  </div>
</div>

<div class="img-overlay" id="imgOverlay" onclick="closeImgOverlay()">
  <img id="imgOverlayImg" src="">
</div>

<script>
  let currentPage = 1, totalPages = 1;
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function movieTitleDisplay(s) { return esc(String(s || '').trim()); }
  function movieGridSkeleton(count = 20) {
    return Array.from({length: count}, () => `
      <div class="movie-card loading">
        <div class="skeleton-box" style="width:100%;aspect-ratio:27/40">
          <div class="img-spin" aria-hidden="true"></div>
        </div>
        <div class="movie-info">
          <div class="skeleton-line" style="width:82%"></div>
          <div class="skeleton-line" style="width:58%;margin-bottom:0"></div>
        </div>
      </div>`).join('');
  }
  function movieDetailSkeleton() {
    return `
      <div class="detail-inner">
        <div class="detail-poster"><div class="skeleton-box" style="position:absolute;inset:0"><div class="img-spin" aria-hidden="true"></div></div></div>
        <div class="detail-text">
          <div class="skeleton-line" style="width:45%;height:20px"></div>
          <div class="skeleton-line" style="width:72%"></div>
          <div class="skeleton-line" style="width:100%"></div>
          <div class="skeleton-line" style="width:96%"></div>
          <div class="skeleton-line" style="width:88%"></div>
          <div style="display:flex;gap:8px;margin-top:18px">
            <div class="skeleton-box" style="height:34px;width:170px;border-radius:4px"></div>
            <div class="skeleton-box" style="height:34px;width:110px;border-radius:4px"></div>
          </div>
        </div>
      </div>`;
  }

  async function loadMovies(page = 1) {
    currentPage = page;
    const grid = document.getElementById('movieGrid');
    grid.innerHTML = movieGridSkeleton(20);
    const q = document.getElementById('searchInput').value.trim();
    const params = new URLSearchParams({ page });
    if (q) params.set('q', q);
    const year = document.getElementById('filterYear').value.trim();
    if (year) params.set('year', year);
    const isSearch = q || year;
    document.getElementById('resultNote').textContent = isSearch ? 'Search results' : 'Latest TPDB releases';
    document.getElementById('gridTitle').textContent = isSearch ? 'Results' : 'Latest Releases';
    try {
      const url = isSearch ? `/api/movies/search?${params}` : `/api/movies/tpdb/latest?${params}`;
      const r = await fetch(url);
      const d = await r.json();
      const movies = (d.results || []).slice(0, 20);
      document.getElementById('gridCount').textContent = movies.length ? `${movies.length} movies` : '';
      if (!movies.length) {
        let msg = 'No movies found';
        if (d.error) {
          if (String(d.error).includes('TPDB returned 401')) {
            msg = 'No movies found. TPDB authentication failed (401). Add or update your TPDB API key in Settings.';
          } else {
            msg += ' (' + esc(d.error) + ')';
          }
        }
        grid.innerHTML = `<div class="empty movie-grid-empty">${msg}</div>`;
        document.getElementById('pagination').style.display = 'none';
        return;
      }
      const posterFallback = '/static/poster.jpg';
      grid.innerHTML = movies.map(m => {
        const posterUrl = (m.poster && String(m.poster).trim()) ? m.poster : posterFallback;
        return `
        <div class="movie-card" data-movie-id="${esc(m.id)}">
          <div class="img-load"><div class="img-spin" aria-hidden="true"></div><img class="movie-poster" src="${esc(posterUrl)}" loading="lazy" onload="this.closest('.img-load')?.classList.add('ready')" onerror="this.onerror=null;this.src='${posterFallback}';this.closest('.img-load')?.classList.add('ready');"></div>
          <div class="movie-info">
            <div class="movie-title" title="${esc(m.title)}">${movieTitleDisplay(m.title)}</div>
            <div class="movie-meta">${m.studio ? esc(m.studio) : ''}${m.date ? ' · ' + m.date : ''}</div>
          </div>
        </div>`;
      }).join('');
      if (isSearch && d.total_pages > 1) { totalPages = d.total_pages; renderPagination(); }
      else { document.getElementById('pagination').style.display = 'none'; }
    } catch(e) { grid.innerHTML = `<div class="empty movie-grid-empty">Error: ${esc(e.message)}</div>`; }
  }

  function renderPagination() {
    const el = document.getElementById('pagination');
    el.style.display = 'flex';
    let h = `<button class="page-btn" onclick="loadMovies(${currentPage-1})" ${currentPage<=1?'disabled':''}><i class="fa-solid fa-chevron-left"></i></button>`;
    const s = Math.max(1, currentPage-2), e = Math.min(totalPages, currentPage+2);
    for (let i = s; i <= e; i++) h += `<button class="page-btn ${i===currentPage?'active':''}" onclick="loadMovies(${i})">${i}</button>`;
    h += `<button class="page-btn" onclick="loadMovies(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}><i class="fa-solid fa-chevron-right"></i></button>`;
    el.innerHTML = h;
  }

  function searchMovies() { loadMovies(1); }
  function clearSearch() {
    document.getElementById('searchInput').value = '';
    document.getElementById('filterYear').value = '';
    loadMovies(1);
  }

  async function showDetail(movieId) {
    document.getElementById('detailContent').innerHTML = movieDetailSkeleton();
    document.getElementById('detailOverlay').classList.add('open');
    try {
      const r = await fetch(`/api/movies/tpdb/${movieId}`);
      const m = await r.json();
      if (m.error) { document.getElementById('detailContent').innerHTML = `<div class="empty">${esc(m.error)}</div>`; return; }
      const bg = m.background ? `<img class="detail-bg" src="${esc(m.background)}" onerror="this.remove()">` : '';
      const posterFallback = '/static/poster.jpg';
      const detailPosterUrl = (m.poster && String(m.poster).trim()) ? m.poster : posterFallback;
      const overlaySrc = esc((m.poster && String(m.poster).trim()) ? m.poster : posterFallback);
      const poster = `<div class="img-load"><div class="img-spin" aria-hidden="true"></div><img src="${esc(detailPosterUrl)}" style="cursor:pointer;width:100%;height:100%;object-fit:cover;display:block" onclick="openImgOverlay('${overlaySrc}')" onload="this.closest('.img-load')?.classList.add('ready')" onerror="this.onerror=null;this.src='${posterFallback}';this.closest('.img-load')?.classList.add('ready');"></div>`;
      const meta = [];
      if (m.studio) meta.push(`Studio: <span>${esc(m.studio)}</span>`);
      if (m.date) meta.push(`Released: <span>${esc(m.date)}</span>`);
      if (m.duration) meta.push(`Duration: <span>${Math.round(m.duration/60)} min</span>`);
      if (m.directors?.length) meta.push(`Director: <span>${m.directors.map(d=>esc(d)).join(', ')}</span>`);
      const perfLinks = (m.performer_links || []).map(p => {
        const name = esc(p.name || '');
        const href = p.url ? esc(p.url) : '';
        if (!name) return '';
        return href
          ? `<a class="perf-tag" href="${href}" target="_blank" onclick="event.stopPropagation()">${name}</a>`
          : `<span class="perf-tag">${name}</span>`;
      }).join('');
      const perfs = perfLinks || (m.performers||[]).map(p => `<span class="perf-tag">${esc(p)}</span>`).join('');
      let scenes = '';
      if (m.scenes?.length) {
        scenes = `<div class="detail-scenes"><div class="detail-scenes-title">Scenes (${m.scenes.length})</div><div class="detail-scene-grid">${m.scenes.map(s => `<div class="detail-scene-card">${s.thumb ? `<div class="img-load"><div class="img-spin" aria-hidden="true"></div><img class="detail-scene-thumb" src="${esc(s.thumb)}" loading="lazy" onload="this.closest('.img-load')?.classList.add('ready')" onerror="const w=this.closest('.img-load'); if(w){ this.outerHTML='<div class=\\'detail-scene-thumb-ph\\'></div>'; w.classList.add('ready'); }"></div>` : '<div class="detail-scene-thumb-ph"></div>'}<div class="detail-scene-info">${esc(s.title)}${s.date ? ' · '+s.date : ''}</div></div>`).join('')}</div></div>`;
      }
      document.getElementById('detailContent').innerHTML = `${bg}
        <div class="detail-inner">
          <div class="detail-poster">${poster}</div>
          <div class="detail-text">
            <div class="detail-title" title="${esc(m.title)}">${movieTitleDisplay(m.title)}</div>
            <div class="detail-meta-line">${meta.join(' &middot; ')}</div>
            ${perfs ? `<div class="detail-performers">${perfs}</div>` : ''}
            ${m.synopsis ? `<div class="detail-synopsis">${esc(m.synopsis)}</div>` : ''}
            <div class="detail-actions">
              <button class="btn-action btn-prowlarr" onclick="event.stopPropagation();searchProwlarr('${esc(m.title)}')"><i class="fa-solid fa-magnifying-glass"></i> Search Prowlarr</button>
              <a class="btn-action btn-tpdb" href="${esc(m.tmdb_url || ('https://www.themoviedb.org/search/movie?query=' + encodeURIComponent(m.title || '')))}" target="_blank" onclick="event.stopPropagation()"><i class="fa-solid fa-film"></i> TMDB</a>
              <a class="btn-action btn-tpdb" href="${esc(m.url)}" target="_blank" onclick="event.stopPropagation()"><i class="fa-solid fa-arrow-up-right-from-square"></i> TPDB</a>
            </div>
            ${scenes}
          </div>
        </div>`;
    } catch(e) { document.getElementById('detailContent').innerHTML = '<div class="empty">Error loading movie</div>'; }
  }

  function closeDetail() { document.getElementById('detailOverlay').classList.remove('open'); }

  async function searchProwlarr(title) {
    document.getElementById('prowlarrTitle').textContent = `Prowlarr: ${title}`;
    document.getElementById('prowlarrResults').innerHTML = '<div class="empty">Searching indexers...</div>';
    document.getElementById('prowlarrOverlay').classList.add('open');
    try {
      const r = await fetch(`/api/prowlarr/search?q=${encodeURIComponent(title)}`);
      const d = await r.json();
      const results = d.results || [];
      if (!results.length) { document.getElementById('prowlarrResults').innerHTML = '<div class="empty">No results found</div>'; return; }
      window._prowlarrResults = results;
      document.getElementById('prowlarrResults').innerHTML = results.map((r,i) => `
        <div class="prowlarr-result">
          <span class="prowlarr-indexer">${esc(r.indexer||'')}</span>
          <span class="prowlarr-name" title="${esc(r.title)}">${esc(r.title)}</span>
          <span class="prowlarr-size">${r.size_mb ? Math.round(r.size_mb)+' MB' : ''}${r.seeders != null ? ' · S:'+r.seeders : ''}</span>
          <button class="btn-grab" onclick="grabRelease(${i})"><i class="fa-solid fa-download"></i></button>
        </div>`).join('');
    } catch(e) { document.getElementById('prowlarrResults').innerHTML = `<div class="empty">Search failed: ${esc(e.message)}</div>`; }
  }

  async function grabRelease(idx) {
    const r = window._prowlarrResults[idx];
    if (!r) return;
    try {
      const resp = await fetch('/api/prowlarr/grab', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({kind: 'movie', guid: r.guid, indexer_id: r.indexer_id, download_url: r.download_url || r.magnet, type: r.type, title: r.title}) });
      const d = await resp.json();
      if (d.ok || d.success) alert(`Sent to download client: ${r.title}`);
      else alert(`Error: ${d.error || 'Unknown error'}`);
    } catch(e) { alert(`Grab failed: ${e.message}`); }
  }

  function closeProwlarr() { document.getElementById('prowlarrOverlay').classList.remove('open'); }
  function openImgOverlay(u) { document.getElementById('imgOverlayImg').src = u; document.getElementById('imgOverlay').classList.add('open'); }
  function closeImgOverlay() { document.getElementById('imgOverlay').classList.remove('open'); document.getElementById('imgOverlayImg').src = ''; }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeDetail(); closeProwlarr(); closeImgOverlay(); } });

  const movieGridEl = document.getElementById('movieGrid');
  movieGridEl.addEventListener('click', (e) => {
    const card = e.target.closest('.movie-card[data-movie-id]');
    if (!card) return;
    showDetail(card.getAttribute('data-movie-id') || '');
  });
  movieGridEl.innerHTML = movieGridSkeleton(20);
  loadMovies();
</script>
<script defer src="/static/app-shell.js"></script>
</body>
</html>
