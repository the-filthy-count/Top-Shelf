<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top-Shelf — Movies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  @font-face {
    font-family: 'Acidoze';
    src: url('/static/TELETYPE1945-1985.ttf') format('truetype');
    font-weight: normal; font-style: normal;
  }
  @font-face {
    font-family: 'Seconds';
    src: url('/static/xero4.ttf') format('truetype');
    font-weight: normal; font-style: normal;
  }
  :root {
    --bg:      #0c0c0e;
    --surface: rgba(19,19,23,0.75);
    --raised:  rgba(26,26,32,0.8);
    --border:  #222228;
    --muted:   #3a3a44;
    --text:    #e8e8f0;
    --dim:     #6b6b7a;
    --accent:  #c084fc;
    --green:   #4ade80;
    --amber:   #fbbf24;
    --red:     #f87171;
    --blue:    #60a5fa;
    --mono:    'DM Mono', monospace;
    --sans:    'Syne', sans-serif;
    --acid:    'Acidoze', 'Syne', sans-serif;
    --secs:    'Seconds', 'DM Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg) url('/static/background.jpg') center center / cover fixed;
    color: var(--text); font-family: var(--mono); font-size: 13px;
    line-height: 1.6; min-height: 100vh;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: rgba(12,12,14,0.72); z-index: 0;
  }
  .app { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 24px 48px; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 28px;
  }
  .logo img { height: 36px; object-fit: contain; }
  .nav-links { display: flex; gap: 10px; align-items: center; }
  .nav-link {
    font-size: 11px; color: var(--dim); text-decoration: none;
    letter-spacing: 0.08em; text-transform: uppercase;
    border: 1px solid var(--border); padding: 6px 14px; border-radius: 6px;
    transition: all 0.15s;
  }
  .nav-link:hover { color: var(--text); border-color: var(--muted); }
  .nav-link.active { border-color: var(--accent); color: var(--accent); }

  /* Stats */
  .stats-bar { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 20px; backdrop-filter: blur(12px);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .stat-value { font-family: var(--acid); font-size: 48px; font-weight: 400; line-height: 1; display: block; }
  .stat-label { font-family: var(--secs); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--dim); margin-top: 6px; }
  .stat-filed  .stat-value { color: var(--green); }
  .stat-errors .stat-value { color: var(--red); }
  .stat-total  .stat-value { color: var(--accent); }

  /* Main layout */
  .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

  /* Panels */
  .panel { background: linear-gradient(160deg, rgba(36,36,48,0.88) 0%, rgba(18,18,26,0.78) 100%); border: none; border-radius: 10px; overflow: hidden; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 8px 32px rgba(0,0,0,0.25); }
  .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: none; }
  .panel-title { font-family: var(--acid); font-size: 21px; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; color: #ffffff; }
  .panel-body { max-height: 460px; overflow-y: auto; }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }
  .empty { padding: 32px 18px; text-align: center; color: var(--dim); font-size: 12px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  /* Queue */
  .queue-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 18px; border-bottom: 1px solid var(--border); gap: 12px; transition: background 0.15s; }
  .queue-item:last-child { border-bottom: none; }
  .queue-item:hover { background: rgba(255,255,255,0.02); }
  .queue-item.active { background: rgba(192,132,252,0.06); border-left: 2px solid var(--accent); }
  .queue-filename { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .queue-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.05em; }
  .badge-size { background: rgba(255,255,255,0.05); color: var(--dim); }

  /* Search */
  .search-section { padding: 16px 18px; border-bottom: none; }
  .search-row { display: grid; grid-template-columns: 1fr 100px; gap: 8px; margin-bottom: 8px; }
  .field-input {
    background: var(--raised); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 6px; font-family: var(--mono); font-size: 12px;
    width: 100%; outline: none; transition: border-color 0.15s;
  }
  .field-input:focus { border-color: var(--accent); }
  .field-input::placeholder { color: var(--muted); }

  /* Buttons */
  .btn-primary { background: var(--accent); color: #0c0c0e; border: none; padding: 8px 14px; border-radius: 6px; font-size: 18px; line-height: 1; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; justify-content: center; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }
  .btn-secondary { background: none; border: 1px solid var(--border); color: var(--dim); padding: 8px 12px; border-radius: 6px; font-size: 16px; line-height: 1; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; justify-content: center; }
  .btn-secondary:hover { border-color: var(--muted); color: var(--text); }
  .active-nav { border-color: var(--accent) !important; color: var(--accent) !important; }
  .btn-run-file { background: none; border: 1px solid var(--muted); color: #ffffff; padding: 3px 10px; border-radius: 4px; font-family: Acidoze, var(--sans); font-size: 17px; cursor: pointer; letter-spacing: 0.05em; transition: all 0.15s; }
  .btn-run-file:hover { border-color: var(--accent); color: var(--accent); }
  .btn-small { background: none; border: 1px solid var(--muted); color: var(--dim); padding: 4px 10px; border-radius: 4px; font-family: var(--mono); font-size: 11px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn-small:hover { border-color: var(--accent); color: var(--accent); }
  .btn-green { border-color: var(--green); color: var(--green); }
  .btn-green:hover { background: rgba(74,222,128,0.1); }

  /* Search results */
  .results-grid { display: flex; flex-direction: column; }
  .result-item {
    display: grid; grid-template-columns: 60px 1fr auto;
    gap: 12px; padding: 12px 18px; border-bottom: none;
    align-items: center; transition: background 0.15s;
  }
  .result-item:last-child { border-bottom: none; }
  .result-item:hover { background: rgba(255,255,255,0.02); }
  .result-poster { width: 60px; height: 90px; object-fit: cover; border-radius: 4px; cursor: zoom-in; }
  .result-poster-placeholder { width: 60px; height: 90px; background: var(--raised); border-radius: 4px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 20px; }
  .result-info { min-width: 0; }
  .result-title { font-family: var(--sans); font-weight: 600; font-size: 14px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .result-year { font-size: 11px; color: var(--dim); margin-top: 2px; }
  .result-overview { font-size: 11px; color: var(--dim); margin-top: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .result-actions { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }

  /* Log */
  .log-body { padding: 14px 18px; max-height: 460px; overflow-y: auto; font-size: 12px; line-height: 1.8; }
  .log-body::-webkit-scrollbar { width: 4px; }
  .log-body::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }
  .log-line { display: block; }
  .log-line.file     { color: var(--accent); font-weight: 500; margin-top: 6px; }
  .log-line.done     { color: var(--green); }
  .log-line.warning  { color: var(--amber); }
  .log-line.error    { color: var(--red); }
  .log-line.sep      { color: var(--muted); }
  .log-line.default  { color: var(--dim); }

  /* History table */
  .history-panel { background: var(--surface); border: none; border-radius: 10px; overflow: hidden; margin-top: 20px; backdrop-filter: blur(12px); }
  .history-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 700px; }
  col.col-filename { width: 28%; }
  col.col-status   { width: 9%; }
  col.col-title    { width: 22%; }
  col.col-year     { width: 7%; }
  col.col-dest     { width: 23%; }
  col.col-proc     { width: 11%; }
  th { padding: 10px 12px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dim); border-bottom: 1px solid var(--border); background: rgba(19,19,23,0.95); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  td { padding: 9px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  tr:hover td { background: rgba(255,255,255,0.015); }
  .td-text { color: var(--text); }
  .td-dim  { color: var(--dim); }
  .status-tag { font-family: var(--secs); display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
  .status-filed   { background: rgba(74,222,128,0.12);  color: var(--green); }
  .status-error   { background: rgba(248,113,113,0.12); color: var(--red); }
  .status-skipped { background: rgba(255,255,255,0.06); color: var(--dim); }

  /* Image overlay */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 200; align-items: center; justify-content: center; cursor: zoom-out; backdrop-filter: blur(8px); }
  .overlay.open { display: flex; }
  .overlay img { max-width: 50vw; max-height: 90vh; object-fit: contain; border-radius: 8px; box-shadow: 0 24px 80px rgba(0,0,0,0.8); }

  /* Selected file pill */
  .file-pill { display: none; font-size: 11px; color: var(--accent); padding: 3px 10px; background: rgba(192,132,252,0.1); border-radius: 4px; border: 1px solid rgba(192,132,252,0.25); max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div style="display:flex;flex-direction:column;gap:3px"><div class="logo"><img src="/static/logo.png" alt="Top-Shelf"></div><span style="font-family:'DM Mono',monospace;font-size:10px;color:#6b6b7a;letter-spacing:0.06em;text-align:center">v1.0.4</span></div>
    <div class="nav-links">
      <a href="/" style="text-decoration:none"><button class="btn-secondary" title="TV Series"><i class="fa-solid fa-tv"></i></button></a>
      <a href="/movies" style="text-decoration:none"><button class="btn-secondary active-nav" title="Movies"><i class="fa-solid fa-film"></i></button></a>
      <a href="/library" style="text-decoration:none"><button class="btn-secondary" title="Library Health"><i class="fa-solid fa-house-medical"></i></button></a>
      <a href="/history" style="text-decoration:none"><button class="btn-secondary" title="History"><i class="fa-solid fa-clock-rotate-left"></i></button></a>
      <button class="btn-secondary" onclick="openSettings ? openSettings() : null" title="Settings"><i class="fa-solid fa-gear"></i></button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat-card stat-filed">
      <span class="stat-value" id="statFiled">0</span>
      <span class="stat-label">Filed</span>
    </div>
    <div class="stat-card stat-errors">
      <span class="stat-value" id="statErrors">0</span>
      <span class="stat-label">Errors</span>
    </div>
    <div class="stat-card stat-total">
      <span class="stat-value" id="statTotal">0</span>
      <span class="stat-label">Total</span>
    </div>
  </div>

  <div class="main-grid">

    <!-- Queue + Search -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Queue <span id="queueCount" style="color:var(--muted);font-family:var(--mono);font-size:13px"></span></span>
        <button class="btn-secondary" onclick="loadQueue()" title="Refresh"><i class="fa-solid fa-arrows-rotate"></i></button>
      </div>
      <div class="panel-body" id="queueList">
        <div class="empty">Loading...</div>
      </div>
    </div>

    <!-- TMDB Search -->
    <div class="panel">
      <div class="panel-header">
        <div style="display:flex;align-items:center;gap:10px">
          <span class="panel-title">Search</span>
          <span class="file-pill" id="filePill"></span>
          <button id="clearFileBtn" style="display:none" class="btn-secondary" onclick="clearFile()" title="Deselect"><i class="fa-solid fa-x"></i></button>
        </div>
        <button class="btn-secondary" onclick="clearSearch()" title="Clear"><i class="fa-solid fa-x"></i></button>
      </div>
      <div class="search-section">
        <div class="search-row">
          <input class="field-input" id="srchTitle" type="text" placeholder="Movie title..." onkeydown="if(event.key==='Enter')runSearch()">
          <input class="field-input" id="srchYear" type="text" placeholder="Year" onkeydown="if(event.key==='Enter')runSearch()">
        </div>
        <div style="display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:8px">
          <input class="field-input" id="srchTmdbId" type="text" placeholder="TMDB ID (optional — skips search, files directly)" onkeydown="if(event.key==='Enter')runSearch()">
          <button class="btn-primary" onclick="runSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
      </div>
      <div class="panel-body results-grid" id="searchResults">
        <div class="empty">Select a file from the queue, then search for the movie</div>
      </div>
    </div>

  </div>

  <!-- Log -->
  <div class="panel" style="margin-bottom:20px">
    <div class="panel-header">
      <span class="panel-title">Live Log</span>
      <button class="btn-secondary" onclick="clearLog()" title="Clear"><i class="fa-solid fa-x"></i></button>
    </div>
    <div class="log-body" id="logBody">
      <span class="log-line default">Waiting for pipeline...</span>
    </div>
  </div>

  <!-- History -->
  <div class="history-panel">
    <div class="panel-header">
      <span class="panel-title">History</span>
      <button class="btn-secondary" onclick="loadHistory()" title="Refresh"><i class="fa-solid fa-arrows-rotate"></i></button>
    </div>
    <div class="history-scroll">
      <table>
        <colgroup>
          <col class="col-filename"><col class="col-status"><col class="col-title">
          <col class="col-year"><col class="col-dest"><col class="col-proc">
        </colgroup>
        <thead>
          <tr>
            <th>Filename</th><th>Status</th><th>Title</th>
            <th>Year</th><th>Destination</th><th>Processed</th>
          </tr>
        </thead>
        <tbody id="historyBody">
          <tr><td colspan="6" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- Image overlay -->
<div class="overlay" id="overlay" onclick="closeOverlay()">
  <img id="overlayImg" src="">
</div>

<script>
  let selectedFile = null;
  let eventSource  = null;

  // ── Log ──────────────────────────────────────────────────────────────
  function classifyLine(line) {
    if (line.startsWith('FILE '))   return 'file';
    if (line.includes('DONE'))      return 'done';
    if (line.includes('WARNING'))   return 'warning';
    if (line.includes('ERROR') || line.includes('FAILED')) return 'error';
    if (line.startsWith('---'))     return 'sep';
    return 'default';
  }
  function appendLog(text) {
    const body = document.getElementById('logBody');
    const span = document.createElement('span');
    span.className = `log-line ${classifyLine(text)}`;
    span.textContent = text;
    body.appendChild(span);
    body.appendChild(document.createTextNode('\n'));
    body.scrollTop = body.scrollHeight;
  }
  function clearLog() { document.getElementById('logBody').innerHTML = ''; }
  function startSSE() {
    if (eventSource) eventSource.close();
    eventSource = new EventSource('/api/log/stream');
    eventSource.onmessage = e => {
      try { const d = JSON.parse(e.data); if (!d.ping) appendLog(d); } catch {}
    };
  }

  // ── Stats ─────────────────────────────────────────────────────────────
  async function loadStats() {
    try {
      const r = await fetch('/api/movies/stats');
      const d = await r.json();
      document.getElementById('statFiled').textContent  = d.filed  || 0;
      document.getElementById('statErrors').textContent = d.errors || 0;
      document.getElementById('statTotal').textContent  = d.total  || 0;
    } catch {}
  }

  // ── Queue ─────────────────────────────────────────────────────────────
  async function loadQueue() {
    try {
      const r = await fetch('/api/movies/queue');
      const d = await r.json();
      const list = document.getElementById('queueList');
      document.getElementById('queueCount').textContent = d.files ? `(${d.files.length})` : '';
      if (!d.files?.length) { list.innerHTML = '<div class="empty">No files in queue</div>'; return; }
      window._queueFiles = d.files;
      list.innerHTML = d.files.map((f, i) => `
        <div class="queue-item ${selectedFile === f.filename ? 'active' : ''}" id="qi-${i}">
          <span class="queue-filename" title="${esc(f.filename)}">${esc(f.filename)}</span>
          <div class="queue-meta">
            <span class="badge badge-size">${f.size_mb} MB</span>
            <button class="btn-run-file" onclick="selectFile(window._queueFiles[${i}].filename)" title="Select for filing"><i class="fa-solid fa-film"></i></button>
          </div>
        </div>`).join('');
    } catch { document.getElementById('queueList').innerHTML = '<div class="empty">Error loading queue</div>'; }
  }

  function selectFile(filename) {
    selectedFile = filename;
    document.getElementById('filePill').textContent = filename;
    document.getElementById('filePill').style.display = 'inline-block';
    document.getElementById('clearFileBtn').style.display = 'inline-flex';
    // Highlight queue item
    document.querySelectorAll('.queue-item').forEach(el => el.classList.remove('active'));
    if (window._queueFiles) {
      const idx = window._queueFiles.findIndex(f => f.filename === filename);
      if (idx !== -1) document.getElementById(`qi-${idx}`)?.classList.add('active');
    }
    // Pre-populate search from filename
    const stem = filename.replace(/\.[^.]+$/, '').replace(/[\._]/g, ' ');
    const yearMatch = stem.match(/\b(19|20)\d{2}\b/);
    document.getElementById('srchYear').value = yearMatch ? yearMatch[0] : '';
    // Strip year and common noise from title
    let title = stem.replace(/\b(19|20)\d{2}\b/, '').replace(/\b(720p|1080p|4k|bluray|webrip|hdtv|x264|x265|hevc|avc)\b/gi, '').trim();
    document.getElementById('srchTitle').value = title;
    runSearch();
  }

  function clearFile() {
    selectedFile = null;
    document.getElementById('filePill').style.display = 'none';
    document.getElementById('clearFileBtn').style.display = 'none';
    document.querySelectorAll('.queue-item').forEach(el => el.classList.remove('active'));
  }

  // ── Search ────────────────────────────────────────────────────────────
  async function runSearch() {
    const tmdbId = document.getElementById('srchTmdbId').value.trim();
    const title  = document.getElementById('srchTitle').value.trim();
    const year   = document.getElementById('srchYear').value.trim();

    // If TMDB ID provided and file selected, file directly without searching
    if (tmdbId && selectedFile) {
      fileMovie(tmdbId, `TMDB ID ${tmdbId}`);
      return;
    }
    if (!title) return;
    const resultsEl = document.getElementById('searchResults');
    resultsEl.innerHTML = '<div class="empty">Searching...</div>';
    try {
      const params = new URLSearchParams({ q: title });
      if (year) params.set('year', year);
      const r = await fetch(`/api/movies/search?${params}`);
      const d = await r.json();
      if (d.error) { resultsEl.innerHTML = `<div class="empty">${esc(d.error)}</div>`; return; }
      if (!d.results.length) { resultsEl.innerHTML = '<div class="empty">No results found</div>'; return; }
      resultsEl.innerHTML = d.results.map(movie => `
        <div class="result-item">
          ${movie.poster_url
            ? `<img class="result-poster" src="${movie.poster_url}" onclick="openOverlay('${movie.poster_url}')" onerror="this.outerHTML='<div class=result-poster-placeholder><i class=fa-solid fa-film></i></div>'">`
            : `<div class="result-poster-placeholder"><i class="fa-solid fa-film"></i></div>`}
          <div class="result-info">
            <div class="result-title">${esc(movie.title)}</div>
            <div class="result-year">${movie.year || 'Unknown year'} ${movie.rating ? `· ★ ${movie.rating.toFixed(1)}` : ''}</div>
            <div class="result-overview">${esc(movie.overview || '')}</div>
          </div>
          <div class="result-actions">
            ${selectedFile
              ? `<button class="btn-small btn-green" onclick="fileMovie('${esc(movie.id)}', '${esc(movie.title)} (${movie.year})')">
                   <i class="fa-solid fa-play"></i> File
                 </button>`
              : `<span style="font-size:10px;color:var(--muted)">Select file first</span>`}
            <a href="https://www.themoviedb.org/movie/${movie.id}" target="_blank" style="font-size:10px;color:var(--accent)">TMDB ↗</a>
          </div>
        </div>`).join('');
    } catch(e) {
      resultsEl.innerHTML = `<div class="empty">Search failed: ${esc(e.message)}</div>`;
    }
  }

  function clearSearch() {
    document.getElementById('srchTitle').value = '';
    document.getElementById('srchYear').value = '';
    document.getElementById('srchTmdbId').value = '';
    document.getElementById('searchResults').innerHTML = '<div class="empty">Select a file from the queue, then search for the movie</div>';
  }

  // ── File movie ────────────────────────────────────────────────────────
  async function fileMovie(tmdbId, label) {
    if (!selectedFile) { alert('No file selected'); return; }
    if (!confirm(`File "${selectedFile}" as "${label}"?`)) return;
    clearLog();
    const r = await fetch('/api/movies/file', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ filename: selectedFile, tmdb_id: tmdbId }),
    });
    const d = await r.json();
    if (d.error) { alert(`Error: ${d.error}`); return; }
    clearFile();
    clearSearch();
    setTimeout(() => { loadQueue(); loadHistory(); loadStats(); }, 3000);
  }

  // ── History ───────────────────────────────────────────────────────────
  async function loadHistory() {
    try {
      const r = await fetch('/api/movies/history');
      const d = await r.json();
      const tbody = document.getElementById('historyBody');
      if (!d.history.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">No history yet</td></tr>'; return; }
      tbody.innerHTML = d.history.map(row => `
        <tr>
          <td class="td-text" title="${esc(row.filename)}">${esc(row.filename)}</td>
          <td><span class="status-tag status-${row.status}">${row.status}</span></td>
          <td class="td-dim" title="${esc(row.title||'')}">${esc(row.title||'-')}</td>
          <td class="td-dim">${row.year||'-'}</td>
          <td class="td-dim" title="${esc(row.destination||'')}">${esc(row.destination||'-')}</td>
          <td class="td-dim">${row.processed_at ? row.processed_at.slice(0,16) : '-'}</td>
        </tr>`).join('');
    } catch {}
  }

  // ── Overlay ───────────────────────────────────────────────────────────
  function openOverlay(src) {
    document.getElementById('overlayImg').src = src;
    document.getElementById('overlay').classList.add('open');
  }
  function closeOverlay() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('overlayImg').src = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });

  function esc(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init ──────────────────────────────────────────────────────────────
  startSSE();
  loadQueue();
  loadHistory();
  loadStats();
</script>
</body>
</html>
