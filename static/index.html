<body>
<!-- Persistent decorative silhouette — pinned to the viewport's
     bottom-right. Lives at <body> root (not inside the panel) because
     `.prowlarr-search-panel` declares `backdrop-filter` + `overflow:hidden`,
     which would re-anchor and clip a `position:fixed` descendant. -->
<div class="dl-bg-decor" aria-hidden="true" data-dl-decor>
  <img src="/static/img/silhouette8.webp" alt="" loading="lazy">
</div>
<div class="app">

  <header class="ts-app-header">
    <div class="ts-header-left">
      <a href="/queue" class="logo" title="Go to Queue"><img src="/static/img/logo.webp" alt="Top-Shelf" onerror="this.outerHTML='<span style=font-family:var(--acid);font-size:28px;color:var(--text)>TOP-SHELF</span>'"></a>
      <span class="version" id="appVersion"></span>
    </div>
    <div id="tsActivityBanner" class="ts-header-activity" aria-live="polite"></div>
    <div class="nav-links">
      <a href="/downloads" style="text-decoration:none"><button class="btn-secondary" title="Downloads"><i class="ts-nav-icon ts-nav-icon--downloads"></i></button></a>
      <a href="/scenes" style="text-decoration:none"><button class="btn-secondary" title="Browse — feed grid"><i class="ts-nav-icon ts-nav-icon--scenes"></i></button></a>
      <a href="/library" style="text-decoration:none"><button class="btn-secondary" title="Library"><i class="ts-nav-icon ts-nav-icon--library"></i></button></a><a href="/news" style="text-decoration:none"><button class="btn-secondary" title="News"><i class="ts-nav-icon ts-nav-icon--news"></i></button></a>
      <a href="/health" style="text-decoration:none"><button class="btn-secondary" title="Health"><i class="ts-nav-icon ts-nav-icon--health"></i></button></a>
      <a href="/settings" style="text-decoration:none"><button class="btn-secondary" title="Settings"><i class="ts-nav-icon ts-nav-icon--settings"></i></button></a>
      <button class="btn-secondary" onclick="fetch('/api/auth/logout',{method:'POST'}).then(()=>location.href='/login')" title="Logout"><i class="ts-nav-icon ts-nav-icon--logout"></i></button>
    </div>
  </header>

  <div class="panel prowlarr-search-panel">
    <div class="ts-page-head index-page-head">
      <div class="ts-page-head__row">
        <div class="ts-page-head__left">
          <div class="panel-title ts-page-title" id="indexPageTitle">
            <i class="ts-page-title__icon ts-nav-icon ts-nav-icon--index" aria-hidden="true"></i>
            <span class="ts-page-title__text" id="indexPageTitleText">Latest Favourite Downloads</span>
          </div>
        </div>
        <div class="ts-page-head__center">
        <div class="ts-seg ts-seg--5 index-mode-seg" role="group" aria-label="Feed source">
          <button type="button" id="dlModeProwlarr" onclick="setDlSearchMode('prowlarr')" title="Search"><i class="fa-solid fa-magnifying-glass" style="margin-right:6px"></i><span class="btn-label">Search</span></button>
          <button type="button" id="dlModeFavourites" class="active" onclick="setDlSearchMode('favourites')" title="Favourites"><span class="fav-lips" style="margin-right:6px"></span><span class="btn-label">Favourites</span></button>
          <button type="button" id="dlModeRss" onclick="setDlSearchMode('rss')" title="Stars"><i class="fa-solid fa-user" style="margin-right:6px"></i><span class="btn-label">Stars</span></button>
          <button type="button" id="dlModeStudios" onclick="setDlSearchMode('studios')" title="Studios"><i class="ts-icon-studios" style="margin-right:6px" aria-hidden="true"></i><span class="btn-label">Studios</span></button>
          <button type="button" id="dlModeWanted" onclick="setDlSearchMode('wanted')" title="Wanted"><i class="fa-solid fa-eye" style="margin-right:6px"></i><span class="btn-label">Wanted</span></button>
        </div>
        </div>
        <div class="ts-page-head__right" id="dlRssHeaderControls" style="visibility:visible">
        <input type="text" id="dlRssFilter" class="field-input" placeholder="Filter…" style="width:220px;padding:8px 10px" oninput="filterRssResults()">
        <button type="button" data-duotone-toggle class="btn-primary" onclick="toggleDuotoneMode()" title="Swap duotone" style="width:40px;height:40px;padding:0;border-radius:8px;flex-shrink:0"><i class="fa-solid fa-palette"></i></button>
        <button type="button" id="dlRssRefreshBtn" class="btn-primary" onclick="loadDlRssFeed('_refresh')" title="Refresh" style="width:40px;height:40px;padding:0;border-radius:8px;flex-shrink:0"><i class="fa-solid fa-arrows-rotate"></i></button>
        </div>
      </div>
    </div>

    <div id="dlSearchModeProwlarr">
    <div class="dl-prowlarr-toolbar" style="justify-content:center">
      <select id="dlProwlarrKind" class="field-input" style="min-width:160px;flex:0 0 auto" title="Category tag">
        <option value="scene">…</option>
        <option value="movie">…</option>
      </select>
      <input type="text" id="dlProwlarrQuery" class="field-input" style="flex:1;min-width:160px;max-width:420px" placeholder="Query…" autocomplete="off" onkeydown="if(event.key==='Enter')runDlProwlarrSearch()">
      <button type="button" class="btn-primary" onclick="runDlProwlarrSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>
    </div>
    <div id="dlSearchModeRss" style="display:none">
    </div>
    <div class="dl-prowlarr-body" id="dlProwlarrBodyWrap">
      <div id="dlProwlarrResults" class="dl-prowlarr-results"><div class="empty" style="padding:16px">Enter a query and search.</div></div>
    </div>
    <!-- Wanted section -->
    <div id="dlSearchModeWanted" class="queue-section wanted-panel" style="display:none;flex:1;min-height:0;flex-direction:column">
      <div class="q-panel">
        <div class="q-panel-header">
          <span class="q-panel-title"><i class="fa-solid fa-eye" style="color:var(--accent);margin-right:8px;font-size:calc(12px + 2pt)"></i>Wanted <span id="wantedCount" style="font-family:var(--secs);font-size:calc(12px + 2pt);letter-spacing:-0.02em;color:var(--dim)"></span></span>
          <div class="header-actions">
            <input id="wantedFilter" class="queue-filter" type="text" placeholder="Filter wanted…" oninput="filterWantedPanel()" spellcheck="false">
            <button class="btn-secondary" onclick="loadWantedPanel({force:true})" title="Refresh Wanted" style="border:1px solid var(--border);color:var(--dim);padding:6px 10px;border-radius:6px;background:none;cursor:pointer;transition:border-color 0.15s,color 0.15s"><i class="fa-solid fa-arrows-rotate"></i></button>
          </div>
        </div>
        <div class="q-panel-body wanted-split">
          <div class="wanted-list-col wanted-list-col--scenes">
            <div class="wanted-list-col-header"><i class="ts-icon-scenes" aria-hidden="true"></i> Scenes <span class="wanted-list-col-count" id="wantedCountScenes">(0)</span></div>
            <div id="wantedListScenes" class="wanted-list-col-body ts-row-list"><div class="empty">Loading…</div></div>
          </div>
          <div class="wanted-list-col wanted-list-col--movies">
            <div class="wanted-list-col-header"><i class="ts-icon-movies" aria-hidden="true"></i> Movies <span class="wanted-list-col-count" id="wantedCountMovies">(0)</span></div>
            <div id="wantedListMovies" class="wanted-list-col-body ts-row-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>


<script defer src="/static/index.js?v=1"></script>

<div id="wantedSearchOverlay" style="display:none;position:fixed;inset:0;background:rgba(8,6,16,0.78);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:9998;align-items:center;justify-content:center;padding:24px" onclick="if(event.target===this)closeWantedSearch()">
