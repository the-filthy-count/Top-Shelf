<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/static/img/favicon.ico" type="image/x-icon">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top-Shelf — Scenes</title>
<!-- Backgrounds load on demand via CSS `--app-bg-image`. The page
     doesn't use any <wa-*> components either, so webawesome (which
     also ships a self-referencing localize.js / chunk.JHBJNH5V.js
     module cycle) isn't loaded here. -->
<link rel="stylesheet" href="/static/fonts/dm-mono/dm-mono.css">
<link rel="stylesheet" href="/static/fonts/font-awesome/css/all.min.css">
<script src="/static/theme-init.js"></script>
<link rel="stylesheet" href="/static/app-shell.css">
<script src="/static/ts-utils.js"></script>
<script src="/static/performer-popup.js"></script>
<!-- lottie-web — drives the Mouth.json loading animation on the
     /discover info panel. We bind the animation directly via JS
     (see scenes-common.js) instead of relying on the web-component
     wrapper, which sometimes failed to upgrade in time. -->
<script src="https://cdn.jsdelivr.net/npm/lottie-web@5.12.2/build/player/lottie.min.js"></script>
<style>
  @font-face {
    font-family: 'Acidoze';
    src: url('/static/fonts/Tox Typewriter.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Shatter';
    src: url('/static/fonts/shatter.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Seconds';
    src: url('/static/fonts/Impact%20Label%20Reversed.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
  :root {
    /* Colour palette lives in /static/app-shell.css (themeable via html[data-theme=...]) */
    --mono:    'DM Mono', monospace;
    --acid:    'Acidoze', 'DM Mono', monospace;
    --secs:    'Seconds', 'DM Mono', monospace;
  }
  /* IN-LIBRARY / NOT-IN-LIBRARY (uses --font-impact-label from app-shell.css) */
  .lib-tag {
    font-family: var(--font-impact-label);
    font-size: 20px;
    letter-spacing: -0.02em;
  }
  .lib-tag--in { color: var(--green); }
  .lib-tag--out { color: var(--red); }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  /* Styled scrollbars */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(var(--brand-purple-rgb),0.35); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(var(--brand-purple-rgb),0.55); }
  * { scrollbar-width: thin; scrollbar-color: rgba(var(--brand-purple-rgb),0.35) transparent; }
  body {
    background: var(--bg) var(--app-bg-image) center center / cover fixed;
    color: var(--text); font-family: var(--mono); font-size: 13px;
    line-height: 1.6; min-height: 100vh;
    overflow-x: hidden;
  }
  body::before { content: ''; position: fixed; inset: 0; background: rgba(var(--bg-rgb),0.72); z-index: 0; }
  .app { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 24px 12px; }

  header {
    padding: 14px 16px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    background: linear-gradient(160deg, rgba(var(--panel-hi-rgb),0.88) 0%, rgba(var(--panel-lo-rgb),0.78) 100%);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 8px 32px rgba(0,0,0,0.22);
    margin-bottom: 20px;
  }
  header:not(.ts-app-header) {
    display: flex; align-items: center; justify-content: space-between;
  }
  header.ts-app-header {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(200px, 2fr) minmax(0, 1fr);
    align-items: center;
    gap: 12px 16px;
  }
  header.ts-app-header .ts-header-left { justify-self: start; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; min-width: 0; }
  header.ts-app-header .nav-links { justify-self: end; }
  .logo img { height: 36px; object-fit: contain; }
  .nav-links { display: flex; gap: 8px; }

  /* Layout
   * /discover takes the whole viewport below the header. Left column
   * (search) stretches full height; right column splits vertically
   * into the existing detail/spotlight panel (fixed 345px) and a new
   * info panel (#discoverInfoPanel) that fills the rest. */
  .layout {
    display: grid;
    grid-template-columns: 480px 1fr;
    gap: 20px;
    align-items: stretch;
    /* Fill viewport from below the header to the bottom. The
     * 130px subtraction accounts for: header padding 14×2 ≈ 28px,
     * header content ≈ 36px, header margin-bottom 20px, app
     * padding-bottom 12px, page borders + safety margin ≈ 34px. */
    height: calc(100vh - 130px);
    margin-bottom: 0;
    min-height: 540px;
  }
  /* Left search column fills full layout height. */
  .layout > .panel:first-child {
    height: 100% !important;
    min-height: 0;
  }
  /* Right column: vertical flex split (detail/spotlight on top, new
   * info panel below). */
  .discover-right-col {
    display: flex;
    flex-direction: column;
    gap: 20px;
    height: 100%;
    min-height: 0;
  }
  .discover-right-col > .panel:first-child {
    flex: 0 0 345px;
  }
  .discover-right-col > .panel.discover-info-panel {
    flex: 1 1 0;
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .discover-info-empty {
    padding: 40px 18px;
    text-align: center;
    color: var(--dim);
    font-size: 13px;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .discover-info-empty-logo {
    width: min(420px, 60%);
    height: 60%;
    background: url('/static/img/logo.png') center / contain no-repeat;
    opacity: 0.85;
    /* Two stacked drop-shadows — a softer, larger, longer-thrown
     * shadow underneath a closer one so the logo reads like it's
     * floating well above the panel surface rather than sitting on
     * it. Larger Y offsets + bigger blur radii + lower alpha = the
     * "high-altitude" look. */
    filter:
      drop-shadow(0 16px 24px rgba(0, 0, 0, 0.35))
      drop-shadow(0 36px 56px rgba(0, 0, 0, 0.22));
  }
  /* Silhouette in the bottom-right of the empty results tile — half
   * tile height, touching the bottom edge, 50% opacity. Vanishes
   * automatically once a result loads because its parent
   * `.discover-info-empty` flips to `display: none`. */
  .discover-info-empty {
    position: relative;
  }
  .discover-info-empty-silhouette {
    position: absolute;
    bottom: 0;
    right: 0;
    height: 75%;
    /* Default silhouette: silhouette3.png (704×1778). Swapped to
     * silhouette1.png by `body.has-female-content` below when any
     * of the female-leaning content filters is enabled. */
    aspect-ratio: 704 / 1778;
    width: auto;
    opacity: 0.25;
    pointer-events: none;
    background-image: url('/static/img/silhouette3.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: bottom right;
    -webkit-mask-image: url('/static/img/silhouette3.png');
    mask-image: url('/static/img/silhouette3.png');
    -webkit-mask-size: contain;
    mask-size: contain;
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    -webkit-mask-position: bottom right;
    mask-position: bottom right;
    isolation: isolate;
  }
  body.has-female-content .discover-info-empty-silhouette {
    aspect-ratio: 1924 / 3900;
    background-image: url('/static/img/silhouette1.png');
    -webkit-mask-image: url('/static/img/silhouette1.png');
    mask-image: url('/static/img/silhouette1.png');
  }
  .discover-info-empty-silhouette::after {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--duotone-multiply, #000);
    mix-blend-mode: color;
    opacity: 0.25;
    pointer-events: none;
  }
  /* Search-panel silhouette — sits at the bottom of the search tile,
   * centred horizontally, at 20% opacity. Search results render on
   * top via z-index, so as cards arrive they cover the silhouette. */
  .search-panel-silhouette {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    /* Width-driven: silhouette spans the full tile width, height
     * derives from the source aspect ratio. Tile clips any
     * overflow via its own `overflow: hidden`. */
    width: 100%;
    /* Default silhouette: silhouette4.png (681×1622). Swapped to
     * silhouette2.png by `body.has-female-content` below. */
    aspect-ratio: 681 / 1622;
    height: auto;
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
    background-image: url('/static/img/silhouette4.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: bottom center;
    -webkit-mask-image: url('/static/img/silhouette4.png');
    mask-image: url('/static/img/silhouette4.png');
    -webkit-mask-size: contain;
    mask-size: contain;
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    -webkit-mask-position: bottom center;
    mask-position: bottom center;
    isolation: isolate;
  }
  body.has-female-content .search-panel-silhouette {
    aspect-ratio: 298 / 758;
    background-image: url('/static/img/silhouette2.png');
    -webkit-mask-image: url('/static/img/silhouette2.png');
    mask-image: url('/static/img/silhouette2.png');
  }
  .search-panel-silhouette::after {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--duotone-multiply, #000);
    mix-blend-mode: color;
    opacity: 0.25;
    pointer-events: none;
  }
  /* VHS theme — swap to the VHS-styled logo. */
  html[data-theme="vhs"] .discover-info-empty-logo {
    background-image: url('/static/img/logo_vhs.png');
  }
  .discover-info-body {
    flex: 1;
    overflow: hidden;       /* no panel scrolling — content fits dynamically */
    padding: 16px 18px;
    min-height: 0;
  }
  /* Performer variant: open magazine spread (left) + 2-column scenes
   * grid (right). Each column gets half the panel; the contents fit
   * inside their share without forcing an aspect-ratio outside. */
  .discover-info-perf-layout {
    display: flex;
    gap: 24px;
    align-items: stretch;
    height: 100%;
  }
  .discover-info-perf-layout > .discover-info-carousel-col,
  .discover-info-perf-layout > .discover-info-scenes-col {
    flex: 1 1 0;
    min-width: 0;
    height: 100%;
  }
  .discover-info-perf-layout > .discover-info-carousel-col {
    align-items: stretch;
    justify-content: flex-start;
  }
  .discover-info-carousel-col,
  .discover-info-scenes-col {
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
  }
  /* The carousel column is the magazine's size container. The spread
   * computes its dimensions from `100cqi` / `100cqb` instead of
   * stretching with the panel, so the page proportions stay locked
   * regardless of how the column gets resized. */
  .discover-info-carousel-col {
    container-type: size;
    align-items: center;
    justify-content: center;
  }
  /* ── Magazine spread component ─────────────────────────────────
   * An "open magazine" sitting in the gallery slot. Two pages joined
   * by a centre fold. Left page is the editorial feature image with
   * a title overlay; right page is an asymmetric collage of
   * additional images. Aspect ratio approximates a real spread. */
  .magazine {
    /* Open-spread width / height. Locked so the layout never stretches
     * or squashes when the column resizes — the magazine scales but
     * always renders at the same proportions. The cqi/cqb container is
     * `.discover-info-carousel-col`. The width resolves to whichever
     * is smaller: filling the column horizontally, or filling it
     * vertically scaled by the aspect ratio. */
    --mag-ratio: 1.42;
    position: relative;
    width: min(100cqi, calc(100cqb * var(--mag-ratio)));
    height: auto;
    aspect-ratio: var(--mag-ratio);
    margin: 0;
    display: grid;
    grid-template-columns: 1fr 0 1fr;
    background: transparent;
    border-radius: 0;
    /* Slight off-white for the right page; left page is the cover
     * image and stays photographic. */
    --mag-paper:  #fafafa;
    --mag-paper2: #f3f0eb;
    --mag-ink:    #1d1726;
  }
  /* Glossy sheen over the entire spread — diagonal highlight pass
   * sitting above the pages but below the spine/staples so it reads
   * as a soft glare on the laminated cover. */
  .magazine::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
    background:
      linear-gradient(118deg,
        rgba(255, 255, 255, 0.32) 0%,
        rgba(255, 255, 255, 0.08) 14%,
        rgba(255, 255, 255, 0.0)  32%,
        rgba(255, 255, 255, 0.0)  62%,
        rgba(255, 255, 255, 0.05) 78%,
        rgba(255, 255, 255, 0.18) 100%);
    mix-blend-mode: screen;
  }
  .magazine-page {
    position: relative;
    overflow: hidden;
    background: var(--mag-paper);
    isolation: isolate;
  }
  .magazine-page--feature { border-radius: 0; }
  .magazine-page--gallery { border-radius: 0; padding: 32px 32px 28px 36px; }

  /* Spine shadow — a soft dark gradient along each page's inner edge
   * that fades out toward the open side. Reads as the paper softly
   * curving down into the binding. Sits above the image (z=2) and
   * gloss (z=3) but below the title overlay (z=4). */
  .magazine-page--feature::after,
  .magazine-page--gallery::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 56px;
    z-index: 3;
    pointer-events: none;
  }
  .magazine-page--feature::after {
    right: 0;
    background: linear-gradient(to left,
      rgba(0, 0, 0, 0.55) 0%,
      rgba(0, 0, 0, 0.30) 35%,
      rgba(0, 0, 0, 0.0)  100%);
  }
  .magazine-page--gallery::after {
    left: 0;
    background: linear-gradient(to right,
      rgba(0, 0, 0, 0.45) 0%,
      rgba(0, 0, 0, 0.20) 35%,
      rgba(0, 0, 0, 0.0)  100%);
  }

  /* Paper texture: warm fractal grain + diagonal fibres + soft warm
   * wash. Same recipe as the movie-tile vhs paper but lighter. */
  .magazine-paper {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background-image:
      var(--vhs-paper),
      repeating-linear-gradient(112deg, transparent 0 7px, rgba(120, 90, 40, 0.04) 7px 8px),
      repeating-linear-gradient(22deg,  transparent 0 11px, rgba(140, 110, 60, 0.03) 11px 12px),
      linear-gradient(160deg, rgba(255, 245, 215, 0.18) 0%, rgba(150, 110, 60, 0.06) 100%);
    background-size: 100% 100%, 100% 100%, 100% 100%, 100% 100%;
    background-blend-mode: multiply, multiply, multiply, normal;
    opacity: 0.55;
  }

  /* Centre gutter — strong inner shadow either side simulates the
   * bound spine. Two vertical staples at ~⅓ and ⅔ height (90°-rotated
   * from the previous horizontal pass) give the saddle-stitch feel. */
  .magazine-spine {
    position: relative;
    z-index: 6;
    width: 0;
    box-shadow:
      -16px 0 22px -8px rgba(0, 0, 0, 0.55),
       16px 0 22px -8px rgba(0, 0, 0, 0.55);
    background: linear-gradient(90deg,
      rgba(0, 0, 0, 0.22) 0%,
      rgba(0, 0, 0, 0.55) 50%,
      rgba(0, 0, 0, 0.22) 100%);
  }
  .magazine-spine::before,
  .magazine-spine::after {
    content: '';
    position: absolute;
    left: 50%;
    width: 4px;
    height: 26px;
    transform: translateX(-50%);
    background:
      linear-gradient(90deg,
        rgba(255, 255, 255, 0.55) 0%,
        rgba(220, 220, 220, 0.95) 25%,
        rgba(150, 150, 150, 0.95) 50%,
        rgba(110, 110, 110, 0.95) 75%,
        rgba(60, 60, 60, 0.85) 100%);
    border-radius: 1px;
    box-shadow:
      1px 0 2px rgba(0, 0, 0, 0.55),
      0 0 0 0.5px rgba(0, 0, 0, 0.4);
    z-index: 7;
  }
  .magazine-spine::before { top: 32%; }
  .magazine-spine::after  { top: 68%; }

  /* Feature page (left). Image fills the page (cover) and anchors
   * to the top so the subject's head is always in frame. Static —
   * the magazine doesn't react to hover. */
  .magazine-feature-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    z-index: 2;
  }
  .magazine-feature-img--empty {
    background: var(--mag-paper2);
  }
  /* Small logo flag at the top-right of the feature page — sits
   * above the cover image and the gloss layer, like a magazine
   * masthead bug. */
  .magazine-feature-logo {
    position: absolute;
    top: 14px;
    right: 14px;
    width: clamp(48px, 8%, 80px);
    height: auto;
    z-index: 5;
    pointer-events: none;
    opacity: 0.95;
    filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.45));
  }
  .magazine-feature-gloss {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    background:
      linear-gradient(135deg,
        rgba(255, 255, 255, 0.18) 0%,
        rgba(255, 255, 255, 0.04) 22%,
        transparent 45%,
        transparent 100%),
      linear-gradient(180deg,
        transparent 55%,
        rgba(0, 0, 0, 0.55) 100%);
    mix-blend-mode: normal;
  }
  .magazine-feature-overlay {
    position: absolute;
    left: 22px;
    bottom: 42px;          /* nudged up — was 22px */
    right: 22px;
    z-index: 4;
    color: #fff;
    pointer-events: none;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
  }
  .magazine-eyebrow {
    font-family: var(--secs);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.85;
    margin-bottom: 6px;
  }
  .magazine-title {
    font-family: 'Shatter', 'Acidoze', 'DM Mono', monospace !important;
    font-weight: normal !important;
    font-style: normal !important;
    font-size: clamp(28px, 3.4vw, 52px);
    line-height: 1.0;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    /* Single line so the JS auto-fit pass below can measure overflow
     * via `scrollWidth > clientWidth`. Long names ("BABYRAINBOW") are
     * shrunk to fit; names that already fit at the clamp size are
     * left untouched. */
    white-space: nowrap;
  }
  /* Feature image hover — no movement (user clicks to open carousel). */

  /* Gallery page (right) — fixed editorial layout:
   *   ┌─────────────────────────────────┐
   *   │  ADJECTIVE   (faint underline)  │   header
   *   │  Neque porro… (subtitle)        │
   *   ├──────────────┬──────────────────┤
   *   │   body A     │     image 1      │   row 1
   *   ├──────────────┼──────────────────┤
   *   │   image 2    │     body B       │   row 2
   *   └──────────────┴──────────────────┘
   * Images are scaled to fit the cell height; text fills the cell
   * and overflow is clipped, so the page always looks fully populated
   * regardless of image count. */
  .mag-gallery {
    position: relative;
    z-index: 2;
    height: 100%;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow: hidden;
  }
  .mag-gallery-header {
    flex: 0 0 auto;
    padding: 0 2px 6px;
    border-bottom: 1px solid rgba(29, 23, 38, 0.18);
    container-type: inline-size;
  }
  .mag-gallery-adjective {
    /* Modern editorial display — high-contrast didone serif with a
     * graceful italic fallback chain (Didot → Bodoni → Playfair →
     * generic serif). Reads like a fashion-magazine masthead.
     * `!important` is required to defeat the VHS-theme global
     * `body *` font-family override in app-shell.css. The horizontal
     * rule under the title is provided by `.mag-gallery-header`'s
     * own `border-bottom`, so no `text-decoration: underline` here
     * (otherwise the heading reads as double-underlined). */
    font-family: 'Didot', 'Didot LT STD', 'Bodoni 72', 'Bodoni Moda',
                 'Playfair Display', 'Times New Roman', serif !important;
    font-weight: 700;
    font-style: normal;
    /* Single line, scaled to fit the page width — start large, then
     * shrink with container width so long pull-quotes never wrap.
     * Container query reads from `.mag-gallery-header`. */
    font-size: clamp(13px, 6.5cqi, 38px);
    line-height: 1.1;
    letter-spacing: 0.005em;
    text-transform: none;
    text-align: center;
    color: var(--mag-ink);
    text-decoration: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .mag-gallery-subtitle {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-style: italic;
    font-size: 11px;
    line-height: 1.45;
    color: var(--mag-ink);
    opacity: 0.65;
    margin-top: 6px;
  }
  /* 5-column track lets each row split asymmetrically — images get
   * 3/5 of the row, text gets 2/5. The images are placed on opposite
   * diagonals (TL covers cols 1–3 of row 1, BR covers cols 3–5 of
   * row 2), so they grow towards each other across the centre with
   * the row-gap providing the visible border between them. Text fills
   * whatever space is left in the opposite quadrant. */
  .mag-gallery-grid {
    flex: 1 1 0;
    min-height: 0;
    display: grid;
    /* Five-track shared base. Per-layout modifiers below set the row
     * tracks and area template — landscape sources get full-width
     * banner rows instead of being shoehorned into a paired cell. */
    grid-template-columns: repeat(5, minmax(0, 1fr));
    column-gap: 6px;
    row-gap: 10px;
    align-content: start;
  }
  /* PP — portrait + portrait: diagonal image pairs with a centred
   * callout slot between them. The middle row is `minmax(0, 1fr)` so
   * it absorbs whatever vertical space the image rows leave — when
   * the portraits render tall and fill the page, the row collapses
   * to zero and the callout disappears via `overflow: hidden`. When
   * the images leave a gap, the row expands and the callout
   * (Didone serif, italic, large) fills it. `align-content: stretch`
   * so the 1fr middle row actually receives the leftover height. */
  .mag-gallery-grid--pp {
    grid-template-rows: auto minmax(0, 1fr) auto;
    grid-template-areas:
      "img-tl img-tl img-tl txt-tr txt-tr"
      "quote  quote  quote  quote  quote "
      "txt-bl txt-bl img-br img-br img-br";
    align-content: stretch;
  }
  /* PL — portrait top-left paired with text; landscape banner across
   * the bottom. Middle quote row collapses when there's no gap. */
  .mag-gallery-grid--pl {
    grid-template-rows: auto minmax(0, 1fr) auto;
    grid-template-areas:
      "img-tl img-tl img-tl txt-tr txt-tr"
      "quote  quote  quote  quote  quote "
      "img-band-br img-band-br img-band-br img-band-br img-band-br";
    align-content: stretch;
  }
  /* LP — landscape banner top, portrait bottom-right paired with text.
   * Middle quote row collapses when there's no gap. */
  .mag-gallery-grid--lp {
    grid-template-rows: auto minmax(0, 1fr) auto;
    grid-template-areas:
      "img-band-tl img-band-tl img-band-tl img-band-tl img-band-tl"
      "quote       quote       quote       quote       quote      "
      "txt-bl txt-bl img-br img-br img-br";
    align-content: stretch;
  }
  /* LL — two stacked full-width landscape banners. Middle quote row
   * fills the gap between them when one exists. */
  .mag-gallery-grid--ll {
    grid-template-rows: auto minmax(0, 1fr) auto;
    grid-template-areas:
      "img-band-tl img-band-tl img-band-tl img-band-tl img-band-tl"
      "quote       quote       quote       quote       quote      "
      "img-band-br img-band-br img-band-br img-band-br img-band-br";
    align-content: stretch;
  }
  .mag-cell--image-tl       { grid-area: img-tl; }
  .mag-cell--image-br       { grid-area: img-br; }
  .mag-cell--image-band-tl  { grid-area: img-band-tl; }
  .mag-cell--image-band-br  { grid-area: img-band-br; }
  .mag-cell--text-tr        { grid-area: txt-tr; }
  .mag-cell--text-bl        { grid-area: txt-bl; }
  .mag-cell--quote          { grid-area: quote; }
  /* Callout slot — large centred Didone serif italic that lives in
   * the gap between the two image rows. The grid track is
   * `minmax(0, 1fr)`, so this cell silently collapses (overflow
   * hidden) when there's no spare vertical space, and fills the gap
   * when there is. Smaller and less aggressive than the masthead
   * adjective so the page still reads as one composition. */
  .mag-cell--quote {
    /* Center the cell ITSELF vertically inside its 1fr row track via
     * `align-self: center` (instead of stretching the cell to the
     * full row height and then trying to center inside). Stretch +
     * inner-centering kept resolving to a bottom-anchored result —
     * something in the grid/flex chain was placing the inner text
     * at the row baseline. Letting the cell hug its content box and
     * positioning the *cell* at the row centre is the simpler model:
     * the cell is one line tall, that line lives at the centre of the
     * gap regardless of how the surrounding row resolves. */
    display: flex;
    align-items: center;
    justify-content: center;
    align-self: center;
    overflow: hidden;
    padding: 6px 24px;
    container-type: inline-size;
    min-height: 32px;
  }
  .mag-quote-text {
    font-family: 'Didot', 'Didot LT STD', 'Bodoni 72', 'Bodoni Moda',
                 'Playfair Display', 'Times New Roman', serif !important;
    font-style: italic;
    font-weight: 400;
    /* Width-driven scale only — see comment on the cell. The 11px
     * floor keeps the type readable on narrow magazine columns; the
     * 22px ceiling stops it from competing with the masthead. */
    font-size: clamp(11px, 3.4cqi, 22px);
    line-height: 1.1;
    letter-spacing: 0.01em;
    text-align: center;
    color: var(--mag-ink);
    opacity: 0.78;
    /* Single line — wrapping in a narrow gap row would risk ascender
     * clipping; ellipsis is the right truncation behaviour. */
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .mag-cell {
    position: relative;
    overflow: hidden;
    min-width: 0;
    min-height: 0;
  }
  .mag-cell--text {
    /* Image cells in the same row dictate row height. The text cell
     * uses min-height:0 + overflow:hidden so any overflow clips
     * cleanly inside the cell — no absolute-positioning trick. The
     * inner uses flex with `justify-content: space-between` to spread
     * paragraphs top-to-bottom so the column always fills vertically.
     * Per-cell `--mag-text-opacity` / `--mag-text-blur` are written
     * inline by the JS render so each cell gets a tiny editorial
     * variation (one slightly washier than the other). */
    min-height: 0;
    min-width: 0;
    overflow: hidden;
    padding: 2px 3px 4px;
    display: flex;
    flex-direction: column;
  }
  .mag-cell-text-inner {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                 'Helvetica Neue', Arial, sans-serif !important;
    font-size: 4.5px;
    line-height: 1.45;
    color: var(--mag-ink);
    text-align: justify;
    hyphens: auto;
    user-select: none;
    opacity: var(--mag-text-opacity, 0.85);
    overflow: hidden;
  }
  /* Per-paragraph blur (instead of wrapper-level) so any sharp inline
   * element stays crisp. The blur amount is `--mag-text-blur` set
   * inline per cell so each text column drifts a fraction (one a hair
   * softer than the other) — kills the templated feel without
   * sacrificing legibility. */
  .mag-cell-text-inner > p {
    filter: blur(var(--mag-text-blur, 0.5px));
  }
  /* Distinct paragraphs — separated by a blank-line gap so the
   * column reads as multiple paragraphs of body copy. */
  .mag-cell-text-inner p {
    margin: 0 0 1em;
    text-indent: 0;
  }
  .mag-cell-text-inner p + p {
    text-indent: 1.4em;
  }
  /* Pull-quote — centered display caption inserted between body
   * paragraphs so the column has rhythm and the cell fills. Uses
   * the same Didone serif as the masthead. */
  .mag-cell-text-inner .mag-pull-quote {
    margin: 1em 0;
    text-align: center;
    text-indent: 0 !important;
    font-family: 'Didot', 'Didot LT STD', 'Bodoni 72', 'Bodoni Moda',
                 'Playfair Display', 'Times New Roman', serif !important;
    font-weight: 400;
    font-style: italic;
    font-size: 14px;
    line-height: 1.15;
    letter-spacing: 0.005em;
    color: var(--mag-ink);
    opacity: 1;
    /* The wrapper has a soft blur — strip it for the pull quote so
     * the "headline" inside the body actually reads. */
    filter: blur(0);
  }
  .mag-cell-text-inner p:last-child {
    margin-bottom: 0;
  }
  .mag-cell--image {
    display: flex;
    cursor: pointer;
    background: transparent;
  }
  /* Top-left image: anchored to top-left of its cell, fills the cell
   * width — its height grows/shrinks the row, which pulls the bottom
   * cell of the same column with it. */
  .mag-cell--image-tl {
    align-items: flex-start;
    justify-content: flex-start;
  }
  /* Bottom-right image: anchored to bottom-right corner. */
  .mag-cell--image-br {
    align-items: flex-end;
    justify-content: flex-end;
  }
  /* Landscape banner cells span the full row width and let the image
   * sit flush. The image is `object-fit: cover` to fill the band edge
   * to edge — landscape sources get treated as full-bleed editorial
   * banners rather than short stamps in a paired slot. */
  .mag-cell--image-band-tl,
  .mag-cell--image-band-br {
    align-items: stretch;
    justify-content: stretch;
  }
  .mag-cell--image img {
    width: 100%;
    height: auto;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
  }
  /* Banner-cell image rules — placed AFTER the generic
   * `.mag-cell--image img` rule and selectors raised to
   * `.mag-cell.mag-cell--image-band-*` to outweigh it on specificity.
   * Without this, the `object-fit: contain` and `max-height: 100%`
   * from the generic rule letterbox landscape sources with empty
   * bands either side of the cell. */
  .mag-cell.mag-cell--image-band-tl img,
  .mag-cell.mag-cell--image-band-br img {
    width: 100%;
    /* Cinematic 21:9 banner cap — keeps two-banner LL spreads from
     * pushing past the page boundary and gives single-banner PL/LP
     * layouts a predictable editorial strip shape. Cover-crops the
     * natural image to that aspect; for an already-landscape source
     * the crop only trims a sliver of top + bottom. */
    aspect-ratio: 21 / 9;
    height: auto;
    max-width: none;
    max-height: none;
    object-fit: cover;
    object-position: center;
  }
  .mag-tile {
    position: relative;
    overflow: hidden;
    border-radius: 2px;
    background: var(--mag-paper2);
    /* Flat on the page — no drop shadow. */
    box-shadow: none;
    cursor: pointer;
    min-width: 0;
    min-height: 0;
    margin: 0 0 8px;
    break-inside: avoid;
    -webkit-column-break-inside: avoid;
    page-break-inside: avoid;
    display: block;
  }
  .mag-tile img {
    width: 100%;
    height: auto;          /* respect the image's native (portrait) aspect */
    object-fit: contain;
    display: block;
  }

  /* (Orphaned `.mag-tile--text` / `.mag-tile--quote` rules removed —
   * the editorial restructure replaced both with `.mag-cell--text`.) */

  /* ── /discover info-panel loading state ────────────────────────
   * Mouth.json Lottie animation centered over a neon-glow caption
   * and a sliding shimmer bar. */
  .discover-loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: var(--text);
    font-family: var(--secs);
    user-select: none;
  }
  .dl-mouth {
    width: clamp(160px, 28%, 260px);
    height: clamp(160px, 28%, 260px);
    filter: drop-shadow(0 0 18px rgba(244, 114, 182, 0.45))
            drop-shadow(0 0 36px rgba(192, 132, 252, 0.30));
  }
  .dl-tape {
    position: relative;
    display: flex;
    align-items: center;
    gap: 22px;
  }
  .dl-reel {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 50%,
        rgba(0, 0, 0, 0.85) 0%,
        rgba(0, 0, 0, 0.85) 22%,
        transparent 23%),
      conic-gradient(from 0deg,
        rgba(244, 114, 182, 0.95),
        rgba(192, 132, 252, 0.95),
        rgba(96, 165, 250, 0.95),
        rgba(244, 114, 182, 0.95));
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.18) inset,
      0 0 14px rgba(192, 132, 252, 0.45),
      0 0 0 4px rgba(0, 0, 0, 0.4);
    animation: dl-reel-spin 1.4s linear infinite;
  }
  .dl-reel:last-child {
    animation-direction: reverse;
  }
  .dl-tape-bar {
    width: 80px;
    height: 6px;
    border-radius: 1px;
    background:
      repeating-linear-gradient(90deg,
        rgba(244, 114, 182, 0.85) 0 8px,
        rgba(192, 132, 252, 0.85) 8px 16px);
    box-shadow:
      0 0 8px rgba(192, 132, 252, 0.55),
      0 1px 0 rgba(255, 255, 255, 0.18) inset;
    animation: dl-tape-pan 1.4s linear infinite;
  }
  .dl-label {
    font-size: 13px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.92);
    text-shadow:
      0 0 6px rgba(244, 114, 182, 0.55),
      0 0 14px rgba(192, 132, 252, 0.45);
    display: inline-flex;
    align-items: baseline;
    gap: 6px;
  }
  .dl-dots {
    display: inline-flex;
    gap: 3px;
    margin-left: 4px;
  }
  .dl-dots i {
    display: inline-block;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(244, 114, 182, 0.85);
    box-shadow: 0 0 6px rgba(244, 114, 182, 0.7);
    animation: dl-dots-pulse 1.2s ease-in-out infinite both;
  }
  .dl-dots i:nth-child(2) { animation-delay: 0.2s; }
  .dl-dots i:nth-child(3) { animation-delay: 0.4s; }
  .dl-shimmer {
    width: 180px;
    height: 2px;
    border-radius: 999px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(244, 114, 182, 0.85) 40%,
      rgba(192, 132, 252, 0.95) 50%,
      rgba(244, 114, 182, 0.85) 60%,
      transparent 100%);
    background-size: 200% 100%;
    animation: dl-shimmer-pan 1.6s linear infinite;
    box-shadow: 0 0 10px rgba(192, 132, 252, 0.45);
  }
  @keyframes dl-reel-spin {
    to { transform: rotate(360deg); }
  }
  @keyframes dl-tape-pan {
    to { background-position: 32px 0; }
  }
  @keyframes dl-dots-pulse {
    0%, 80%, 100% { opacity: 0.25; transform: scale(0.85); }
    40%           { opacity: 1;    transform: scale(1.15); }
  }
  @keyframes dl-shimmer-pan {
    0%   { background-position:  100% 0; }
    100% { background-position: -100% 0; }
  }

  /* ── Magazine image carousel (lightbox) ─────────────────────────
   * Triggered by clicking any magazine image tile. Browses the full
   * source-DB image set with prev/next nav + a counter. */
  .mag-carousel {
    position: fixed;
    inset: 0;
    z-index: 1500;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(8, 4, 16, 0.92);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  #magCarousel[style*="flex"] { display: flex; }
  #magCarouselImg {
    max-width: 92vw;
    max-height: 88vh;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 28px 64px rgba(0, 0, 0, 0.7);
    user-select: none;
    background: #000;
  }
  .mag-carousel-close {
    position: absolute;
    top: 16px;
    right: 18px;
    width: 36px;
    height: 36px;
    border: 1px solid rgba(var(--brand-purple-rgb), 0.45);
    background: rgba(18, 12, 26, 0.7);
    color: var(--text);
    font-size: 22px;
    line-height: 1;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
  }
  .mag-carousel-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 52px;
    height: 80px;
    border: 1px solid rgba(var(--brand-purple-rgb), 0.45);
    background: rgba(18, 12, 26, 0.62);
    color: var(--text);
    font-size: 32px;
    line-height: 1;
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    transition: background 0.15s;
  }
  .mag-carousel-nav:hover {
    background: rgba(var(--brand-purple-rgb), 0.34);
  }
  .mag-carousel-nav.prev { left: 24px; }
  .mag-carousel-nav.next { right: 24px; }
  .mag-carousel-counter {
    position: absolute;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--secs);
    font-size: 13px;
    color: var(--text);
    background: rgba(18, 12, 26, 0.7);
    border: 1px solid rgba(var(--brand-purple-rgb), 0.4);
    padding: 4px 14px;
    border-radius: 999px;
    letter-spacing: 0.08em;
  }
  /* (Orphaned `.mag-tile-gloss` and `.mag-tile--empty` removed —
   * the editorial layout doesn't use either.) */

  /* Page-turn entrance — a soft horizontal reveal + 3D tilt that
   * settles flat. Uses transform-only / opacity so it's GPU-friendly. */
  @keyframes magazinePageTurn {
    0%   { transform: rotateY(-9deg) translateX(-2%); opacity: 0; }
    60%  { opacity: 1; }
    100% { transform: rotateY(0deg)  translateX(0);   opacity: 1; }
  }
  .magazine--turning {
    transform-origin: left center;
    animation: magazinePageTurn 0.55s cubic-bezier(.2,.8,.2,1) both;
  }
  /* No parallax / no movement on hover — the magazine is static. */

  /* Stack vertically on narrow viewports — perf layout flips to a
   * column (magazine over scenes grid) and the magazine itself flips
   * the spread so page 1 (feature/cover) sits on top of page 2
   * (gallery). Each page keeps its own portrait aspect so the content
   * stays readable; the spine collapses since there's no fold to fake. */
  @media (max-width: 900px) {
    .discover-info-perf-layout {
      flex-direction: column;
      align-items: stretch;
      gap: 16px;
    }
    .discover-info-perf-layout > .discover-info-carousel-col,
    .discover-info-perf-layout > .discover-info-scenes-col {
      height: auto;
      width: 100%;
      flex: 0 0 auto;
    }
    /* Disable the size container — at this point the magazine sizes
     * itself off the column width directly and stacks its pages. */
    .discover-info-carousel-col {
      container-type: normal;
    }
    .magazine {
      width: 100%;
      height: auto;
      aspect-ratio: auto;
      grid-template-columns: 1fr;
      grid-template-rows: auto auto;
    }
    .magazine-page--feature {
      aspect-ratio: 1 / 1.4;
      border-radius: 0;
    }
    .magazine-page--gallery {
      aspect-ratio: 1 / 1.3;
      border-radius: 0;
      padding: 24px 22px 22px;
    }
    /* Re-orient the page-edge shadow: it was a vertical band on the
     * inner edge for a left/right spread; on a stacked layout it
     * becomes a horizontal band along the bottom of page 1 and the
     * top of page 2 (the new "fold"). */
    .magazine-page--feature::after {
      top: auto; right: auto;
      left: 0; bottom: 0;
      width: 100%; height: 36px;
      background: linear-gradient(to top,
        rgba(0, 0, 0, 0.45) 0%,
        rgba(0, 0, 0, 0.20) 35%,
        rgba(0, 0, 0, 0.0)  100%);
    }
    .magazine-page--gallery::after {
      top: 0; left: 0;
      right: auto;
      width: 100%; height: 36px;
      background: linear-gradient(to bottom,
        rgba(0, 0, 0, 0.35) 0%,
        rgba(0, 0, 0, 0.18) 35%,
        rgba(0, 0, 0, 0.0)  100%);
    }
    .magazine-spine {
      display: none;
    }
  }
  .discover-info-section-title {
    font-family: var(--secs);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--dim);
    margin: 0 0 10px;
  }
  /* Recent-scenes grid — performer (2×3) and studio (4×3) variants.
   * Cards keep their native 16:9 aspect (driven by `.scene-thumb`'s
   * `aspect-ratio: 16/9`). The grid itself has a fixed aspect and
   * scales to fit the column / panel height-and-width via the
   * max-height / max-width caps and `margin: auto`, so the 6 (or 12)
   * cards always fit cleanly without distorting. */
  .discover-info-scenes-col {
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .discover-info-studio-layout {
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 0;
    align-items: center;
    justify-content: center;
  }
  /* Performer: 3-column grid (3 × 3 = 9 cards). Narrower cards mean
   * the 3 rows fit the panel height without clipping while keeping
   * the native 16:9 thumb aspect. */
  .discover-info-scenes {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
    grid-auto-rows: auto;
    gap: 12px;
    padding: 0 !important;
    width: 100%;
    height: auto;
    margin: 0;
    align-content: start;
  }
  /* Static placeholder tile — used to pad the grid when fewer real
   * scenes come back than the 9 / 18 the layout expects. Renders an
   * untuned-channel look (panning fractal noise + horizontal bands +
   * faint "NO SIGNAL" caption) so empty slots still feel intentional. */
  .scene-card--static {
    cursor: default;
    pointer-events: none;
    background: linear-gradient(165deg, rgba(8, 4, 16, 0.85) 0%, rgba(4, 2, 8, 0.92) 100%);
    border-color: rgba(var(--brand-purple-rgb), 0.18);
  }
  .scene-card--static .img-load {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    overflow: hidden;
    background: #060310;
  }
  .scene-static-noise {
    position: absolute;
    inset: 0;
    background-image: var(--vhs-noise), var(--vhs-noise2);
    background-size: 160px 160px, 220px 220px;
    background-repeat: repeat, repeat;
    opacity: 0.85;
    animation: scene-static-pan 0.6s steps(8) infinite;
    z-index: 1;
  }
  .scene-static-bands {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background:
      repeating-linear-gradient(0deg,
        rgba(255, 255, 255, 0.05) 0 1px,
        transparent 1px 3px),
      linear-gradient(180deg,
        rgba(180, 120, 220, 0.10) 0%,
        transparent 30%,
        transparent 70%,
        rgba(60, 40, 90, 0.18) 100%);
    mix-blend-mode: overlay;
    animation: scene-static-rolling 4s linear infinite;
  }
  .scene-static-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
    font-family: var(--secs);
    font-size: 11px;
    letter-spacing: 0.32em;
    color: rgba(255, 255, 255, 0.45);
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
    pointer-events: none;
  }
  @keyframes scene-static-pan {
    0%   { background-position: 0 0, 0 0; }
    25%  { background-position: 40px -28px, -32px 18px; }
    50%  { background-position: -22px 36px, 18px -42px; }
    75%  { background-position: 18px -52px, -48px -8px; }
    100% { background-position: 60px 8px, -8px 60px; }
  }
  @keyframes scene-static-rolling {
    0%   { background-position: 0 0, 0 0; }
    100% { background-position: 0 -3px, 0 0; }
  }

  /* Studio: same treatment but 4 cols wide (5/6 at large viewports). */
  .discover-info-scenes--studio {
    grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
    grid-auto-rows: auto;
    aspect-ratio: auto;
    width: 100%;
    height: auto;
    margin: 0;
    align-content: start;
  }
  @media (min-width: 1700px) {
    .discover-info-scenes--studio {
      grid-template-columns: repeat(5, minmax(0, 1fr)) !important;
    }
  }
  @media (min-width: 2100px) {
    .discover-info-scenes--studio {
      grid-template-columns: repeat(6, minmax(0, 1fr)) !important;
    }
  }
  .discover-info-scenes .scene-card {
    min-width: 0;
  }
  /* Tighter typography for the in-panel scene grid — the magazine
   * column is narrow, so the global card title scale renders too
   * heavy here. Drop title + meta a tier each. */
  .discover-info-scenes .scene-card .scene-title {
    font-size: 12px;
    line-height: 1.15;
  }
  .discover-info-scenes .scene-card .scene-date {
    font-size: 9px;

/* Airbrush + tritone art surface — mirrors scenes.html. The
 * .spotlight-tile-art wrapper carries the bg-image, layered ::after
 * airbrush, and the tritone filter chain. The <img> inside is hidden
 * at rest (opacity 0) and revealed on hover (opacity 1) so the
 * cleanly rendered photo shows through. transform: scale(1.25) at
 * rest gives the resting "zoomed-in" look; on hover the wrapper
 * eases back to scale(1). */
.spotlight-tile-art {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: var(--tile-bg);
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  isolation: isolate;
  overflow: hidden;
  transform: scale(1.25);
  transform-origin: center top;
  filter: brightness(var(--auto-b, 1.06))
          contrast(var(--auto-c, 1.12))
          hue-rotate(var(--auto-h, 0deg));
  transition: filter 0.3s ease, transform 0.3s ease;
  will-change: transform;
}

.spotlight-tile:hover .spotlight-tile-art {
  transform: scale(1);
}

.spotlight-tile-art::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: inherit;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  filter: url(#spotlight-bloom) url(#duotone-vhs);
  z-index: 2;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

@supports (filter: blur(5px) contrast(2)) and (mix-blend-mode: multiply) {
  .spotlight-tile-art::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: inherit;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    filter: brightness(1.5) saturate(50) blur(5px) contrast(2);
    mix-blend-mode: multiply;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
}

.spotlight-tile-art img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
  opacity: 0;
  z-index: 3;
  transition: opacity 0.3s ease, filter 0.3s ease;
}

.spotlight-tile:hover .spotlight-tile-art::after,
.spotlight-tile:hover .spotlight-tile-art::before {
  opacity: 0;
}
.spotlight-tile:hover .spotlight-tile-art img {
  opacity: 1;
  filter: brightness(var(--auto-b-hover, 1.04))
          contrast(var(--auto-c-hover, 1.1))
          hue-rotate(var(--auto-h, 0deg))
          saturate(1.22);
}

/* Legacy blend-mode duotone layers disabled — airbrush + SVG filter
 * on .spotlight-tile-art above does the toning directly. */
.spotlight-tile::before,
.spotlight-tile::after {
  content: none;
}

.spotlight-tile-name {
    /* Pinned to the bottom-left corner so the duotone pill runs from
     * the very bottom of the tile upward — no gap below the rotated
     * text. */
    position: absolute; bottom: 0; left: 0;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-family: var(--secs);
    font-size: 18px;
    /* White fill, single-pixel border in the duotone SHADOW tone
     * (`--duotone-lighten`, despite its name — it's the colour the
     * filter maps onto shadows: deep purple in the VHS palette).
     * No blurred halo. */
    color: #ffffff;
    -webkit-text-stroke: 1px var(--duotone-lighten, rgba(0,0,0,0.95));
    /* Without paint-order, the stroke is painted ON TOP of the fill,
     * so a 1px stroke eats half the glyph weight at small sizes and
     * the white fill all but disappears. paint-order: stroke fill
     * draws stroke first underneath, fill on top — the white reads
     * solid and the stroke only appears as a 1px outer halo. */
    paint-order: stroke fill;
    text-shadow:
      -1px  0   0   var(--duotone-lighten, rgba(0,0,0,0.95)),
       1px  0   0   var(--duotone-lighten, rgba(0,0,0,0.95)),
       0   -1px 0   var(--duotone-lighten, rgba(0,0,0,0.95)),
       0    1px 0   var(--duotone-lighten, rgba(0,0,0,0.95));
    letter-spacing: 0.02em;
    pointer-events: none;
    z-index: 1;
    max-height: 100%;
    overflow: hidden;
    line-height: 1.1;
    /* 85% opacity of the duotone "shadow" tone so the name pill reads
     * as part of the same colour family as the tile image. Falls back
     * to the panel dark tone when no duotone is configured. Only the
     * outer corners get rounded so the pill visually "tabs" out of
     * the tile's bottom-left corner. */
    padding: 10px 6px;
    border-radius: 0 4px 4px 0;
    background: color-mix(in srgb, var(--duotone-multiply, rgba(var(--panel-lo-rgb), 1)) 70%, transparent);
    transition: background 0.15s;
  }

   * the text-shadow on the name carries enough legibility on its own. */
  .spotlight-tile:hover .spotlight-tile-name { background: transparent; }

  .detail-title-row .detail-name {

  .detail-meta { font-size: 12px; color: var(--dim); line-height: 2; position: relative; z-index: 1; }
  .detail-meta span { color: var(--text); }
  .detail-bio { font-size: 12px; color: var(--dim); margin-top: 12px; line-height: 1.8; overflow-y: auto; position: relative; z-index: 1; }
  .detail-links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; position: relative; z-index: 1; }
  .detail-link { font-family: var(--secs); font-size: 14px; letter-spacing: -0.02em; color: var(--accent); background: rgba(var(--brand-purple-rgb),0.1); border: 1px solid rgba(var(--brand-purple-rgb),0.2); border-radius: 4px; padding: 2px 8px; text-decoration: none; transition: all 0.15s; }
  .detail-link:hover { background: rgba(var(--brand-purple-rgb),0.4); border-color: var(--accent); color: var(--text); }
  .detail-bg-image { position: absolute; top: 0; right: 0; width: 55%; height: 100%; object-fit: cover; object-position: top center; opacity: 0.22; mask-image: linear-gradient(to left, rgba(0,0,0,0.7) 0%, transparent 100%); -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,0.7) 0%, transparent 100%); pointer-events: none; z-index: 0; }
  #detailBgImage::after { content: ''; position: absolute; inset: 0; background: linear-gradient(160deg, rgba(var(--panel-lo-rgb),0.82) 0%, rgba(12,10,20,0.55) 100%); pointer-events: none; z-index: 1; }

  /* Dest picker */
  .dest-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
  .dest-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--dim); margin-bottom: 8px; }
  .dest-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-bottom: 12px; }
  .dest-btn { padding: 8px 12px; background: var(--raised); border: 1px solid var(--border); border-radius: 6px; color: var(--dim); font-family: var(--secs); font-size: calc(13px + 2pt); letter-spacing: -0.02em; cursor: pointer; transition: all 0.15s; text-align: left; }
  .dest-btn:hover { border-color: var(--muted); color: var(--text); }
  .dest-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(var(--brand-purple-rgb),0.1); }

  .quick-add-select {

      linear-gradient(135deg, var(--accent) 50%, transparent 50%),
      linear-gradient(160deg, rgba(var(--panel-hi-rgb),0.94) 0%, rgba(var(--panel-lo-rgb),0.9) 100%);
    background-position:
      calc(100% - 18px) calc(50% - 2px),
