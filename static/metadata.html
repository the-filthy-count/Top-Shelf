<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top-Shelf — Metadata</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  @font-face { font-family: 'Acidoze'; src: url('/static/TELETYPE1945-1985.ttf') format('truetype'); }
  @font-face { font-family: 'Seconds'; src: url('/static/xero4.ttf') format('truetype'); }
  :root {
    --bg:      #0c0c0e;
    --surface: rgba(19,19,23,0.75);
    --raised:  rgba(26,26,32,0.8);
    --border:  #222228;
    --muted:   #3a3a44;
    --text:    #e8e8f0;
    --dim:     #6b6b7a;
    --accent:  #c084fc;
    --green:   #4ade80;
    --amber:   #fbbf24;
    --red:     #f87171;
    --blue:    #60a5fa;
    --mono:    'DM Mono', monospace;
    --sans:    'Syne', sans-serif;
    --acid:    'Acidoze', 'Syne', sans-serif;
    --secs:    'Seconds', 'DM Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg) url('/static/background.jpg') center center / cover fixed;
    color: var(--text); font-family: var(--mono); font-size: 13px;
    line-height: 1.6; min-height: 100vh;
  }
  body::before { content: ''; position: fixed; inset: 0; background: rgba(12,12,14,0.72); z-index: 0; }
  .app { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 24px 12px; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 28px;
  }
  .logo img { height: 36px; object-fit: contain; }
  .nav-links { display: flex; gap: 8px; }
  .btn-secondary { background: none; border: 1px solid var(--border); color: var(--dim); padding: 8px 12px; border-radius: 6px; font-size: 16px; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; justify-content: center; }
  .btn-secondary:hover { border-color: var(--muted); color: var(--text); }
  .btn-primary { background: var(--accent); color: #0c0c0e; border: none; padding: 8px 14px; border-radius: 6px; font-size: 16px; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary:hover { filter: brightness(1.1); }
  .active-nav { border-color: var(--accent) !important; color: var(--accent) !important; }

  /* Layout */
  .layout { display: grid; grid-template-columns: 380px 1fr; gap: 20px; align-items: start; margin-bottom: 8px; }
  .right-col { display: flex; flex-direction: column; gap: 20px; }
  .panel-scroll { overflow-y: auto; max-height: 420px; }
  .search-panel-inner { overflow-y: auto; max-height: 340px; }

  /* Panel */
  .panel {
    background: linear-gradient(160deg, rgba(36,36,48,0.88) 0%, rgba(18,18,26,0.78) 100%);
    border: none; border-radius: 10px; overflow: hidden;
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 8px 32px rgba(0,0,0,0.25);
  }
  .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; }
  .panel-title { font-family: var(--acid); font-size: 28px; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; color: #fff; }
  .panel-body { padding: 16px 18px; }
  .layout { align-items: start; }
  .empty { padding: 32px 18px; text-align: center; color: var(--dim); font-size: 12px; }

  /* Type toggle */
  .type-toggle { display: flex; gap: 0; margin-bottom: 16px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .type-btn { flex: 1; padding: 8px; background: none; border: none; color: var(--dim); font-family: var(--mono); font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; cursor: pointer; transition: all 0.15s; }
  .type-btn.active { background: var(--accent); color: #0c0c0e; }

  /* Search */
  .search-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; margin-bottom: 12px; }
  .field-input { background: var(--raised); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-family: var(--mono); font-size: 12px; width: 100%; outline: none; transition: border-color 0.15s; }
  .field-input:focus { border-color: var(--accent); }
  .field-input::placeholder { color: var(--muted); }
  select.field-input { cursor: pointer; }

  /* Results */
  .result-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 8px; cursor: pointer; transition: background 0.15s; margin-bottom: 4px; }
  .result-item:hover { background: rgba(255,255,255,0.04); }
  .result-item.selected { background: rgba(192,132,252,0.1); border: 1px solid rgba(192,132,252,0.3); }
  .result-thumb { width: 40px; height: 56px; object-fit: cover; border-radius: 4px; flex-shrink: 0; background: var(--raised); }
  .result-thumb-placeholder { width: 40px; height: 56px; border-radius: 4px; flex-shrink: 0; background: var(--raised); display: flex; align-items: center; justify-content: center; color: var(--muted); }
  .result-name { font-size: 13px; color: var(--text); }
  .result-source { font-family: var(--secs); font-size: 11px; color: var(--dim); letter-spacing: -0.02em; }

  /* Detail panel */
  .detail-poster { width: 190px; height: 100%; object-fit: cover; border-radius: 8px; flex-shrink: 0; display: block; }
  .detail-poster-placeholder { width: 140px; height: 100%; min-height: 180px; border-radius: 8px; background: var(--raised); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 32px; flex-shrink: 0; }
  /* Studio layout: landscape image on top, text below */
  .detail-poster-studio { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; display: block; }
  .detail-info { flex: 1; min-width: 0; }
  .detail-name { font-family: var(--acid); font-size: 28px; color: var(--text); margin-bottom: 8px; }
  .detail-meta { font-size: 12px; color: var(--dim); line-height: 2; }
  .detail-meta span { color: var(--text); }
  .detail-bio { font-size: 12px; color: var(--dim); margin-top: 12px; line-height: 1.8; max-height: 120px; overflow-y: auto; }

  /* Dest picker */
  .dest-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
  .dest-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--dim); margin-bottom: 8px; }
  .dest-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-bottom: 12px; }
  .dest-btn { padding: 8px 12px; background: var(--raised); border: 1px solid var(--border); border-radius: 6px; color: var(--dim); font-family: var(--secs); font-size: 13px; letter-spacing: -0.02em; cursor: pointer; transition: all 0.15s; text-align: left; }
  .dest-btn:hover { border-color: var(--muted); color: var(--text); }
  .dest-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(192,132,252,0.08); }
  .dest-custom { display: grid; grid-template-columns: 1fr auto; gap: 8px; margin-top: 8px; }

  /* Image overlay */
  .img-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 1000; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .img-overlay img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; box-shadow: 0 32px 80px rgba(0,0,0,0.6); }

  /* Scenes panel */
  .scene-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; padding: 16px 18px; }
  .scene-card { cursor: pointer; border-radius: 8px; overflow: hidden; background: var(--raised); transition: all 0.15s; border: 1px solid transparent; }
  .scene-card:hover { border-color: var(--muted); }
  .scene-card.searching { border-color: var(--accent); }
  .scene-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: var(--raised); }
  .scene-thumb-placeholder { width: 100%; aspect-ratio: 16/9; background: var(--raised); display: flex; align-items: center; justify-content: center; color: var(--muted); }
  .scene-info { padding: 8px 8px 4px; }
  .scene-title { font-family: var(--secs); font-size: 15px; color: #d4cfc4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1.4; min-height: 2.8em; word-break: break-word; letter-spacing: -0.02em; }
  .scene-date  { font-size: 10px; color: var(--dim); margin-top: 4px; }
  .scene-actions { display: flex; gap: 4px; padding: 4px 6px 8px; border-top: 1px solid rgba(255,255,255,0.04); margin-top: 4px; }
  .scene-action-btn { flex: 1; background: none; border: 1px solid var(--border); color: var(--dim); border-radius: 4px; padding: 4px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .scene-action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .scene-action-btn.search-btn:hover { border-color: var(--green); color: var(--green); }

  /* Search results */
  .search-result { display: grid; grid-template-columns: 1fr auto auto auto; gap: 12px; align-items: center; padding: 10px 18px; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .search-result:last-child { border-bottom: none; }
  .sr-title { font-size: 12px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sr-meta  { font-size: 11px; color: var(--dim); margin-top: 2px; }
  .sr-indexer { font-family: var(--secs); font-size: 19px; color: var(--dim); letter-spacing: -0.02em; white-space: nowrap; }
  .sr-size    { font-size: 11px; color: var(--dim); white-space: nowrap; }
  .btn-grab { background: var(--green); color: #0c0c0e; border: none; padding: 5px 12px; border-radius: 5px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .btn-grab:hover { filter: brightness(1.1); }
  .btn-grab.nzb { background: var(--blue); }

  /* Result message */
  .result-msg { margin-top: 16px; padding: 12px 16px; border-radius: 8px; font-size: 12px; display: none; }
  .result-msg.success { background: rgba(74,222,128,0.1); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
  .result-msg.error   { background: rgba(248,113,113,0.1); color: var(--red);   border: 1px solid rgba(248,113,113,0.2); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div style="display:flex;flex-direction:column;gap:3px">
      <div class="logo"><img src="/static/logo.png" alt="Top-Shelf"></div>
      <span style="font-family:'DM Mono',monospace;font-size:10px;color:#6b6b7a;letter-spacing:0.06em;text-align:center">v1.1.0</span>
    </div>
    <div class="nav-links">
      <a href="/" style="text-decoration:none"><button class="btn-secondary" title="TV Series"><i class="fa-solid fa-tv"></i></button></a>
      <a href="/movies" style="text-decoration:none"><button class="btn-secondary" title="Movies"><i class="fa-solid fa-film"></i></button></a>
      <a href="/library" style="text-decoration:none"><button class="btn-secondary" title="Library Health"><i class="fa-solid fa-house-medical"></i></button></a>
      <a href="/metadata" style="text-decoration:none"><button class="btn-secondary active-nav" title="Metadata"><i class="fa-solid fa-id-card"></i></button></a>
      <a href="/history" style="text-decoration:none"><button class="btn-secondary" title="History"><i class="fa-solid fa-clock-rotate-left"></i></button></a>
      <button class="btn-secondary" onclick="fetch('/api/auth/logout',{method:'POST'}).then(()=>location.href='/login')" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></button>
      <a href="/?settings=1" style="text-decoration:none"><button class="btn-secondary" title="Settings"><i class="fa-solid fa-gear"></i></button></a>
    </div>
  </header>

  <!-- Top row: fixed height, two equal columns -->
  <div class="layout">

    <!-- Search panel -->
    <div class="panel" style="height:460px;display:flex;flex-direction:column">
      <div class="panel-header" style="flex-shrink:0">
        <span class="panel-title">Search</span>
      </div>
      <div class="panel-body" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
        <div class="type-toggle" style="flex-shrink:0">
          <button class="type-btn active" id="btnPerformer" onclick="setType('performer')">Performer</button>
          <button class="type-btn" id="btnStudio" onclick="setType('studio')">Studio</button>
        </div>
        <div class="search-row" style="flex-shrink:0">
          <input class="field-input" id="searchInput" type="text" placeholder="Name..." onkeydown="if(event.key==='Enter')runSearch()">
          <button class="btn-primary" onclick="runSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
        <div id="searchResults" style="flex:1;overflow-y:auto;margin-top:4px">
          <div class="empty">Search for a performer or studio</div>
        </div>
      </div>
    </div>

    <!-- Detail panel -->
    <div class="panel" style="height:460px;display:flex;flex-direction:column">
      <div class="panel-header" style="flex-shrink:0">
        <div style="display:flex;align-items:center;gap:12px">
          <span class="panel-title" id="detailTitle">Details</span>
          <span id="detailLibStatus" style="font-family:var(--secs);font-size:20px;letter-spacing:-0.02em"></span>
        </div>
      </div>
      <div class="panel-body" style="flex:1;overflow-y:auto">
        <div id="detailEmpty" class="empty">Select a result to preview details</div>
        <div id="detailContent" style="display:none;height:100%;flex-direction:column">
          <div id="detailLayout" style="display:flex;gap:20px;flex:1;min-height:0;align-items:stretch">
            <div id="detailPoster" style="flex-shrink:0;cursor:pointer;display:flex" onclick="openPosterOverlay()"></div>
            <div id="detailTextCol" style="flex:1;min-width:0;overflow-y:auto">
              <div class="detail-meta" id="detailMeta"></div>
              <div class="detail-bio" id="detailBio" style="margin-top:6px"></div>
            </div>
          </div>
          <div class="dest-section">
            <div class="dest-label">Save to directory</div>
            <div class="dest-grid" id="destGrid"></div>
            <div class="dest-custom">
              <input class="field-input" id="destCustom" type="text" placeholder="Or enter custom path...">
              <button class="btn-secondary" onclick="clearDest()" title="Clear"><i class="fa-solid fa-x"></i></button>
            </div>
            <div style="margin-top:12px">
              <button class="btn-primary" id="createBtn" onclick="createTvShow()" style="width:100%">
                <i class="fa-solid fa-folder-plus"></i> Create TVShow folder
              </button>
            </div>
            <div class="result-msg" id="resultMsg"></div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Scenes panel - full width below -->
<div id="scenesSection" style="display:none;max-width:1400px;margin:0 auto;padding:0 24px 20px;position:relative;z-index:1">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title" id="scenesTitle">Recent Scenes</span>
      <span style="font-size:11px;color:var(--dim)" id="scenesNote"></span>
    </div>
    <div id="scenesGrid" class="scene-grid"><div class="empty">Loading...</div></div>
  </div>
</div>

<!-- Prowlarr results panel -->
<div id="prowlarrSection" style="display:none;max-width:1400px;margin:0 auto;padding:0 24px 28px;position:relative;z-index:1">
  <div class="panel" style="overflow:visible">
    <div class="panel-header">
      <span class="panel-title">Search Results</span>
      <div style="display:flex;align-items:center;gap:8px">
        <input id="prowlarrQuery" class="field-input" type="text" placeholder="Edit search term..." style="width:280px" onkeydown="if(event.key==='Enter')runProwlarrSearch()">
        <button class="btn-primary" onclick="runProwlarrSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
        <button class="btn-secondary" onclick="document.getElementById('prowlarrSection').style.display='none'"><i class="fa-solid fa-x"></i></button>
      </div>
    </div>
    <div id="prowlarrResults" style="max-height:600px;overflow-y:auto"><div class="empty">No results yet</div></div>
  </div>
</div>

<script>
  let currentType     = 'performer';
  let selectedResult  = null;
  let selectedDest    = null;

  function esc(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setType(type) {
    currentType = type;
    document.getElementById('btnPerformer').classList.toggle('active', type === 'performer');
    document.getElementById('btnStudio').classList.toggle('active', type === 'studio');
    document.getElementById('searchResults').innerHTML = '<div class="empty">Search for a performer or studio</div>';
    clearDetail();
  }

  async function runSearch() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return;
    const el = document.getElementById('searchResults');
    el.innerHTML = '<div class="empty">Searching...</div>';
    try {
      const r = await fetch(`/api/metadata/search?q=${encodeURIComponent(q)}&type=${currentType}`);
      const d = await r.json();
      if (!d.results?.length) { el.innerHTML = '<div class="empty">No results found</div>'; return; }
      window._searchResults = d.results;
      el.innerHTML = d.results.map((item, i) => `
        <div class="result-item" id="ri-${i}" onclick="selectResult(${i})">
          ${item.image
            ? `<img class="result-thumb" src="${esc(item.image)}" onerror="this.outerHTML='<div class=result-thumb-placeholder><i class=fa-solid fa-person></i></div>'">`
            : `<div class="result-thumb-placeholder"><i class="fa-solid fa-${currentType === 'studio' ? 'clapperboard' : 'person'}"></i></div>`}
          <div style="flex:1;min-width:0">
            <div class="result-name">${esc(item.name)}</div>
            <div class="result-source">${item.source}</div>
          </div>
          <div id="lib-${i}" style="flex-shrink:0;font-size:11px;color:var(--dim)">...</div>
        </div>`).join('');
      // Check library status for each result
      d.results.forEach((item, i) => {
        fetch(`/api/library/check?name=${encodeURIComponent(item.name)}`)
          .then(r => r.json())
          .then(lib => {
            const el = document.getElementById(`lib-${i}`);
            if (!el) return;
            if (lib.found) {
              el.innerHTML = '<span style="font-family:var(--secs);font-size:20px;letter-spacing:-0.02em;color:var(--green)"><i class="fa-solid fa-check"></i> IN-LIBRARY</span>';
              window._searchResults[i]._inLibrary = true;
              window._searchResults[i]._libraryPath = lib.path;
            } else {
              el.innerHTML = '';
              window._searchResults[i]._inLibrary = false;
            }
          }).catch(() => { const el = document.getElementById(`lib-${i}`); if (el) el.innerHTML = ''; });
      });
    } catch(e) {
      el.innerHTML = `<div class="empty">Search failed: ${esc(e.message)}</div>`;
    }
  }

  function selectResult(idx) {
    document.querySelectorAll('.result-item').forEach(el => el.classList.remove('selected'));
    document.getElementById(`ri-${idx}`)?.classList.add('selected');
    selectedResult = window._searchResults[idx];
    showDetail(selectedResult);
  }

  // ── Poster overlay ───────────────────────────────────────────────────

  function openPosterOverlay() {
    const img = document.querySelector('#detailPoster img');
    if (img) openImageOverlay(img.src);
  }

  // ── Image overlay ────────────────────────────────────────────────────

  function openImageOverlay(url) {
    if (!url) return;
    document.getElementById('imgOverlayImg').src = url;
    document.getElementById('imgOverlay').style.display = 'flex';
  }

  function closeImageOverlay() {
    document.getElementById('imgOverlay').style.display = 'none';
    document.getElementById('imgOverlayImg').src = '';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeImageOverlay(); });

  // ── Scenes ───────────────────────────────────────────────────────────

  async function loadScenes(item) {
    if (item.source !== 'TPDB') {
      document.getElementById('scenesSection').style.display = 'none';
      return;
    }
    const section = document.getElementById('scenesSection');
    const grid    = document.getElementById('scenesGrid');
    const title   = document.getElementById('scenesTitle');
    title.textContent = 'Recent Scenes';
    document.getElementById('scenesNote').textContent = '';
    section.style.display = 'block';
    grid.innerHTML = '<div class="empty">Loading...</div>';
    try {
      const r = await fetch(`/api/scenes/recent?type=${currentType}&source=${encodeURIComponent(item.source)}&id=${encodeURIComponent(item.id)}&slug=${encodeURIComponent(item.slug||'')}`);
      const d = await r.json();
      if (!d.scenes?.length) {
        grid.innerHTML = '<div class="empty">No recent scenes found</div>';
        return;
      }
      grid.innerHTML = d.scenes.map(s => `
        <div class="scene-card" id="sc-${esc(s.id)}">
          <div style="cursor:pointer;position:relative" onclick="openImageOverlay('${esc(s.thumb || '')}')">
            ${s.thumb
              ? `<img class="scene-thumb" src="${esc(s.thumb)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=scene-thumb-placeholder><i class=fa-solid fa-film></i></div>'">`
              : `<div class="scene-thumb-placeholder"><i class="fa-solid fa-film"></i></div>`}
          </div>
          <div class="scene-info">
            <div class="scene-title" title="${esc(s.title)}">${esc(s.title).replace(/ /g, '-')}</div>
            <div class="scene-date">${s.date || ''}</div>
          </div>
          <div class="scene-actions">
            <button class="scene-action-btn search-btn" title="Search Prowlarr"
              onclick="searchScene(${JSON.stringify(s).replace(/"/g,'&quot;')})">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
            <button class="scene-action-btn" title="View on ThePornDB"
              onclick="window.open('https://theporndb.net/scenes/${esc(s.id)}','_blank')">
              <i class="fa-solid fa-arrow-up-right-from-square"></i>
            </button>
          </div>
        </div>`).join('');
    } catch(e) {
      grid.innerHTML = `<div class="empty">Failed to load scenes</div>`;
    }
  }

  function searchScene(scene) {
    // Build search query from performer + title (most useful for NZB/torrent searches)
    const performer = selectedResult?.name || '';
    const q = [performer, scene.title].filter(Boolean).join(' ');
    document.getElementById('prowlarrQuery').value = q;
    document.getElementById('prowlarrSection').style.display = 'block';
    document.getElementById('prowlarrSection').scrollIntoView({behavior:'smooth', block:'start'});
    // Highlight selected scene card
    document.querySelectorAll('.scene-card').forEach(c => c.classList.remove('searching'));
    document.getElementById(`sc-${scene.id}`)?.classList.add('searching');
    runProwlarrSearch();
  }

  // ── Prowlarr ──────────────────────────────────────────────────────────

  async function runProwlarrSearch() {
    const q = document.getElementById('prowlarrQuery').value.trim();
    if (!q) return;
    const el = document.getElementById('prowlarrResults');
    el.innerHTML = '<div class="empty">Searching...</div>';
    try {
      const r = await fetch(`/api/prowlarr/search?q=${encodeURIComponent(q)}`);
      const d = await r.json();
      if (d.error) { el.innerHTML = `<div class="empty">${esc(d.error)}</div>`; return; }
      if (!d.results?.length) { el.innerHTML = '<div class="empty">No results found</div>'; return; }
      window._prowlarrResults = d.results;
      el.innerHTML = d.results.map((r, i) => `
        <div class="search-result">
          <div>
            <div class="sr-title" title="${esc(r.title)}">${esc(r.title)}</div>
            <div class="sr-meta">${r.age ? Math.round(r.age/24) + 'd ago' : ''} ${r.seeders != null && r.seeders !== undefined ? '· ' + r.seeders + ' seeders' : ''}</div>
          </div>
          <span class="sr-indexer">${esc(r.indexer.replace(/ /g, '-'))}</span>
          <span class="sr-size">${r.size_mb > 1024 ? (r.size_mb/1024).toFixed(1) + ' GB' : r.size_mb + ' MB'}</span>
          <button class="btn-grab ${r.type === 'nzb' ? 'nzb' : ''}" onclick="grabResult(${i})">
            <i class="fa-solid fa-download"></i> ${r.type === 'nzb' ? 'NZB' : 'TORRENT'}
          </button>
        </div>`).join('');
    } catch(e) {
      el.innerHTML = `<div class="empty">Search failed: ${esc(e.message)}</div>`;
    }
  }

  async function grabResult(idx) {
    const result = window._prowlarrResults[idx];
    const btn = event.target.closest('button');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
    try {
      const r = await fetch('/api/prowlarr/grab', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          guid:         result.guid,
          indexer_id:   result.indexer_id,
          type:         result.type,
          download_url: result.type === 'torrent' && result.magnet ? result.magnet : result.download_url,
        }),
      });
      const d = await r.json();
      if (d.ok) {
        btn.innerHTML = '<i class="fa-solid fa-check"></i> SENT';
        btn.style.background = 'var(--green)';
        btn.style.color = '#0c0c0e';
      } else {
        btn.innerHTML = 'Error';
        btn.disabled = false;
        alert(`Download failed: ${d.error}`);
      }
    } catch(e) {
      btn.innerHTML = 'Error';
      btn.disabled = false;
    }
  }

  async function showDetail(item) {
    document.getElementById('detailEmpty').style.display = 'none';
    document.getElementById('detailContent').style.display = 'flex';
    document.getElementById('detailTitle').textContent = item.name;
    document.getElementById('detailMeta').innerHTML = `<span style="color:var(--dim);font-size:11px">${item.source}</span>`;
    const libEl = document.getElementById('detailLibStatus');
    const destEl = document.querySelector('.dest-section');
    libEl.innerHTML = '';
    fetch(`/api/library/check?name=${encodeURIComponent(item.name)}`)
      .then(r => r.json())
      .then(lib => {
        if (lib.found) {
          libEl.innerHTML = `<span style="font-family:var(--secs);font-size:20px;letter-spacing:-0.02em;color:var(--green)"><i class="fa-solid fa-check"></i> IN-LIBRARY</span>`;
          if (destEl) destEl.style.display = 'none';
        } else {
          libEl.innerHTML = `<span style="font-family:var(--secs);font-size:20px;letter-spacing:-0.02em;color:var(--dim)">NOT IN-LIBRARY</span>`;
          if (destEl) destEl.style.display = 'block';
        }
      }).catch(() => { libEl.innerHTML = ''; if (destEl) destEl.style.display = 'block'; });
    document.getElementById('detailBio').textContent = 'Loading...';
    document.getElementById('resultMsg').style.display = 'none';

    // Switch layout based on type
    const layoutEl = document.getElementById('detailLayout');
    const posterEl = document.getElementById('detailPoster');
    const isStudio = currentType === 'studio';
    const icon = isStudio ? 'clapperboard' : 'person';
    const posterClass = isStudio ? 'detail-poster-studio' : 'detail-poster';

    if (isStudio) {
      // Studio: stacked — image on top, text below
      layoutEl.style.flexDirection = 'column';
      layoutEl.style.alignItems = 'stretch';
      layoutEl.style.gap = '12px';
      posterEl.style.flexShrink = '0';
      posterEl.style.display = 'block';
    } else {
      // Performer: side-by-side — image left, text right
      layoutEl.style.flexDirection = 'row';
      layoutEl.style.alignItems = 'stretch';
      layoutEl.style.gap = '20px';
      posterEl.style.flexShrink = '0';
      posterEl.style.display = 'flex';
    }

    if (item.image) {
      posterEl.innerHTML = `<img class="${posterClass}" src="${esc(item.image)}" onclick="openImageOverlay('${esc(item.image)}')" onerror="this.outerHTML='<div class=detail-poster-placeholder><i class=fa-solid fa-${icon}></i></div>'">`;
    } else {
      posterEl.innerHTML = `<div class="detail-poster-placeholder"><i class="fa-solid fa-${icon}"></i></div>`;
    }

    loadDirs();
    loadScenes(item);

    // Use a lightweight preview fetch
    try {
      const r = await fetch(`/api/metadata/preview?type=${currentType}&source=${encodeURIComponent(item.source)}&id=${encodeURIComponent(item.id)}`);
      const d = await r.json();
      if (d.image) {
        posterEl.innerHTML = `<img class="${posterClass}" src="${esc(d.image)}" onclick="openImageOverlay('${esc(d.image)}')" onerror="this.outerHTML='<div class=detail-poster-placeholder><i class=fa-solid fa-${icon}></i></div>'">`;
      }
      document.getElementById('detailBio').textContent = d.bio || '';
      if (d.meta) document.getElementById('detailMeta').innerHTML = d.meta;
      // Update slug on selected result for better scene lookups
      if (d.slug && selectedResult) {
        selectedResult.slug = d.slug;
        loadScenes(selectedResult);
      }
    } catch {
      document.getElementById('detailBio').textContent = '';
    }
  }

  function clearDetail() {
    selectedResult = null;
    document.getElementById('detailEmpty').style.display = 'block';
    document.getElementById('detailContent').style.display = 'none';
    document.getElementById('detailTitle').textContent = 'Details';
  }

  async function loadDirs() {
    try {
      const r = await fetch('/api/metadata/dirs');
      const d = await r.json();
      const grid = document.getElementById('destGrid');
      grid.innerHTML = d.dirs.map(dir => `
        <button class="dest-btn" onclick="selectDest('${esc(dir.path)}', this)" title="${esc(dir.path)}">
          ${esc(dir.label)}
        </button>`).join('');
    } catch {}
  }

  function selectDest(path, btn) {
    selectedDest = path;
    document.querySelectorAll('.dest-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('destCustom').value = '';
  }

  function clearDest() {
    selectedDest = null;
    document.getElementById('destCustom').value = '';
    document.querySelectorAll('.dest-btn').forEach(b => b.classList.remove('selected'));
  }

  async function createTvShow() {
    if (!selectedResult) { alert('Select a result first'); return; }
    const dest = document.getElementById('destCustom').value.trim() || selectedDest;
    if (!dest) { alert('Choose a destination directory'); return; }

    const btn = document.getElementById('createBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating...';

    try {
      const r = await fetch('/api/metadata/create', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          type:     currentType,
          source:   selectedResult.source,
          id:       selectedResult.id,
          dest_dir: dest,
        }),
      });
      const d = await r.json();
      const msg = document.getElementById('resultMsg');
      if (d.success) {
        msg.className = 'result-msg success';
        msg.textContent = `✓ Created: ${d.folder}${d.has_poster ? ' · poster downloaded' : ''}`;
        msg.style.display = 'block';
        // Update library status and hide dest section
        document.getElementById('detailLibStatus').innerHTML =
          `<span style="color:var(--green)"><i class="fa-solid fa-check"></i> IN-LIBRARY</span>`;
        const ds = document.querySelector('.dest-section');
        if (ds) ds.style.display = 'none';
        // Update search result status if visible
        if (selectedResult) {
          window._searchResults?.forEach((item, i) => {
            if (item.name === selectedResult.name) {
              const el = document.getElementById(`lib-${i}`);
              if (el) el.innerHTML = '<span style="font-family:var(--secs);font-size:20px;letter-spacing:-0.02em;color:var(--green)"><i class="fa-solid fa-check"></i> IN-LIBRARY</span>';
            }
          });
        }
      } else {
        msg.className = 'result-msg error';
        msg.textContent = `Error: ${d.error}`;
        msg.style.display = 'block';
      }
    } catch(e) {
      const msg = document.getElementById('resultMsg');
      msg.className = 'result-msg error';
      msg.textContent = `Error: ${e.message}`;
      msg.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-folder-plus"></i> Create TVShow folder';
    }
  }
</script>
<div id="imgOverlay" class="img-overlay" style="display:none" onclick="closeImageOverlay()">
  <img id="imgOverlayImg" src="" alt="">
</div>

</body>
</html>
