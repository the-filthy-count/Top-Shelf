<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top-Shelf — Login</title>
<link rel="stylesheet" href="/static/fonts/dm-mono/dm-mono.css">
<script src="/static/theme-init.js"></script>
<link rel="stylesheet" href="/static/app-shell.css">
<style>
  @font-face {
    font-family: 'Acidoze';
    src: url('/static/fonts/Tox Typewriter.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
  :root {
    /* Colour palette lives in /static/app-shell.css (themeable via html[data-theme=...]) */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg) var(--app-bg-image) center center / cover fixed;
    color: var(--text); font-family: 'DM Mono', monospace;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: rgba(var(--bg-rgb),0.82); z-index: 0;
  }
  .card {
    position: relative; z-index: 1;
    background: linear-gradient(160deg, rgba(var(--panel-hi-rgb),0.94) 0%, rgba(var(--panel-lo-rgb),0.9) 100%);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px; padding: 34px 28px; width: min(380px, 100%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.07), 0 24px 64px rgba(0,0,0,0.5);
    backdrop-filter: blur(20px);
    display: flex; flex-direction: column; align-items: center; gap: 18px;
  }
  .logo { height: 34px; object-fit: contain; }
  .version { font-size: 10px; color: var(--dim); letter-spacing: 0.06em; margin-top: -10px; }
  h1 {
    font-family: 'Acidoze', monospace; font-size: 18px; font-weight: 400;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent);
  }
  .subtitle {
    color: var(--dim);
    font-size: 11px;
    text-align: center;
    line-height: 1.5;
    margin-top: -4px;
  }
  .field { width: 100%; display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; }
  input[type="password"] {
    width: 100%; padding: 10px 14px;
    background: rgba(var(--panel-hi-rgb),0.85); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 14px; outline: none; transition: border-color 0.15s, box-shadow 0.15s;
  }
  input[type="password"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(var(--brand-purple-rgb),0.3); }
  button {
    width: 100%; padding: 12px;
    background: var(--accent); color: #0c0c0e; border: none;
    border-radius: 8px; font-family: 'Acidoze', monospace;
    font-size: 16px; letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; transition: filter 0.15s;
  }
  button:hover { filter: brightness(1.1); }
  button:disabled { opacity: 0.5; cursor: not-allowed; filter: none; }
  .error {
    width: 100%; padding: 10px 14px; border-radius: 8px;
    background: rgba(248,113,113,0.1); color: var(--danger);
    border: 1px solid rgba(248,113,113,0.24);
    font-size: 12px; display: none; text-align: center;
  }

  /* ── Mobile (≤640px) ──
     iOS Safari zooms into an input on tap if its font-size is below
     16px — bumping the password field to 16px prevents that jarring
     zoom without changing the desktop look meaningfully. Card padding
     relaxes slightly so the form breathes on narrow phones. */
  @media (max-width: 640px) {
    body { padding: 14px; }
    .card { padding: 26px 20px; gap: 16px; }
    input[type="password"] { font-size: 16px; }
    button { font-size: 15px; padding: 13px; }
  }
</style>
</head>
<body>
<div class="card">
  <img class="logo" src="/static/logo.png" alt="Top-Shelf">
  <span class="version" id="appVersion"></span>
  <h1>Enter Password</h1>
  <div class="subtitle">Sign in to access your queue, metadata tools, and downloads.</div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="pw" autofocus onkeydown="if(event.key==='Enter')login()">
  </div>
  <div class="error" id="err"></div>
  <button id="btn" onclick="login()">Enter</button>
</div>
<script>
  async function login() {
    const pw  = document.getElementById('pw').value;
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');
    if (!pw) return;
    btn.disabled = true;
    btn.textContent = '...';
    err.style.display = 'none';
    try {
      const params = new URLSearchParams(window.location.search);
      const next = params.get('next') || '/';
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ password: pw, next }),
      });
      const d = await r.json();
      if (d.ok) {
        window.location.href = d.next || '/';
      } else {
        err.textContent = d.error || 'Incorrect password';
        err.style.display = 'block';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
      }
    } catch(e) {
      err.textContent = 'Login failed';
      err.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Enter';
    }
  }
</script>
<script defer src="/static/app-shell.js"></script>
<script>
fetch('/api/version').then(r => r.json()).then(d => {
  const el = document.getElementById('appVersion');
  if (el && d.version) el.textContent = 'v' + d.version;
});
</script>
</body>
</html>
