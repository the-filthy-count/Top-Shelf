<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top-Shelf — History</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  @font-face { font-family: 'Seconds'; src: url('/static/xero4.ttf') format('truetype'); }
</style>
<style>
  @font-face {
    font-family: 'Acidoze';
    src: url('/static/TELETYPE1945-1985.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }
  :root {
    --bg:      #0c0c0e;
    --surface: rgba(19,19,23,0.75);
    --raised:  rgba(26,26,32,0.8);
    --border:  #222228;
    --muted:   #3a3a44;
    --text:    #e8e8f0;
    --dim:     #6b6b7a;
    --accent:  #c084fc;
    --green:   #4ade80;
    --amber:   #fbbf24;
    --red:     #f87171;
    --blue:    #60a5fa;
    --mono:    'DM Mono', monospace;
    --sans:    'Syne', sans-serif;
    --acid:    'Acidoze', 'Syne', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg) url('/static/background.jpg') center center / cover fixed;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(12,12,14,0.72);
    z-index: 0;
  }
  .app { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 24px 48px; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 28px;
  }
  .logo img { height: 36px; object-fit: contain; }
  .back-link {
    font-size: 11px; color: var(--dim); text-decoration: none;
    letter-spacing: 0.08em; text-transform: uppercase;
    border: 1px solid var(--border); padding: 6px 14px; border-radius: 6px;
    transition: all 0.15s;
  }
  .back-link:hover { color: var(--text); border-color: var(--muted); }

  .filter-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
  .filter-tab {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 32px 20px; min-height: 160px;
    border-radius: 10px; border: none;
    background: linear-gradient(145deg, rgba(40,40,52,0.85) 0%, rgba(22,22,30,0.75) 100%); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.07), 0 8px 32px rgba(0,0,0,0.3);
    cursor: pointer; transition: all 0.15s; text-decoration: none;
  }
  .filter-tab:hover { border-color: var(--muted); }
  .filter-tab.active { border-color: var(--accent); }
  .filter-tab.active-filed     { border-color: var(--green); }
  .filter-tab.active-unmatched { border-color: var(--amber); }
  .filter-tab.active-no_dir    { border-color: var(--blue); }
  .filter-tab.active-error     { border-color: var(--red); }
  .tab-count { font-family: var(--acid); font-size: 72px; font-weight: 400; line-height: 1; letter-spacing: 0.02em; display: block; text-align: center; }
  .tab-count.filed     { color: var(--green); }
  .tab-count.unmatched { color: var(--amber); }
  .tab-count.no_dir    { color: var(--blue); }
  .tab-count.error     { color: var(--red); }
  .tab-count.all       { color: var(--accent); }
  .tab-label { font-family: Seconds, monospace; font-size: 26px; text-transform: uppercase; letter-spacing: -0.02em; color: var(--dim); display: block; margin-top: 10px; text-align: center; }

  .search-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .filter-input {
    flex: 1; background: linear-gradient(145deg, rgba(40,40,52,0.85) 0%, rgba(22,22,30,0.75) 100%); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.07), 0 8px 32px rgba(0,0,0,0.3);
    border: 1px solid var(--border); color: var(--text);
    padding: 9px 14px; border-radius: 8px;
    font-family: var(--mono); font-size: 12px;
    outline: none; transition: border-color 0.15s;
  }
  .filter-input:focus { border-color: var(--accent); }
  .filter-input::placeholder { color: var(--muted); }
  .btn-clear {
    background: none; border: 1px solid var(--border); color: var(--dim);
    padding: 9px 16px; border-radius: 8px; font-family: var(--acid);
    font-size: 12px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em;
  }
  .btn-clear:hover { border-color: var(--muted); color: var(--text); }

  .table-panel {
    background: var(--surface); border: none; border-radius: 10px;
    overflow: hidden; backdrop-filter: blur(12px);
  }
  .table-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: none;
  }
  .table-title { font-family: var(--acid); font-size: 14px; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); }
  .table-meta  { font-size: 11px; color: var(--dim); }

  .table-scroll { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 900px; }
  col.col-filename   { width: 20%; }
  col.col-status     { width: 12%; }
  col.col-title      { width: 15%; }
  col.col-studio     { width: 12%; }
  col.col-performers { width: 14%; }
  col.col-date       { width: 8%; }
  col.col-source     { width: 11%; }
  col.col-processed  { width: 9%; }

  th {
    padding: 10px 12px;
    text-align: left;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--dim);
    border-bottom: 1px solid var(--border);
    background: rgba(19,19,23,0.95);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    user-select: none;
  }
  th.sortable { cursor: pointer; }
  th.sortable:hover { color: var(--text); }
  th.sort-active { color: var(--accent); }

  td {
    padding: 10px 12px;
    border-bottom: none;
    vertical-align: middle;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  tr:hover td { background: rgba(255,255,255,0.02); }
  .td-filename { color: var(--text); }
  .td-dim      { color: var(--dim); }
  .empty { padding: 48px; text-align: center; color: var(--dim); font-size: 12px; }

  .status-tag { font-family: Seconds, monospace; display: inline-block; padding: 0 4px; font-size: 16px; text-transform: uppercase; letter-spacing: -0.02em; background: none; border: none; }
  .status-filed      { color: var(--green); }
  .status-unmatched  { color: var(--amber); }
  .status-no_dir     { color: var(--blue); }
  .status-error      { color: var(--red); }
  .status-processing { background: rgba(192,132,252,0.12); color: var(--accent); }
  .source-tag { font-size: 10px; color: var(--dim); padding: 2px 6px; border-radius: 3px; background: rgba(255,255,255,0.04); }

  .pagination {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; padding: 16px 18px; border-top: 1px solid var(--border);
  }
  .page-btn {
    background: none; border: 1px solid var(--border); color: var(--dim);
    padding: 6px 12px; border-radius: 6px; font-family: var(--acid); font-size: 12px;
    cursor: pointer; transition: all 0.15s; min-width: 36px; text-align: center; letter-spacing: 0.04em;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--muted); color: var(--text); }
  .page-btn.active { border-color: var(--accent); color: var(--accent); }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .page-info { font-size: 11px; color: var(--dim); padding: 0 8px; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div style="display:flex;flex-direction:column;gap:3px"><div class="logo"><img src="/static/logo.png" alt="Top-Shelf"></div><span style="font-family:'DM Mono',monospace;font-size:10px;color:#6b6b7a;letter-spacing:0.06em;text-align:center">v1.0.4</span></div>
    <div style="display:flex;gap:8px">
      <a href="/" style="text-decoration:none"><button style="background:none;border:1px solid var(--border);color:var(--dim);padding:8px 12px;border-radius:6px;font-size:16px;cursor:pointer;transition:all 0.15s" title="TV Series"><i class="fa-solid fa-tv"></i></button></a>
      <a href="/movies" style="text-decoration:none"><button style="background:none;border:1px solid var(--border);color:var(--dim);padding:8px 12px;border-radius:6px;font-size:16px;cursor:pointer;transition:all 0.15s" title="Movies"><i class="fa-solid fa-film"></i></button></a>
      <a href="/library" style="text-decoration:none"><button style="background:none;border:1px solid var(--border);color:var(--dim);padding:8px 12px;border-radius:6px;font-size:16px;cursor:pointer;transition:all 0.15s" title="Library Health"><i class="fa-solid fa-house-medical"></i></button></a>
    </div>
  </header>

  <div class="filter-bar" id="filterBar">
    <div class="filter-tab active" data-status="" onclick="setFilter('')">
      <span class="tab-count all" id="countAll">0</span>
      <span class="tab-label">All</span>
    </div>
    <div class="filter-tab" data-status="filed" onclick="setFilter('filed')">
      <span class="tab-count filed" id="countFiled">0</span>
      <span class="tab-label">Filed</span>
    </div>
    <div class="filter-tab" data-status="unmatched" onclick="setFilter('unmatched')">
      <span class="tab-count unmatched" id="countUnmatched">0</span>
      <span class="tab-label">Unmatched</span>
    </div>
    <div class="filter-tab" data-status="no_dir" onclick="setFilter('no_dir')">
      <span class="tab-count no_dir" id="countNoDir">0</span>
      <span class="tab-label">NO-DIRECTORY</span>
    </div>
    <div class="filter-tab" data-status="error" onclick="setFilter('error')">
      <span class="tab-count error" id="countError">0</span>
      <span class="tab-label">Errors</span>
    </div>
  </div>

  <div class="search-row">
    <input class="filter-input" id="filterText" type="text"
           placeholder="Filter by filename, title, studio, or performers..."
           oninput="scheduleFilter()"
           onkeydown="if(event.key==='Escape')clearFilter()">
    <button class="btn-clear" onclick="clearFilter()" title="Clear filter"><i class="fa-solid fa-x"></i></button>
  </div>

  <div class="table-panel">
    <div class="table-header">
      <span class="table-title" id="tableTitle">All Records</span>
      <span class="table-meta"  id="tableMeta"></span>
    </div>
    <div class="table-scroll">
      <table>
        <colgroup>
          <col class="col-filename"><col class="col-status"><col class="col-title">
          <col class="col-studio"><col class="col-performers"><col class="col-date">
          <col class="col-source"><col class="col-processed">
        </colgroup>
        <thead>
          <tr>
            <th class="sortable" onclick="sortBy('filename')">Filename <span class="sort-ind" data-col="filename"></span></th>
            <th>Status</th>
            <th class="sortable" onclick="sortBy('match_title')">Title <span class="sort-ind" data-col="match_title"></span></th>
            <th class="sortable" onclick="sortBy('match_studio')">Studio <span class="sort-ind" data-col="match_studio"></span></th>
            <th class="sortable" onclick="sortBy('performers')">Performers <span class="sort-ind" data-col="performers"></span></th>
            <th class="sortable" onclick="sortBy('match_date')">Date <span class="sort-ind" data-col="match_date"></span></th>
            <th>Source</th>
            <th class="sortable sort-active" onclick="sortBy('processed_at')">Processed <span class="sort-ind" data-col="processed_at">↓</span></th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="8" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

</div>
<script>
  let currentFilter = '';
  let currentPage   = 1;
  let currentSort   = 'processed_at';
  let currentDir    = 'DESC';
  let currentText   = '';
  let filterTimer   = null;
  const PER_PAGE    = 20;

  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('status')) currentFilter = urlParams.get('status');

  async function loadStats() {
    try {
      const r = await fetch('/api/stats');
      const d = await r.json();
      document.getElementById('countAll').textContent       = (d.filed||0)+(d.unmatched||0)+(d.no_dir||0)+(d.errors||0);
      document.getElementById('countFiled').textContent     = d.filed     || 0;
      document.getElementById('countUnmatched').textContent = d.unmatched || 0;
      document.getElementById('countNoDir').textContent     = d.no_dir    || 0;
      document.getElementById('countError').textContent     = d.errors    || 0;
    } catch {}
  }

  async function loadPage() {
    const params = new URLSearchParams({
      page: currentPage, per_page: PER_PAGE,
      sort_by: currentSort, sort_dir: currentDir,
    });
    if (currentFilter) params.set('status', currentFilter);
    if (currentText)   params.set('filter_text', currentText);

    try {
      const r = await fetch(`/api/history?${params}`);
      const d = await r.json();

      const start = (d.page - 1) * d.per_page + 1;
      const end   = Math.min(d.page * d.per_page, d.total);
      document.getElementById('tableMeta').textContent = d.total ? `${start}–${end} of ${d.total}` : '0 records';

      const labels = {'':'All Records', filed:'Filed', unmatched:'Unmatched', no_dir:'No-Directory', error:'Errors'};
      document.getElementById('tableTitle').textContent = labels[currentFilter] || 'All Records';

      const tbody = document.getElementById('tableBody');
      if (!d.rows.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty">No records found</td></tr>';
      } else {
        tbody.innerHTML = d.rows.map(row => `
          <tr>
            <td class="td-filename" title="${esc(row.filename)}">${esc(row.filename)}</td>
            <td><span class="status-tag status-${row.status}">${row.status.replace('no_dir','no-dir')}</span></td>
            <td class="td-dim" title="${esc(row.match_title||'')}">${esc(row.match_title||'-')}</td>
            <td class="td-dim" title="${esc(row.match_studio||'')}">${esc(row.match_studio||'-')}</td>
            <td class="td-dim" title="${esc(row.performers||'')}">${esc(row.performers||'-')}</td>
            <td class="td-dim">${row.match_date||'-'}</td>
            <td>${row.match_source ? `<span class="source-tag">${esc(row.match_source)}</span>` : '-'}</td>
            <td class="td-dim">${row.processed_at ? row.processed_at.slice(0,16) : '-'}</td>
          </tr>`).join('');
      }
      renderPagination(d.page, d.pages);
    } catch(e) {
      document.getElementById('tableBody').innerHTML = `<tr><td colspan="8" class="empty">Error: ${e.message}</td></tr>`;
    }
  }

  function renderPagination(page, pages) {
    const el = document.getElementById('pagination');
    if (pages <= 1) { el.innerHTML = ''; return; }
    let html = `<button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>←</button>`;
    const ws = 7;
    let start = Math.max(1, page - Math.floor(ws/2));
    let end   = Math.min(pages, start + ws - 1);
    if (end - start < ws - 1) start = Math.max(1, end - ws + 1);
    if (start > 1) html += `<button class="page-btn" onclick="goPage(1)">1</button>${start > 2 ? '<span class="page-info">…</span>' : ''}`;
    for (let i = start; i <= end; i++)
      html += `<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
    if (end < pages) html += `${end < pages-1 ? '<span class="page-info">…</span>' : ''}<button class="page-btn" onclick="goPage(${pages})">${pages}</button>`;
    html += `<button class="page-btn" onclick="goPage(${page+1})" ${page===pages?'disabled':''}>→</button>`;
    html += `<span class="page-info">Page ${page} of ${pages}</span>`;
    el.innerHTML = html;
  }

  function goPage(p) {
    currentPage = p;
    loadPage();
    window.scrollTo({top: 0, behavior: 'smooth'});
  }

  function setFilter(status) {
    currentFilter = status;
    currentPage   = 1;
    const url = new URL(window.location);
    if (status) url.searchParams.set('status', status); else url.searchParams.delete('status');
    window.history.pushState({}, '', url);
    document.querySelectorAll('.filter-tab').forEach(t => {
      t.classList.remove('active','active-filed','active-unmatched','active-no_dir','active-error');
      if (t.dataset.status === status) {
        t.classList.add('active');
        if (status) t.classList.add(`active-${status}`);
      }
    });
    loadPage();
  }

  function scheduleFilter() {
    clearTimeout(filterTimer);
    filterTimer = setTimeout(() => {
      currentText = document.getElementById('filterText').value.trim();
      currentPage = 1;
      loadPage();
    }, 300);
  }

  function clearFilter() {
    document.getElementById('filterText').value = '';
    currentText = '';
    currentPage = 1;
    loadPage();
  }

  function sortBy(col) {
    currentDir  = currentSort === col && currentDir === 'DESC' ? 'ASC' : 'DESC';
    currentSort = col;
    currentPage = 1;
    updateSortIndicators();
    loadPage();
  }

  function updateSortIndicators() {
    document.querySelectorAll('.sort-ind').forEach(el => {
      el.textContent = el.dataset.col === currentSort ? (currentDir === 'DESC' ? '↓' : '↑') : '';
    });
    document.querySelectorAll('th').forEach(th => th.classList.remove('sort-active'));
    document.querySelectorAll('.sort-ind').forEach(el => {
      if (el.dataset.col === currentSort) el.closest('th').classList.add('sort-active');
    });
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadStats();
  updateSortIndicators();
  setFilter(currentFilter);
</script>
</body>
</html>
