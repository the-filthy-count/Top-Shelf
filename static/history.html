<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top-Shelf — History</title>
<link rel="preload" href="/static/background_dark.jpg" as="image">
<link rel="preload" href="/static/background_light.jpg" as="image">
<link rel="stylesheet" href="/static/fonts/dm-mono/dm-mono.css">
<link rel="stylesheet" href="/static/fonts/font-awesome/css/all.min.css">
<link rel="stylesheet" href="/static/fonts/webawesome/styles/themes/default.css" />
<script type="importmap">{"imports":{"@shoelace-style/localize":"/static/fonts/webawesome/utilities/localize.js","@shoelace-style/animations":"/static/fonts/webawesome/components/animation/animations.js"}}</script>
<script type="module" src="/static/fonts/webawesome/webawesome.js"></script>
<script src="/static/theme-init.js"></script>
<link rel="stylesheet" href="/static/app-shell.css">
<script src="/static/ts-utils.js"></script>
<style>
  @font-face {
    font-family: 'Seconds';
    src: url('/static/fonts/Impact%20Label%20Reversed.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
</style>
<style>
  @font-face {
    font-family: 'Acidoze';
    src: url('/static/fonts/Tox Typewriter.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
  :root {
    /* Colour palette lives in /static/app-shell.css (themeable via html[data-theme=...]) */
    --mono:    'DM Mono', monospace;
    --acid:    'Acidoze', 'DM Mono', monospace;
    --secs:    'Seconds', 'DM Mono', monospace;
    --counter-value-size: clamp(64px, 7.5vw, 86px);
    --counter-label-size: 20px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg) var(--app-bg-image) center center / cover fixed;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    min-height: 100vh;
    min-height: 100dvh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(var(--bg-rgb),0.72);
    z-index: 0;
  }
  .app {
    position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 0 24px 48px;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 14px 16px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    background: linear-gradient(160deg, rgba(var(--panel-hi-rgb),0.88) 0%, rgba(var(--panel-lo-rgb),0.78) 100%);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 8px 32px rgba(0,0,0,0.22);
    margin-bottom: 20px;
    flex-shrink: 0;
  }
  header:not(.ts-app-header) {
    display: flex; align-items: center; justify-content: space-between;
  }
  header.ts-app-header {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(200px, 2fr) minmax(0, 1fr);
    align-items: center;
    gap: 12px 16px;
  }
  header.ts-app-header .ts-header-left { justify-self: start; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; min-width: 0; }
  header.ts-app-header .nav-links { justify-self: end; }
  .logo img { height: 36px; object-fit: contain; }
  .back-link {
    font-size: 11px; color: var(--dim); text-decoration: none;
    letter-spacing: 0.08em; text-transform: uppercase;
    border: 1px solid var(--border); padding: 6px 14px; border-radius: 6px;
    transition: all 0.15s;
  }
  .back-link:hover { color: var(--text); border-color: var(--muted); }
  .nav-links { display: flex; gap: 8px; align-items: center; }

  .page-head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    margin: 8px 0 18px;
    flex-shrink: 0;
  }
  .page-title {
    font-family: var(--acid);
    font-size: 34px;
    line-height: 1;
    letter-spacing: 0.08em;
    color: var(--text);
    text-transform: uppercase;
  }
  .history-page-tip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-left: 6px;
    padding: 4px;
    border: none;
    background: transparent;
    color: var(--dim);
    cursor: help;
    border-radius: 6px;
    vertical-align: middle;
    line-height: 1;
  }
  .history-page-tip:hover { color: var(--accent); }

  .filter-bar { display: grid; grid-template-columns: repeat(6, minmax(160px, 1fr)); gap: 14px; margin-bottom: 18px; flex-shrink: 0; }
  .filter-tab {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px 16px; min-height: 144px;
    border-radius: 10px; border: 1px solid rgba(var(--brand-purple-rgb),0.55);
    background: linear-gradient(145deg, rgba(var(--panel-hi-rgb),0.85) 0%, rgba(var(--panel-lo-rgb),0.75) 100%); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.07), 0 8px 32px rgba(0,0,0,0.3);
    cursor: pointer; outline: 1px solid transparent; outline-offset: 0; transition: border-color 0.2s, box-shadow 0.2s, outline-color 0.2s; text-decoration: none;
  }
  .filter-tab:hover { border-color: rgba(var(--brand-purple-rgb),0.65); box-shadow: 0 6px 24px rgba(0,0,0,0.45); outline: 1px solid rgba(var(--brand-purple-rgb),0.3); outline-offset: 0; }
  .filter-tab.active { border-color: var(--accent); }
  .filter-tab.active-filed     { border-color: var(--green); }
  .filter-tab.active-unmatched { border-color: var(--amber); }
  .filter-tab.active-no_dir    { border-color: var(--blue); }
  .filter-tab.active-error     { border-color: var(--red); }
  .filter-tab.active-removed   { border-color: var(--dim); }
  .tab-count { font-family: var(--secs); font-size: var(--counter-value-size); font-weight: 400; line-height: 1; letter-spacing: 0.02em; display: block; text-align: center; }
  .tab-count.filed     { color: var(--green); }
  .tab-count.unmatched { color: var(--amber); }
  .tab-count.no_dir    { color: var(--blue); }
  .tab-count.error     { color: var(--red); }
  .tab-count.removed   { color: var(--dim); }
  .tab-count.all       { color: var(--accent); }
  .tab-label { font-family: var(--secs); font-size: var(--counter-label-size); text-transform: uppercase; letter-spacing: -0.02em; color: var(--text); display: block; margin-top: 8px; text-align: center; }

  .search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-shrink: 0;
    background: linear-gradient(145deg, rgba(var(--panel-hi-rgb),0.75) 0%, rgba(var(--panel-lo-rgb),0.65) 100%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px;
  }
  .filter-input {
    flex: 1; background: linear-gradient(145deg, rgba(var(--panel-hi-rgb),0.85) 0%, rgba(var(--panel-lo-rgb),0.75) 100%); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.07), 0 8px 32px rgba(0,0,0,0.3);
    border: 1px solid var(--border); color: var(--text);
    padding: 9px 14px; border-radius: 5px;
    font-family: var(--mono); font-size: 12px;
    outline: none; transition: border-color 0.15s;
  }
  .filter-input:focus { border-color: var(--accent); }
  .filter-input::placeholder { color: var(--muted); }
  .btn-clear {
    background: none; border: 1px solid var(--border); color: var(--dim);
    padding: 9px 16px; border-radius: 5px; font-family: var(--acid);
    font-size: 12px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em;
  }
  .btn-clear:hover { border-color: var(--muted); color: var(--text); }
  .btn-purge-removed {
    background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.35); color: var(--red);
    padding: 9px 12px; border-radius: 5px; font-size: 12px; cursor: pointer; transition: all 0.15s;
    flex-shrink: 0;
  }
  .btn-purge-removed:hover:not(:disabled) { border-color: var(--red); background: rgba(248,113,113,0.14); color: #fca5a5; }
  .btn-purge-removed:disabled { opacity: 0.35; cursor: not-allowed; }

  .table-panel {
    flex: 1 1 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: linear-gradient(160deg, rgba(var(--panel-hi-rgb),0.88) 0%, rgba(var(--panel-lo-rgb),0.78) 100%);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
    overflow: hidden; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 8px 32px rgba(0,0,0,0.25);
  }
  .table-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: none;
    flex-shrink: 0;
  }
  .table-title { font-family: var(--acid); font-size: 14px; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); }
  .table-meta  { font-size: 11px; color: var(--dim); }

  .table-scroll {
    flex: 1 1 auto;
    min-height: 0;
    overflow: auto;
  }

  table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 900px; }
  col.col-filename   { width: 20%; }
  col.col-status     { width: 12%; }
  col.col-title      { width: 15%; }
  col.col-studio     { width: 12%; }
  col.col-performers { width: 14%; }
  col.col-date       { width: 8%; }
  col.col-source     { width: 11%; }
  col.col-processed  { width: 9%; }

  th {
    padding: 10px 12px;
    text-align: left;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--dim);
    border-bottom: 1px solid var(--border);
    background: rgba(var(--panel-lo-rgb),0.95);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    user-select: none;
  }
  th.sortable { cursor: pointer; }
  th.sortable:hover { color: var(--text); }
  th.sort-active { color: var(--accent); }

  td {
    padding: 10px 12px;
    border-bottom: none;
    vertical-align: middle;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  tr:hover td { background: rgba(255,255,255,0.02); }
  .td-filename { color: var(--text); }
  .td-dim      { color: var(--dim); }
  .empty { padding: 48px; text-align: center; color: var(--dim); font-size: 12px; }

  .status-tag { font-family: var(--font-impact-label); display: inline-block; padding: 0 4px; font-size: 16px; text-transform: uppercase; letter-spacing: -0.02em; background: none; border: none; }
  .status-filed      { color: var(--green); }
  .status-unmatched  { color: var(--amber); }
  .status-no_dir     { color: var(--blue); }
  .status-error      { color: var(--red); }
  .status-removed    { color: var(--dim); }
  .status-processing { background: rgba(var(--brand-purple-rgb),0.35); color: var(--accent); }
  .source-tag { font-size: 10px; color: var(--dim); padding: 2px 6px; border-radius: 3px; background: rgba(255,255,255,0.04); }

  .pagination {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; padding: 16px 18px; border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .page-btn {
    background: none; border: 1px solid var(--border); color: var(--dim);
    padding: 6px 12px; border-radius: 6px; font-family: var(--acid); font-size: 12px;
    cursor: pointer; transition: all 0.15s; min-width: 36px; text-align: center; letter-spacing: 0.04em;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--muted); color: var(--text); }
  .page-btn.active { border-color: var(--accent); color: var(--accent); }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .page-info { font-size: 11px; color: var(--dim); padding: 0 8px; }

  @media (max-width: 1200px) {
    .filter-bar {
      grid-template-columns: repeat(3, minmax(180px, 1fr));
    }
  }

  @media (max-width: 800px) {
    .page-head {
      flex-direction: column;
      align-items: flex-start;
    }
    .page-title {
      font-size: 28px;
    }
    .filter-bar {
      grid-template-columns: repeat(2, minmax(150px, 1fr));
    }
    .search-row {
      flex-direction: column;
    }
  }

  @media (max-width: 540px) {
    .filter-bar {
      grid-template-columns: 1fr;
    }
    :root {
      --counter-value-size: clamp(52px, 13vw, 68px);
      --counter-label-size: 17px;
    }
  }

  /* ── /history mobile optimisation (≤640px) ──
     Hide the lower-signal columns (title, studio, performers, date,
     source) so the table stays readable on phones. Filename + Status
     + Processed timestamp are enough to orient yourself; tap a row if
     you need the rest. Horizontal scroll on .table-scroll remains as
     a fallback for anyone landing outside this range. */
  @media (max-width: 640px) {
    .page-title { font-size: 22px !important; }
    .filter-tab { padding: 12px 8px !important; min-height: 100px !important; }
    .search-row {
      flex-wrap: wrap;
      padding: 8px !important;
    }
    .filter-input { flex: 1 1 100%; }
    .table-panel { padding: 10px !important; }
    /* Defeat the desktop ``min-width: 900px`` on the table so it can
     * actually shrink to the panel width on a phone — without this
     * the table-scroll wrapper would horizontally scroll even with
     * the inner columns hidden below. */
    .table-scroll table {
      font-size: 11px;
      min-width: 0 !important;
    }
    /* Hide cols 3-7 (title, studio, performers, date, source). */
    .table-scroll thead th:nth-child(n+3):nth-child(-n+7),
    .table-scroll tbody td:nth-child(n+3):nth-child(-n+7) {
      display: none !important;
    }
    col.col-filename   { width: 55% !important; }
    col.col-status     { width: 22% !important; }
    col.col-processed  { width: 23% !important; }
    .table-scroll td,
    .table-scroll th {
      padding: 6px 8px !important;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  }
</style>
</head>
<body>
<div class="app">

  <header class="ts-app-header">
    <div class="ts-header-left">
      <div class="logo"><img src="/static/logo.png" alt="Top-Shelf" style="height:36px; object-fit:contain;"></div>
      <span id="appVersion" style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.06em"></span>
    </div>
    <div id="tsActivityBanner" class="ts-header-activity" aria-live="polite"></div>
    <div class="nav-links">
      <a href="/downloads" style="text-decoration:none"><button class="btn-secondary" title="Downloads"><i class="fa-solid fa-download"></i></button></a>
      <a href="/scenes" style="text-decoration:none"><button class="btn-secondary" title="Scenes"><i class="fa-solid fa-film"></i></button></a>
      <a href="/library" style="text-decoration:none"><button class="btn-secondary" title="Library"><i class="fa-solid fa-ticket"></i></button></a>
      <a href="/history" style="text-decoration:none"><button class="btn-secondary active-nav" title="History"><i class="fa-solid fa-clock-rotate-left"></i></button></a>
      <a href="/health" style="text-decoration:none"><button class="btn-secondary" title="Health"><i class="fa-solid fa-heart-pulse"></i></button></a>
      <a href="/settings" style="text-decoration:none"><button class="btn-secondary" title="Settings"><i class="fa-solid fa-gear"></i></button></a>
      <button class="btn-secondary" style="margin-left:auto" onclick="fetch('/api/auth/logout',{method:'POST'}).then(()=>location.href='/login')" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></button>
    </div>
  </header>

  <section class="page-head">
    <div style="display:flex;align-items:baseline;gap:4px;flex-wrap:wrap">
      <h1 class="page-title">History</h1>
      <button type="button" class="history-page-tip" title="Filter, sort, and review every processed file outcome." aria-label="About History"><i class="fa-solid fa-circle-info" aria-hidden="true"></i></button>
    </div>
  </section>

  <div class="filter-bar" id="filterBar">
    <div class="filter-tab active" data-status="" onclick="setFilter('')">
      <span class="tab-count all sky-counter" id="countAll">     0</span>
      <span class="tab-label">All</span>
    </div>
    <div class="filter-tab" data-status="filed" onclick="setFilter('filed')">
      <span class="tab-count filed sky-counter" id="countFiled">     0</span>
      <span class="tab-label">Filed</span>
    </div>
    <div class="filter-tab" data-status="unmatched" onclick="setFilter('unmatched')">
      <span class="tab-count unmatched sky-counter" id="countUnmatched">     0</span>
      <span class="tab-label">Unmatched</span>
    </div>
    <div class="filter-tab" data-status="no_dir" onclick="setFilter('no_dir')">
      <span class="tab-count no_dir sky-counter" id="countNoDir">     0</span>
      <span class="tab-label">NO-DIRECTORY</span>
    </div>
    <div class="filter-tab" data-status="error" onclick="setFilter('error')">
      <span class="tab-count error sky-counter" id="countError">     0</span>
      <span class="tab-label">Errors</span>
    </div>
    <div class="filter-tab" data-status="removed" onclick="setFilter('removed')">
      <span class="tab-count removed sky-counter" id="countRemoved">     0</span>
      <span class="tab-label">Removed</span>
    </div>
  </div>

  <div class="search-row">
    <input class="filter-input" id="filterText" type="text"
           placeholder="Filter by filename, title, studio, or performers..."
           oninput="scheduleFilter()"
           onkeydown="if(event.key==='Escape')clearFilter()">
    <button class="btn-clear" onclick="clearFilter()" title="Clear filter"><i class="fa-solid fa-x"></i></button>
    <button type="button" class="btn-purge-removed" id="btnPurgeRemoved" onclick="purgeRemovedRecords()"
            title="Permanently delete all rows with status Removed from the database"><i class="fa-solid fa-x"></i></button>
  </div>

  <div class="table-panel">
    <div class="table-header">
      <span class="table-title" id="tableTitle">All Records</span>
      <span class="table-meta"  id="tableMeta"></span>
    </div>
    <div class="table-scroll">
      <table>
        <colgroup>
          <col class="col-filename"><col class="col-status"><col class="col-title">
          <col class="col-studio"><col class="col-performers"><col class="col-date">
          <col class="col-source"><col class="col-processed">
        </colgroup>
        <thead>
          <tr>
            <th class="sortable" onclick="sortBy('filename')">Filename <span class="sort-ind" data-col="filename"></span></th>
            <th>Status</th>
            <th class="sortable" onclick="sortBy('match_title')">Title <span class="sort-ind" data-col="match_title"></span></th>
            <th class="sortable" onclick="sortBy('match_studio')">Studio <span class="sort-ind" data-col="match_studio"></span></th>
            <th class="sortable" onclick="sortBy('performers')">Performers <span class="sort-ind" data-col="performers"></span></th>
            <th class="sortable" onclick="sortBy('match_date')">Date <span class="sort-ind" data-col="match_date"></span></th>
            <th>Source</th>
            <th class="sortable sort-active" onclick="sortBy('processed_at')">Processed <span class="sort-ind" data-col="processed_at">↓</span></th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="8" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

</div>
<script>
  let currentFilter = '';
  let currentPage   = 1;
  let currentSort   = 'processed_at';
  let currentDir    = 'DESC';
  let currentText   = '';
  let filterTimer   = null;
  const PER_PAGE    = 20;

  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('status')) currentFilter = urlParams.get('status');

  async function loadStats() {
    try {
      const r = await fetch('/api/stats');
      const d = await r.json();
      document.getElementById('countAll').textContent       =
        (d.filed||0)+(d.unmatched||0)+(d.no_dir||0)+(d.errors||0)+(d.removed||0);
      document.getElementById('countFiled').textContent     = d.filed     || 0;
      document.getElementById('countUnmatched').textContent = d.unmatched || 0;
      document.getElementById('countNoDir').textContent     = d.no_dir    || 0;
      document.getElementById('countError').textContent     = d.errors    || 0;
      document.getElementById('countRemoved').textContent   = d.removed   || 0;
      const pr = document.getElementById('btnPurgeRemoved');
      if (pr) pr.disabled = !(d.removed > 0);
    } catch {}
  }

  async function loadPage() {
    const params = new URLSearchParams({
      page: currentPage, per_page: PER_PAGE,
      sort_by: currentSort, sort_dir: currentDir,
    });
    if (currentFilter) params.set('status', currentFilter);
    if (currentText)   params.set('filter_text', currentText);

    try {
      const r = await fetch(`/api/history?${params}`);
      const d = await r.json();

      const start = (d.page - 1) * d.per_page + 1;
      const end   = Math.min(d.page * d.per_page, d.total);
      document.getElementById('tableMeta').textContent = d.total ? `${start}–${end} of ${d.total}` : '0 records';

      const labels = {'':'All Records', filed:'Filed', unmatched:'Unmatched', no_dir:'No-Directory', error:'Errors', removed:'Removed'};
      document.getElementById('tableTitle').textContent = labels[currentFilter] || 'All Records';

      const tbody = document.getElementById('tableBody');
      if (!d.rows.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty">No records found</td></tr>';
      } else {
        tbody.innerHTML = d.rows.map(row => `
          <tr>
            <td class="td-filename" title="${esc(row.filename)}">${esc(row.display_name || row.filename)}</td>
            <td><span class="status-tag status-${row.status}">${row.status.replace('no_dir','no-dir')}</span></td>
            <td class="td-dim" title="${esc(row.match_title||'')}">${esc(row.match_title||'-')}</td>
            <td class="td-dim" title="${esc(row.match_studio||'')}">${esc(row.match_studio||'-')}</td>
            <td class="td-dim" title="${esc(row.performers||'')}">${esc(row.performers||'-')}</td>
            <td class="td-dim">${row.match_date||'-'}</td>
            <td>${row.match_source ? `<span class="source-tag">${esc(row.match_source)}</span>` : '-'}</td>
            <td class="td-dim">${row.processed_at ? row.processed_at.slice(0,16) : '-'}</td>
          </tr>`).join('');
      }
      renderPagination(d.page, d.pages);
    } catch(e) {
      document.getElementById('tableBody').innerHTML = `<tr><td colspan="8" class="empty">Error: ${e.message}</td></tr>`;
    }
  }

  function renderPagination(page, pages) {
    const el = document.getElementById('pagination');
    if (pages <= 1) { el.innerHTML = ''; return; }
    let html = `<button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>←</button>`;
    const ws = 7;
    let start = Math.max(1, page - Math.floor(ws/2));
    let end   = Math.min(pages, start + ws - 1);
    if (end - start < ws - 1) start = Math.max(1, end - ws + 1);
    if (start > 1) html += `<button class="page-btn" onclick="goPage(1)">1</button>${start > 2 ? '<span class="page-info">…</span>' : ''}`;
    for (let i = start; i <= end; i++)
      html += `<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
    if (end < pages) html += `${end < pages-1 ? '<span class="page-info">…</span>' : ''}<button class="page-btn" onclick="goPage(${pages})">${pages}</button>`;
    html += `<button class="page-btn" onclick="goPage(${page+1})" ${page===pages?'disabled':''}>→</button>`;
    html += `<span class="page-info">Page ${page} of ${pages}</span>`;
    el.innerHTML = html;
  }

  function goPage(p) {
    currentPage = p;
    loadPage();
    window.scrollTo({top: 0, behavior: 'smooth'});
  }

  function setFilter(status) {
    currentFilter = status;
    currentPage   = 1;
    const url = new URL(window.location);
    if (status) url.searchParams.set('status', status); else url.searchParams.delete('status');
    window.history.pushState({}, '', url);
    document.querySelectorAll('.filter-tab').forEach(t => {
      t.classList.remove('active','active-filed','active-unmatched','active-no_dir','active-error','active-removed');
      if (t.dataset.status === status) {
        t.classList.add('active');
        if (status) t.classList.add(`active-${status}`);
      }
    });
    loadPage();
  }

  function scheduleFilter() {
    clearTimeout(filterTimer);
    filterTimer = setTimeout(() => {
      currentText = document.getElementById('filterText').value.trim();
      currentPage = 1;
      loadPage();
    }, 300);
  }

  function clearFilter() {
    document.getElementById('filterText').value = '';
    currentText = '';
    currentPage = 1;
    loadPage();
  }

  async function purgeRemovedRecords() {
    const n = parseInt(document.getElementById('countRemoved').textContent, 10) || 0;
    if (n < 1) return;
    if (!confirm(`Delete all ${n} removed record${n === 1 ? '' : 's'} from the database? This cannot be undone.`)) return;
    const btn = document.getElementById('btnPurgeRemoved');
    if (btn) { btn.disabled = true; }
    try {
      const r = await fetch('/api/history/purge-removed', { method: 'POST' });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d.detail || d.message || 'Request failed');
      await loadStats();
      await loadPage();
      alert(`Deleted ${d.deleted ?? 0} record${(d.deleted === 1) ? '' : 's'}.`);
    } catch (e) {
      alert('Error: ' + e.message);
      await loadStats();
    }
  }

  function sortBy(col) {
    currentDir  = currentSort === col && currentDir === 'DESC' ? 'ASC' : 'DESC';
    currentSort = col;
    currentPage = 1;
    updateSortIndicators();
    loadPage();
  }

  function updateSortIndicators() {
    document.querySelectorAll('.sort-ind').forEach(el => {
      el.textContent = el.dataset.col === currentSort ? (currentDir === 'DESC' ? '↓' : '↑') : '';
    });
    document.querySelectorAll('th').forEach(th => th.classList.remove('sort-active'));
    document.querySelectorAll('.sort-ind').forEach(el => {
      if (el.dataset.col === currentSort) el.closest('th').classList.add('sort-active');
    });
  }

  loadStats();
  updateSortIndicators();
  setFilter(currentFilter);
</script>
<script defer src="/static/activity-banner.js?v=2"></script>
<script defer src="/static/app-shell.js"></script>
<script>
fetch('/api/status').then(r => r.json()).then(d => {
  const el = document.getElementById('appVersion');
  if (el && d.version) el.textContent = 'v' + d.version;
});
</script>
