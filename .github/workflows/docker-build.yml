name: Docker build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE: thefilthycount/top-shelf
  # GitHub is deprecating Node 20 for Actions; opt into Node 24 on current action majors.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Require Docker Hub secrets
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DH_USER" ] || [ -z "$DH_TOKEN" ]; then
            echo "::error::Docker Hub credentials are missing."
            echo "Add repository secrets (Settings → Secrets and variables → Actions):"
            echo "  DOCKERHUB_USERNAME — your Docker Hub user or org (e.g. thefilthycount)"
            echo "  DOCKERHUB_TOKEN    — Docker Hub access token (Account Settings → Security → New access token)"
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags / labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
